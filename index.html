<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zombie Juice Drive-Thru</title>
<style>
    * {
        box-sizing: border-box;
        user-select: none;
    }

    body {
        margin: 0;
        overflow: hidden;
        background: #101820;
        font-family: "Trebuchet MS", Arial, sans-serif;
    }

    canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #7fcf7a;
        image-rendering: auto;
    }

    #ui {
        position: fixed;
        left: 16px;
        top: 16px;
        color: #fff;
        text-shadow: 2px 2px 0 #1b2b24;
        font-weight: 900;
        font-size: 18px;
        line-height: 1.6;
        pointer-events: none;
    }

    #shop {
        position: fixed;
        right: 16px;
        top: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    button {
        border: 4px solid #26382f;
        background: #ffd166;
        color: #26382f;
        padding: 10px 14px;
        border-radius: 14px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 5px 0 #b88128;
        transition: transform 0.08s, box-shadow 0.08s;
    }

    button:hover {
        background: #ffe08d;
    }

    button:active {
        transform: translateY(5px);
        box-shadow: 0 0 0 #b88128;
    }

    #help {
        position: fixed;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        background: rgba(20, 30, 25, 0.75);
        color: white;
        border: 3px solid white;
        border-radius: 18px;
        padding: 10px 18px;
        font-weight: 900;
        text-align: center;
    }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="ui"></div>

<div id="shop">
    <button onclick="buyUpgrade('speed')">Upgrade Speed</button>
    <button onclick="buyUpgrade('net')">Upgrade Net</button>
    <button onclick="buyUpgrade('tank')">Upgrade Tank</button>
    <button onclick="buyUpgrade('factory')">Upgrade Factory</button>
</div>

<div id="help">
    WASD / Arrows: Move &nbsp; | &nbsp; Mouse: Aim &nbsp; | &nbsp; Click: Shoot Net &nbsp; | &nbsp; Bring zombies to the factory to make juice
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");

let W = 0;
let H = 0;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const keys = {};
const mouse = {
    x: W / 2,
    y: H / 2,
    down: false
};

window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});
window.addEventListener("mousedown", () => {
    mouse.down = true;
    shootNet();
});
window.addEventListener("mouseup", () => mouse.down = false);

function rand(min, max) {
    return Math.random() * (max - min) + min;
}

function dist(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
}

function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
}

function angleTo(a, b) {
    return Math.atan2(b.y - a.y, b.x - a.x);
}

const world = {
    money: 0,
    juice: 0,
    caught: 0,
    totalCaught: 0,
    totalSold: 0,
    dayTimer: 0,
    spawnTimer: 0,
    carTimer: 0,
    upgrades: {
        speed: 1,
        net: 1,
        tank: 1,
        factory: 1
    }
};

const factory = {
    x: 130,
    y: H / 2,
    w: 170,
    h: 210,
    processTimer: 0
};

const player = {
    x: W / 2,
    y: H / 2,
    r: 22,
    speed: 3.2,
    angle: 0,
    bob: 0,
    cooldown: 0,
    carry: [],
    maxCarry: 3
};

const zombies = [];
const nets = [];
const particles = [];
const cars = [];
const trees = [];
const rocks = [];
const flowers = [];

function generateDecor() {
    trees.length = 0;
    rocks.length = 0;
    flowers.length = 0;

    for (let i = 0; i < 45; i++) {
        trees.push({
            x: rand(250, W - 70),
            y: rand(70, H - 170),
            s: rand(0.75, 1.45),
            sway: rand(0, 10)
        });
    }

    for (let i = 0; i < 35; i++) {
        rocks.push({
            x: rand(260, W - 60),
            y: rand(70, H - 170),
            s: rand(0.7, 1.6),
            rot: rand(0, Math.PI)
        });
    }

    for (let i = 0; i < 80; i++) {
        flowers.push({
            x: rand(230, W - 40),
            y: rand(60, H - 150),
            s: rand(0.7, 1.2),
            c: Math.random() < 0.5 ? "#ff7eb6" : "#ffe66d"
        });
    }
}
generateDecor();
window.addEventListener("resize", generateDecor);

function spawnZombie() {
    let side = Math.floor(rand(0, 4));
    let x, y;

    if (side === 0) {
        x = rand(300, W - 40);
        y = 50;
    } else if (side === 1) {
        x = W - 50;
        y = rand(80, H - 190);
    } else if (side === 2) {
        x = rand(300, W - 40);
        y = H - 190;
    } else {
        x = 300;
        y = rand(80, H - 190);
    }

    zombies.push({
        x,
        y,
        r: rand(18, 25),
        speed: rand(0.45, 0.9),
        angle: rand(0, Math.PI * 2),
        wander: rand(0, 100),
        scared: 0,
        caught: false,
        squish: rand(0, 10),
        color: Math.random() < 0.5 ? "#8bd346" : "#a8e063"
    });
}

for (let i = 0; i < 9; i++) spawnZombie();

function spawnCar() {
    const colors = ["#ef476f", "#118ab2", "#ffd166", "#06d6a0", "#9b5de5"];
    cars.push({
        x: W + 120,
        y: H - 75,
        w: rand(92, 122),
        h: 45,
        speed: rand(1.2, 1.8),
        color: colors[Math.floor(rand(0, colors.length))],
        state: "arriving",
        wait: 0,
        bought: false,
        bounce: rand(0, 10)
    });
}

function addParticle(x, y, color, count = 8, power = 2) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x,
            y,
            vx: rand(-power, power),
            vy: rand(-power, power),
            life: rand(25, 55),
            maxLife: 55,
            r: rand(2, 6),
            color
        });
    }
}

function shootNet() {
    if (player.cooldown > 0) return;

    const netLevel = world.upgrades.net;
    const a = angleTo(player, mouse);

    nets.push({
        x: player.x + Math.cos(a) * 25,
        y: player.y + Math.sin(a) * 25,
        vx: Math.cos(a) * (8 + netLevel * 0.8),
        vy: Math.sin(a) * (8 + netLevel * 0.8),
        r: 12 + netLevel * 3,
        life: 60 + netLevel * 6,
        spin: 0
    });

    player.cooldown = Math.max(14, 38 - netLevel * 4);
    addParticle(player.x + Math.cos(a) * 30, player.y + Math.sin(a) * 30, "#ffffff", 8, 1.5);
}

function buyUpgrade(type) {
    const level = world.upgrades[type];
    const cost = 35 + level * level * 40;

    if (world.money < cost) {
        addParticle(W - 160, 80, "#ff4d6d", 18, 3);
        return;
    }

    world.money -= cost;
    world.upgrades[type]++;

    if (type === "speed") {
        player.speed += 0.35;
    }

    if (type === "tank") {
        player.maxCarry++;
    }

    addParticle(W - 160, 80, "#ffe66d", 30, 4);
}

function updatePlayer() {
    let dx = 0;
    let dy = 0;

    if (keys["w"] || keys["arrowup"]) dy--;
    if (keys["s"] || keys["arrowdown"]) dy++;
    if (keys["a"] || keys["arrowleft"]) dx--;
    if (keys["d"] || keys["arrowright"]) dx++;

    if (dx || dy) {
        const len = Math.hypot(dx, dy);
        dx /= len;
        dy /= len;

        player.x += dx * player.speed;
        player.y += dy * player.speed;
        player.bob += 0.25;

        addFootDust();
    } else {
        player.bob += 0.05;
    }

    player.x = clamp(player.x, 40, W - 40);
    player.y = clamp(player.y, 40, H - 135);

    player.angle = angleTo(player, mouse);

    if (player.cooldown > 0) player.cooldown--;

    for (let i = player.carry.length - 1; i >= 0; i--) {
        const z = player.carry[i];
        const offset = i + 1;
        const targetX = player.x - Math.cos(player.angle) * (28 + offset * 24);
        const targetY = player.y - Math.sin(player.angle) * (28 + offset * 24);

        z.x += (targetX - z.x) * 0.18;
        z.y += (targetY - z.y) * 0.18;
        z.squish += 0.15;
    }

    const insideFactory =
        player.x > factory.x - factory.w / 2 &&
        player.x < factory.x + factory.w / 2 &&
        player.y > factory.y - factory.h / 2 &&
        player.y < factory.y + factory.h / 2;

    if (insideFactory && player.carry.length > 0) {
        const amount = player.carry.length;
        player.carry.length = 0;
        world.caught += amount;
        addParticle(factory.x, factory.y, "#a8ff60", 35, 4);
    }
}

let dustTimer = 0;

function addFootDust() {
    dustTimer--;
    if (dustTimer > 0) return;

    dustTimer = 7;

    addParticle(
        player.x + rand(-8, 8),
        player.y + player.r + 8,
        "rgba(120,80,45,0.7)",
        4,
        0.8
    );
}

function updateZombies() {
    for (let i = zombies.length - 1; i >= 0; i--) {
        const z = zombies[i];

        if (z.caught) continue;

        z.wander--;

        const d = dist(z, player);

        if (d < 160) {
            z.scared = 60;
            z.angle = angleTo(player, z);
        }

        if (z.wander <= 0) {
            z.wander = rand(40, 120);
            z.angle += rand(-1.8, 1.8);
        }

        const spd = z.scared > 0 ? z.speed * 2.6 : z.speed;

        z.x += Math.cos(z.angle) * spd;
        z.y += Math.sin(z.angle) * spd;

        z.x = clamp(z.x, 260, W - 35);
        z.y = clamp(z.y, 45, H - 165);

        if (z.x <= 260 || z.x >= W - 35) z.angle = Math.PI - z.angle;
        if (z.y <= 45 || z.y >= H - 165) z.angle = -z.angle;

        if (z.scared > 0) {
            z.scared--;
            if (Math.random() < 0.05) {
                addParticle(z.x, z.y, "#c4f06a", 2, 0.9);
            }
        }

        z.squish += 0.16;
    }
}

function updateNets() {
    for (let i = nets.length - 1; i >= 0; i--) {
        const n = nets[i];

        n.x += n.vx;
        n.y += n.vy;
        n.vx *= 0.985;
        n.vy *= 0.985;
        n.spin += 0.35;
        n.life--;

        addParticle(n.x, n.y, "rgba(255,255,255,0.45)", 1, 0.4);

        for (let j = zombies.length - 1; j >= 0; j--) {
            const z = zombies[j];

            if (z.caught) continue;

            if (Math.hypot(n.x - z.x, n.y - z.y) < n.r + z.r) {
                if (player.carry.length < player.maxCarry) {
                    z.caught = true;
                    zombies.splice(j, 1);
                    player.carry.push(z);
                    world.totalCaught++;

                    addParticle(z.x, z.y, "#eaff80", 34, 3.5);
                    nets.splice(i, 1);
                    break;
                } else {
                    addParticle(player.x, player.y, "#ff4d6d", 22, 3);
                }
            }
        }

        if (n.life <= 0 || n.x < 0 || n.x > W || n.y < 0 || n.y > H) {
            nets.splice(i, 1);
        }
    }
}

function updateFactory() {
    if (world.caught > 0) {
        factory.processTimer++;

        const needed = Math.max(35, 95 - world.upgrades.factory * 12);

        if (factory.processTimer >= needed) {
            factory.processTimer = 0;
            world.caught--;
            world.juice++;
            addParticle(factory.x + 50, factory.y + 30, "#77ff66", 22, 3);
        }
    }
}

function updateCars() {
    world.carTimer--;

    if (world.carTimer <= 0) {
        spawnCar();
        world.carTimer = rand(220, 360);
    }

    const stopX = 215;

    for (let i = cars.length - 1; i >= 0; i--) {
        const c = cars[i];

        c.bounce += 0.15;

        if (c.state === "arriving") {
            c.x -= c.speed;

            let queueIndex = 0;
            for (const other of cars) {
                if (other !== c && other.state !== "leaving" && other.x < c.x) {
                    queueIndex++;
                }
            }

            const targetStop = stopX + queueIndex * 135;

            if (c.x <= targetStop) {
                c.x = targetStop;
                c.state = "waiting";
                c.wait = 110;
            }
        } else if (c.state === "waiting") {
            c.wait--;

            if (!c.bought && world.juice > 0) {
                c.bought = true;
                world.juice--;

                const pay = 15 + Math.floor(rand(0, 10)) + world.upgrades.factory * 2;
                world.money += pay;
                world.totalSold++;

                addParticle(c.x, c.y - 30, "#ffe66d", 30, 3.5);
                addParticle(factory.x + 70, factory.y + 65, "#77ff66", 20, 2.5);

                c.wait = 45;
            }

            if (c.wait <= 0) {
                c.state = "leaving";
            }
        } else if (c.state === "leaving") {
            c.x -= c.speed * 2.4;

            if (c.x < -180) {
                cars.splice(i, 1);
            }
        }
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.94;
        p.vy *= 0.94;
        p.life--;

        if (p.life <= 0) {
            particles.splice(i, 1);
        }
    }
}

function updateSpawning() {
    world.spawnTimer--;

    if (world.spawnTimer <= 0 && zombies.length < 14 + world.totalCaught * 0.05) {
        spawnZombie();
        world.spawnTimer = rand(50, 110);
    }
}

function roundedRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
}

function drawWorld() {
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, "#98e982");
    grd.addColorStop(1, "#58b86c");
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    drawHills();
    drawRoad();
    drawDecor();
}

function drawHills() {
    ctx.fillStyle = "#6dcf72";
    for (let i = 0; i < 6; i++) {
        const x = i * 260 - 80;
        const y = 110 + Math.sin(i) * 35;

        ctx.beginPath();
        ctx.ellipse(x, y, 180, 70, 0, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.fillStyle = "#4aa85a";
    ctx.fillRect(0, H - 145, W, 20);
}

function drawRoad() {
    ctx.fillStyle = "#3f4b4f";
    ctx.fillRect(0, H - 125, W, 125);

    ctx.fillStyle = "#2e383b";
    ctx.fillRect(0, H - 125, W, 12);

    ctx.strokeStyle = "#ffd166";
    ctx.lineWidth = 5;
    ctx.setLineDash([34, 28]);

    ctx.beginPath();
    ctx.moveTo(0, H - 63);
    ctx.lineTo(W, H - 63);
    ctx.stroke();

    ctx.setLineDash([]);
}

function drawDecor() {
    for (const f of flowers) {
        drawFlower(f);
    }

    for (const r of rocks) {
        drawRock(r);
    }

    for (const t of trees) {
        drawTree(t);
    }
}

function drawFlower(f) {
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.scale(f.s, f.s);

    ctx.strokeStyle = "#356b3d";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, 7);
    ctx.lineTo(0, -3);
    ctx.stroke();

    ctx.fillStyle = f.c;
    for (let i = 0; i < 5; i++) {
        const a = i / 5 * Math.PI * 2;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * 4, Math.sin(a) * 4 - 4, 3, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.fillStyle = "#fff7a8";
    ctx.beginPath();
    ctx.arc(0, -4, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function drawRock(r) {
    ctx.save();
    ctx.translate(r.x, r.y);
    ctx.rotate(r.rot);
    ctx.scale(r.s, r.s);

    ctx.fillStyle = "#607075";
    ctx.strokeStyle = "#263238";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.moveTo(-14, 8);
    ctx.lineTo(-9, -8);
    ctx.lineTo(6, -13);
    ctx.lineTo(17, -2);
    ctx.lineTo(13, 11);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "rgba(255,255,255,0.25)";
    ctx.beginPath();
    ctx.ellipse(-3, -4, 7, 3, -0.4, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function drawTree(t) {
    const sway = Math.sin(Date.now() * 0.002 + t.sway) * 2;

    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.scale(t.s, t.s);

    ctx.fillStyle = "#7b4f2e";
    ctx.strokeStyle = "#2f241b";
    ctx.lineWidth = 4;

    roundedRect(-8, 8, 16, 34, 6);
    ctx.fill();
    ctx.stroke();

    ctx.translate(sway, 0);

    ctx.fillStyle = "#2ecc71";
    ctx.strokeStyle = "#1f6f43";

    ctx.beginPath();
    ctx.arc(-18, 0, 22, 0, Math.PI * 2);
    ctx.arc(0, -15, 28, 0, Math.PI * 2);
    ctx.arc(22, 0, 23, 0, Math.PI * 2);
    ctx.arc(4, 13, 25, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "rgba(255,255,255,0.22)";
    ctx.beginPath();
    ctx.arc(-8, -18, 9, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function drawFactory() {
    ctx.save();
    ctx.translate(factory.x, factory.y);

    ctx.fillStyle = "#29313a";
    ctx.strokeStyle = "#101820";
    ctx.lineWidth = 6;

    roundedRect(-factory.w / 2, -factory.h / 2, factory.w, factory.h, 22);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#ff595e";
    ctx.beginPath();
    ctx.moveTo(-factory.w / 2 - 12, -factory.h / 2 + 25);
    ctx.lineTo(0, -factory.h / 2 - 55);
    ctx.lineTo(factory.w / 2 + 12, -factory.h / 2 + 25);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#ffd166";
    roundedRect(-45, 5, 90, 90, 16);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#88ff66";
    roundedRect(-23, 30, 46, 65, 12);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#1b2b24";
    ctx.font = "900 24px Trebuchet MS";
    ctx.textAlign = "center";
    ctx.fillText("JUICE", 0, -35);

    drawChimney();

    ctx.restore();
}

function drawChimney() {
    ctx.save();
    ctx.translate(55, -115);

    ctx.fillStyle = "#5b6570";
    ctx.strokeStyle = "#101820";
    ctx.lineWidth = 5;

    roundedRect(-15, 0, 30, 75, 8);
    ctx.fill();
    ctx.stroke();

    const smokeCount = world.caught > 0 ? 5 : 2;

    for (let i = 0; i < smokeCount; i++) {
        const y = -12 - i * 19;
        const x = Math.sin(Date.now() * 0.002 + i) * 10;
        const size = 10 + i * 3;

        ctx.fillStyle = `rgba(220, 240, 230, ${0.45 - i * 0.05})`;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();
}

function drawPlayer() {
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);

    const bob = Math.sin(player.bob) * 3;

    ctx.fillStyle = "rgba(0,0,0,0.22)";
    ctx.beginPath();
    ctx.ellipse(0, 27, 28, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.translate(0, bob);

    ctx.fillStyle = "#ffb703";
    ctx.strokeStyle = "#1b2b24";
    ctx.lineWidth = 5;

    ctx.beginPath();
    ctx.ellipse(0, 0, 24, 20, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#fb8500";
    ctx.beginPath();
    ctx.moveTo(4, -20);
    ctx.lineTo(24, -8);
    ctx.lineTo(13, 0);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(8, -7, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#101820";
    ctx.beginPath();
    ctx.arc(10, -6, 2.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#26382f";
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(12, 10);
    ctx.lineTo(32, 18);
    ctx.stroke();

    ctx.fillStyle = "#d9f99d";
    ctx.strokeStyle = "#26382f";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(38, 20, 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.restore();
}

function drawZombie(z) {
    ctx.save();
    ctx.translate(z.x, z.y);

    const squash = Math.sin(z.squish) * 0.08;
    ctx.scale(1 + squash, 1 - squash);

    ctx.fillStyle = "rgba(0,0,0,0.22)";
    ctx.beginPath();
    ctx.ellipse(0, z.r + 8, z.r * 0.9, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = z.color;
    ctx.strokeStyle = "#1f3d2b";
    ctx.lineWidth = 4;

    ctx.beginPath();
    ctx.arc(0, 0, z.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#6abf3a";
    ctx.beginPath();
    ctx.arc(-10, -8, 9, 0, Math.PI * 2);
    ctx.arc(10, -8, 9, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#fff";
    ctx.strokeStyle = "#1f3d2b";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.arc(-7, -4, 6, 0, Math.PI * 2);
    ctx.arc(8, -5, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#101820";
    ctx.beginPath();
    ctx.arc(-6, -3, 2, 0, Math.PI * 2);
    ctx.arc(9, -4, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#26382f";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 9, 8, 0.1, Math.PI - 0.1);
    ctx.stroke();

    ctx.strokeStyle = "#1f3d2b";
    ctx.lineWidth = 5;

    ctx.beginPath();
    ctx.moveTo(-z.r + 2, 5);
    ctx.lineTo(-z.r - 15, 16);
    ctx.moveTo(z.r - 2, 5);
    ctx.lineTo(z.r + 15, 16);
    ctx.stroke();

    if (z.scared > 0) {
        ctx.fillStyle = "#fff";
        ctx.font = "900 18px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText("!", 0, -z.r - 12);
    }

    ctx.restore();
}

function drawNet(n) {
    ctx.save();
    ctx.translate(n.x, n.y);
    ctx.rotate(n.spin);

    ctx.strokeStyle = "#eaf4f4";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.arc(0, 0, n.r, 0, Math.PI * 2);
    ctx.stroke();

    for (let i = 0; i < 4; i++) {
        ctx.rotate(Math.PI / 4);
        ctx.beginPath();
        ctx.moveTo(-n.r, 0);
        ctx.lineTo(n.r, 0);
        ctx.stroke();
    }

    ctx.restore();
}

function drawCar(c) {
    ctx.save();

    const bounce = Math.sin(c.bounce) * 2;
    ctx.translate(c.x, c.y + bounce);

    ctx.fillStyle = "rgba(0,0,0,0.28)";
    ctx.beginPath();
    ctx.ellipse(0, 30, c.w * 0.48, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = c.color;
    ctx.strokeStyle = "#101820";
    ctx.lineWidth = 5;

    roundedRect(-c.w / 2, -c.h / 2, c.w, c.h, 16);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = shadeColor(c.color, 25);
    roundedRect(-c.w / 5, -c.h / 2 - 18, c.w * 0.45, 28, 12);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#bde0fe";
    roundedRect(-c.w / 8, -c.h / 2 - 13, c.w * 0.22, 18, 6);
    ctx.fill();

    ctx.fillStyle = "#101820";
    ctx.beginPath();
    ctx.arc(-c.w / 3, c.h / 2, 10, 0, Math.PI * 2);
    ctx.arc(c.w / 3, c.h / 2, 10, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#eaf4f4";
    ctx.beginPath();
    ctx.arc(-c.w / 3, c.h / 2, 4, 0, Math.PI * 2);
    ctx.arc(c.w / 3, c.h / 2, 4, 0, Math.PI * 2);
    ctx.fill();

    if (c.state === "waiting") {
        ctx.fillStyle = "#fff";
        ctx.strokeStyle = "#101820";
        ctx.lineWidth = 3;

        ctx.beginPath();
        ctx.roundRect(-32, -72, 64, 34, 10);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#26382f";
        ctx.font = "900 15px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(c.bought ? "YUM!" : "JUICE?", 0, -50);
    }

    ctx.restore();
}

function shadeColor(hex, percent) {
    let num = parseInt(hex.replace("#", ""), 16);
    let r = (num >> 16) + percent;
    let g = ((num >> 8) & 0x00FF) + percent;
    let b = (num & 0x0000FF) + percent;

    r = clamp(r, 0, 255);
    g = clamp(g, 0, 255);
    b = clamp(b, 0, 255);

    return "#" + (b | (g << 8) | (r << 16)).toString(16).padStart(6, "0");
}

function drawParticles() {
    for (const p of particles) {
        const alpha = p.life / p.maxLife;

        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = 1;
    }
}

function drawCarryZombies() {
    for (const z of player.carry) {
        drawZombie(z);
    }
}

function drawUI() {
    const speedCost = 35 + world.upgrades.speed * world.upgrades.speed * 40;
    const netCost = 35 + world.upgrades.net * world.upgrades.net * 40;
    const tankCost = 35 + world.upgrades.tank * world.upgrades.tank * 40;
    const factoryCost = 35 + world.upgrades.factory * world.upgrades.factory * 40;

    ui.innerHTML = `
        💵 Money: $${world.money}<br>
        🧃 Juice: ${world.juice}<br>
        🧟 Zombies in Factory: ${world.caught}<br>
        🎒 Carrying: ${player.carry.length}/${player.maxCarry}<br>
        🚗 Sold: ${world.totalSold}<br>
        <br>
        Speed Lv.${world.upgrades.speed} - $${speedCost}<br>
        Net Lv.${world.upgrades.net} - $${netCost}<br>
        Tank Lv.${world.upgrades.tank} - $${tankCost}<br>
        Factory Lv.${world.upgrades.factory} - $${factoryCost}
    `;
}

function drawFactoryZone() {
    ctx.save();

    ctx.fillStyle = "rgba(255, 255, 255, 0.14)";
    ctx.strokeStyle = "rgba(255, 255, 255, 0.55)";
    ctx.lineWidth = 4;
    ctx.setLineDash([12, 8]);

    roundedRect(factory.x - factory.w / 2 - 28, factory.y - factory.h / 2 - 28, factory.w + 56, factory.h + 56, 30);
    ctx.fill();
    ctx.stroke();

    ctx.setLineDash([]);
    ctx.restore();
}

function drawDriveThruWindow() {
    ctx.save();
    ctx.translate(factory.x + 120, H - 88);

    ctx.fillStyle = "#ffd166";
    ctx.strokeStyle = "#101820";
    ctx.lineWidth = 5;

    roundedRect(-55, -45, 110, 70, 15);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#26382f";
    ctx.font = "900 16px Trebuchet MS";
    ctx.textAlign = "center";
    ctx.fillText("DRIVE", 0, -18);
    ctx.fillText("THRU", 0, 3);

    ctx.fillStyle = "#77ff66";
    ctx.beginPath();
    ctx.arc(35, 20, 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.restore();
}

function drawAimLine() {
    ctx.save();

    ctx.strokeStyle = "rgba(255,255,255,0.45)";
    ctx.lineWidth = 4;
    ctx.setLineDash([10, 10]);

    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(mouse.x, mouse.y);
    ctx.stroke();

    ctx.setLineDash([]);

    ctx.restore();
}

function update() {
    updatePlayer();
    updateZombies();
    updateNets();
    updateFactory();
    updateCars();
    updateParticles();
    updateSpawning();
}

function draw() {
    drawWorld();
    drawFactoryZone();
    drawFactory();
    drawDriveThruWindow();

    for (const c of cars) drawCar(c);

    for (const z of zombies) drawZombie(z);

    drawCarryZombies();

    for (const n of nets) drawNet(n);

    drawAimLine();
    drawPlayer();
    drawParticles();
    drawUI();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
