<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zombie Juice Drive-Thru</title>
<style>
    * {
        box-sizing: border-box;
        user-select: none;
    }

    body {
        margin: 0;
        overflow: hidden;
        background: #101820;
        font-family: "Trebuchet MS", Arial, sans-serif;
    }

    canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #7fcf7a;
    }

    #ui {
        position: fixed;
        left: 16px;
        top: 16px;
        color: #fff;
        text-shadow: 2px 2px 0 #1b2b24;
        font-weight: 900;
        font-size: 18px;
        line-height: 1.55;
        pointer-events: none;
        z-index: 5;
    }

    #levels {
        position: fixed;
        left: 235px;
        top: 16px;
        color: #fff;
        text-shadow: 2px 2px 0 #1b2b24;
        font-weight: 900;
        font-size: 18px;
        line-height: 1.55;
        pointer-events: none;
        z-index: 5;
    }

    #shop {
        position: fixed;
        right: 16px;
        top: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 5;
    }

    button {
        border: 4px solid #26382f;
        background: #ffd166;
        color: #26382f;
        padding: 10px 14px;
        border-radius: 14px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 5px 0 #b88128;
        transition: transform 0.08s, box-shadow 0.08s, background 0.08s;
    }

    button:hover {
        background: #ffe08d;
    }

    button:active {
        transform: translateY(5px);
        box-shadow: 0 0 0 #b88128;
    }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="ui"></div>
<div id="levels"></div>

<div id="shop">
    <button onclick="buyUpgrade('net')">Upgrade Net</button>
    <button onclick="buyUpgrade('tank')">Upgrade Tank</button>
    <button onclick="buyUpgrade('factory')">Upgrade Factory</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");
const levelsUI = document.getElementById("levels");
const shop = document.getElementById("shop");

let W = window.innerWidth;
let H = window.innerHeight;
canvas.width = W;
canvas.height = H;

const keys = {};
const mouse = {
    x: W / 2,
    y: H / 2,
    down: false
};

const game = {
    screen: "base",
    fade: 0,
    transition: null
};

const world = {
    money: 0,
    juice: 0,
    caught: 0,
    totalCaught: 0,
    upgrades: {
        net: 1,
        tank: 1,
        factory: 1
    }
};

const factory = {
    x: 135,
    y: H / 2,
    w: 190,
    h: 220,
    processTimer: 0
};

const player = {
    x: W / 2,
    y: H / 2,
    r: 22,
    speed: 3.2,
    angle: 0,
    facing: 1,
    bob: 0,
    cooldown: 0,
    carry: [],
    maxCarry: 3
};

const zombies = [];
const nets = [];
const particles = [];
const floatingTexts = [];
const cars = [];

const baseTrees = [];
const forestTrees = [];
const forestRocks = [];
const forestBushes = [];
const fireflies = [];
const grassTufts = [];
const baseWindStreaks = [];
const forestGroundTufts = [];
const forestPebbles = [];
const forestDarkPatches = [];

const CAR_STOP_X = 225;
const CAR_SPACING = 145;
const MAX_FOREST_ZOMBIES = 9;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;

    factory.y = H / 2;

    if (player.x > W - 40) player.x = W - 80;
    if (player.y > H - 130) player.y = H - 160;

    generateDecor();
    rebuildCarLine();
}

window.addEventListener("resize", resize);

window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

window.addEventListener("mousedown", e => {
    if (e.target.closest("#shop")) return;
    if (game.transition) return;

    mouse.down = true;
    shootNet();
});

window.addEventListener("mouseup", () => {
    mouse.down = false;
});

shop.addEventListener("mousedown", e => e.stopPropagation());
shop.addEventListener("click", e => e.stopPropagation());

function rand(min, max) {
    return Math.random() * (max - min) + min;
}

function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
}

function dist(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
}

function angleTo(a, b) {
    return Math.atan2(b.y - a.y, b.x - a.x);
}

function roundedRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
}

function shadeColor(hex, percent) {
    let num = parseInt(hex.replace("#", ""), 16);
    let r = (num >> 16) + percent;
    let g = ((num >> 8) & 0x00ff) + percent;
    let b = (num & 0x0000ff) + percent;

    r = clamp(r, 0, 255);
    g = clamp(g, 0, 255);
    b = clamp(b, 0, 255);

    return "#" + (b | (g << 8) | (r << 16)).toString(16).padStart(6, "0");
}

function tryPlaceNonOverlap(existing, minX, maxX, minY, maxY, radius, maxTries = 160) {
    minX = Math.max(0, minX);
    maxX = Math.max(minX + 1, maxX);
    minY = Math.max(0, minY);
    maxY = Math.max(minY + 1, maxY);

    for (let t = 0; t < maxTries; t++) {
        const x = rand(minX, maxX);
        const y = rand(minY, maxY);
        let valid = true;

        for (const e of existing) {
            if (Math.hypot(x - e.x, y - e.y) < radius + e.r) {
                valid = false;
                break;
            }
        }

        if (valid) {
            return { x, y, r: radius };
        }
    }

    return {
        x: rand(minX, maxX),
        y: rand(minY, maxY),
        r: radius
    };
}

function generateDecor() {
    baseTrees.length = 0;
    forestTrees.length = 0;
    forestRocks.length = 0;
    forestBushes.length = 0;
    fireflies.length = 0;
    grassTufts.length = 0;
    baseWindStreaks.length = 0;
    forestGroundTufts.length = 0;
    forestPebbles.length = 0;
    forestDarkPatches.length = 0;

    const baseOccupied = [];

    for (let i = 0; i < 22; i++) {
        const s = rand(0.8, 1.28);
        const placed = tryPlaceNonOverlap(baseOccupied, 230, W - 80, 38, 145, 34 * s);

        baseTrees.push({
            x: placed.x,
            y: placed.y,
            s,
            sway: rand(0, 10),
            type: Math.floor(rand(0, 3))
        });

        baseOccupied.push({ x: placed.x, y: placed.y, r: 34 * s });
    }

    for (let i = 0; i < 180; i++) {
        grassTufts.push({
            x: rand(10, W - 10),
            y: rand(80, H - 145),
            s: rand(0.6, 1.3),
            tilt: rand(-0.35, 0.35),
            hue: Math.random() < 0.5 ? "#4f9f4f" : "#63b45d"
        });
    }

    for (let i = 0; i < 14; i++) {
        baseWindStreaks.push({
            x: rand(-W, W),
            y: rand(90, H - 165),
            len: rand(45, 95),
            speed: rand(0.5, 1.2),
            alpha: rand(0.04, 0.1),
            drift: rand(-0.2, 0.2)
        });
    }

    const occupied = [];

    for (let i = 0; i < 16; i++) {
        const s = rand(0.85, 1.75);
        const placed = tryPlaceNonOverlap(occupied, 60, W - 60, 95, H - 55, 40 * s);

        forestTrees.push({
            x: placed.x,
            y: placed.y,
            s,
            sway: rand(0, 10),
            type: Math.floor(rand(0, 4))
        });

        occupied.push({ x: placed.x, y: placed.y + 20 * s, r: 42 * s });
    }

    for (let i = 0; i < 14; i++) {
        const s = rand(0.7, 1.45);
        const placed = tryPlaceNonOverlap(occupied, 50, W - 50, 95, H - 35, 25 * s);

        forestBushes.push({
            x: placed.x,
            y: placed.y,
            s,
            c: Math.random() < 0.5 ? "#275f3d" : "#1f4d34"
        });

        occupied.push({ x: placed.x, y: placed.y + 12 * s, r: 23 * s });
    }

    for (let i = 0; i < 16; i++) {
        const s = rand(0.8, 1.4);
        const placed = tryPlaceNonOverlap(occupied, 45, W - 45, 90, H - 25, 19 * s);

        forestRocks.push({
            x: placed.x,
            y: placed.y,
            s,
            rot: rand(0, Math.PI)
        });

        occupied.push({ x: placed.x, y: placed.y + 8 * s, r: 18 * s });
    }

    for (let i = 0; i < 190; i++) {
        forestGroundTufts.push({
            x: rand(0, W),
            y: rand(65, H - 8),
            s: rand(0.45, 1.15),
            tilt: rand(-0.6, 0.6),
            color: Math.random() < 0.5 ? "#163d2b" : "#1f5137"
        });
    }

    for (let i = 0; i < 60; i++) {
        forestPebbles.push({
            x: rand(0, W),
            y: rand(80, H - 10),
            s: rand(0.5, 1.5),
            rot: rand(0, Math.PI)
        });
    }

    for (let i = 0; i < 18; i++) {
        forestDarkPatches.push({
            x: rand(0, W),
            y: rand(90, H - 20),
            rx: rand(55, 140),
            ry: rand(16, 45),
            a: rand(0.05, 0.13)
        });
    }

    for (let i = 0; i < 26; i++) {
        fireflies.push({
            x: rand(0, W),
            y: rand(60, H - 35),
            vx: rand(-0.25, 0.25),
            vy: rand(-0.2, 0.2),
            glow: rand(0, Math.PI * 2)
        });
    }
}

function createCar(x = CAR_STOP_X) {
    const colors = ["#ef476f", "#118ab2", "#ffd166", "#06d6a0", "#9b5de5"];

    return {
        x,
        y: H - 58,
        targetX: x,
        w: rand(92, 122),
        h: 45,
        speed: rand(2.2, 3.1),
        color: colors[Math.floor(rand(0, colors.length))],
        state: "queue"
    };
}

function desiredQueueLength() {
    return clamp(Math.ceil((W - CAR_STOP_X - 45) / CAR_SPACING), 5, 14);
}

function rebuildCarLine() {
    if (game.screen !== "base") return;

    const keep = cars.filter(c => c.state !== "leaving");
    cars.length = 0;

    const count = desiredQueueLength();

    for (let i = 0; i < count; i++) {
        const targetX = CAR_STOP_X + i * CAR_SPACING;
        const oldCar = keep[i];

        if (oldCar) {
            oldCar.x = targetX;
            oldCar.targetX = targetX;
            oldCar.y = H - 58;
            oldCar.state = "queue";
            cars.push(oldCar);
        } else {
            cars.push(createCar(targetX));
        }
    }
}

function fillCarLine() {
    const queued = cars
        .filter(c => c.state !== "leaving")
        .sort((a, b) => a.x - b.x);

    const count = desiredQueueLength();

    while (queued.length < count) {
        const index = queued.length;
        const targetX = CAR_STOP_X + index * CAR_SPACING;
        const c = createCar(targetX);

        c.x = targetX;
        c.targetX = targetX;

        cars.push(c);
        queued.push(c);
    }
}

function spawnZombie() {
    const side = Math.floor(rand(0, 4));
    let x, y;

    if (side === 0) {
        x = rand(80, W - 80);
        y = 60;
    } else if (side === 1) {
        x = W - 60;
        y = rand(80, H - 65);
    } else if (side === 2) {
        x = rand(80, W - 80);
        y = H - 55;
    } else {
        x = 70;
        y = rand(80, H - 65);
    }

    zombies.push({
        x,
        y,
        r: rand(15.2, 20),
        speed: rand(0.45, 0.9),
        angle: rand(0, Math.PI * 2),
        wander: rand(0, 100),
        scared: 0,
        caught: false,
        squish: rand(0, 10),
        color: Math.random() < 0.5 ? "#8bd346" : "#a8e063",
        shirt: Math.random() < 0.5 ? "#6c63ff" : "#ef476f",
        pants: Math.random() < 0.5 ? "#34495e" : "#4b3f72",
        variant: Math.floor(rand(0, 3)),
        limp: rand(0, Math.PI * 2),
        facing: Math.random() < 0.5 ? 1 : -1
    });
}

function resetForestZombies() {
    zombies.length = 0;
    nets.length = 0;

    for (let i = 0; i < MAX_FOREST_ZOMBIES; i++) {
        spawnZombie();
    }
}

function addParticle(x, y, color, count = 8, power = 2) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x,
            y,
            vx: rand(-power, power),
            vy: rand(-power, power),
            life: rand(25, 55),
            maxLife: 55,
            r: rand(2, 6),
            color
        });
    }
}

function addFloatingText(text, x, y, color = "#fff") {
    floatingTexts.push({
        text,
        x,
        y,
        vy: -1.1,
        life: 55,
        maxLife: 55,
        color,
        size: 30
    });
}

function startTransition(toScreen) {
    if (game.transition) return;

    game.transition = {
        to: toScreen,
        phase: "out",
        speed: 0.055
    };
}

function updateTransition() {
    if (!game.transition) return;

    if (game.transition.phase === "out") {
        game.fade += game.transition.speed;

        if (game.fade >= 1) {
            game.fade = 1;
            game.screen = game.transition.to;

            if (game.screen === "forest") {
                resetForestZombies();
                player.x = 70;
                player.y = H / 2;
                addParticle(player.x, player.y, "#b7ff65", 24, 3);
            } else {
                zombies.length = 0;
                nets.length = 0;
                player.x = W - 75;
                player.y = H / 2;
                addParticle(player.x, player.y, "#ffe66d", 24, 3);
                rebuildCarLine();
            }

            game.transition.phase = "in";
        }
    } else {
        game.fade -= game.transition.speed;

        if (game.fade <= 0) {
            game.fade = 0;
            game.transition = null;
        }
    }
}

function shootNet() {
    if (game.screen !== "forest") return;
    if (player.cooldown > 0) return;

    const netLevel = world.upgrades.net;
    const a = angleTo(player, mouse);

    nets.push({
        x: player.x + Math.cos(a) * 25,
        y: player.y + Math.sin(a) * 25,
        vx: Math.cos(a) * (8 + netLevel * 0.8),
        vy: Math.sin(a) * (8 + netLevel * 0.8),
        r: 12 + netLevel * 3,
        life: 60 + netLevel * 6,
        spin: 0
    });

    player.cooldown = Math.max(14, 38 - netLevel * 4);

    addParticle(
        player.x + Math.cos(a) * 30,
        player.y + Math.sin(a) * 30,
        "#ffffff",
        8,
        1.5
    );
}

function buyUpgrade(type) {
    const level = world.upgrades[type];
    const cost = 35 + level * level * 40;

    if (world.money < cost) {
        addParticle(W - 160, 80, "#ff4d6d", 18, 3);
        return;
    }

    world.money -= cost;
    world.upgrades[type]++;

    if (type === "tank") {
        player.maxCarry++;
    }

    addParticle(W - 160, 80, "#ffe66d", 30, 4);
}

function updatePlayer() {
    if (game.transition) {
        if (player.cooldown > 0) player.cooldown--;
        return;
    }

    let dx = 0;
    let dy = 0;

    if (keys["w"] || keys["arrowup"]) dy--;
    if (keys["s"] || keys["arrowdown"]) dy++;
    if (keys["a"] || keys["arrowleft"]) dx--;
    if (keys["d"] || keys["arrowright"]) dx++;

    if (dx || dy) {
        const len = Math.hypot(dx, dy);
        dx /= len;
        dy /= len;

        player.x += dx * player.speed;
        player.y += dy * player.speed;
        player.bob += 0.25;

        addFootDust();
    } else {
        player.bob += 0.05;
    }

    player.angle = angleTo(player, mouse);
    player.facing = mouse.x >= player.x ? 1 : -1;

    if (game.screen === "base") {
        if (player.x > W - 32) startTransition("forest");

        player.x = clamp(player.x, 35, W - 30);
        player.y = clamp(player.y, 45, H - 135);
    } else {
        if (player.x < 32) startTransition("base");

        player.x = clamp(player.x, 30, W - 35);
        player.y = clamp(player.y, 45, H - 45);
    }

    if (player.cooldown > 0) player.cooldown--;

    updateCarriedZombies();
    checkFactoryDropoff();
}

function updateCarriedZombies() {
    for (let i = player.carry.length - 1; i >= 0; i--) {
        const z = player.carry[i];
        const offset = i + 1;

        let targetX;
        let targetY;

        if (game.screen === "base") {
            targetX = player.x + 35 + offset * 26;
            targetY = player.y + 16 + Math.sin(player.bob + i) * 7;
            z.facing = -1;
        } else {
            targetX = player.x - player.facing * (28 + offset * 24);
            targetY = player.y + 18 + Math.sin(player.bob + i) * 7;
            z.facing = -player.facing;
        }

        z.x += (targetX - z.x) * 0.18;
        z.y += (targetY - z.y) * 0.18;
        z.squish += 0.15;
    }
}

function checkFactoryDropoff() {
    if (game.screen !== "base") return;

    const insideFactory =
        player.x > factory.x - factory.w / 2 &&
        player.x < factory.x + factory.w / 2 &&
        player.y > factory.y - factory.h / 2 &&
        player.y < factory.y + factory.h / 2;

    if (insideFactory && player.carry.length > 0) {
        const amount = player.carry.length;
        player.carry.length = 0;
        world.caught += amount;
        addParticle(factory.x, factory.y, "#a8ff60", 45, 4);
    }
}

let dustTimer = 0;

function addFootDust() {
    dustTimer--;
    if (dustTimer > 0) return;

    dustTimer = 7;

    const color = game.screen === "forest"
        ? "rgba(38, 70, 51, 0.85)"
        : "rgba(120, 80, 45, 0.7)";

    addParticle(
        player.x + rand(-8, 8),
        player.y + player.r + 8,
        color,
        4,
        0.8
    );
}

function updateZombies() {
    if (game.screen !== "forest") return;

    for (let i = zombies.length - 1; i >= 0; i--) {
        const z = zombies[i];

        if (z.caught) continue;

        z.wander--;

        const d = dist(z, player);

        if (d < 170) {
            z.scared = 60;
            z.angle = angleTo(player, z);
        }

        if (z.wander <= 0) {
            z.wander = rand(40, 120);
            z.angle += rand(-1.8, 1.8);
        }

        const spd = z.scared > 0 ? z.speed * 2.6 : z.speed;

        z.x += Math.cos(z.angle) * spd;
        z.y += Math.sin(z.angle) * spd;

        z.facing = Math.cos(z.angle) >= 0 ? 1 : -1;

        z.x = clamp(z.x, 45, W - 45);
        z.y = clamp(z.y, 55, H - 45);

        if (z.x <= 45 || z.x >= W - 45) z.angle = Math.PI - z.angle;
        if (z.y <= 55 || z.y >= H - 45) z.angle = -z.angle;

        if (z.scared > 0) {
            z.scared--;

            if (Math.random() < 0.05) {
                addParticle(z.x, z.y, "#c4f06a", 2, 0.9);
            }
        }

        z.squish += 0.16;
        z.limp += 0.16;
    }
}

function updateNets() {
    if (game.screen !== "forest") {
        nets.length = 0;
        return;
    }

    for (let i = nets.length - 1; i >= 0; i--) {
        const n = nets[i];
        let removed = false;

        n.x += n.vx;
        n.y += n.vy;
        n.vx *= 0.985;
        n.vy *= 0.985;
        n.spin += 0.35;
        n.life--;

        addParticle(n.x, n.y, "rgba(255,255,255,0.45)", 1, 0.4);

        for (let j = zombies.length - 1; j >= 0; j--) {
            const z = zombies[j];

            if (z.caught) continue;

            if (Math.hypot(n.x - z.x, n.y - z.y) < n.r + z.r) {
                if (player.carry.length < player.maxCarry) {
                    z.caught = true;
                    z.scared = 0;
                    zombies.splice(j, 1);
                    player.carry.push(z);
                    world.totalCaught++;

                    addParticle(z.x, z.y, "#eaff80", 38, 3.8);
                    nets.splice(i, 1);
                    removed = true;
                    break;
                } else {
                    addParticle(z.x, z.y, "#ff4d6d", 24, 3);
                    addFloatingText("FULL", z.x, z.y - 48, "#ff4d6d");
                    nets.splice(i, 1);
                    removed = true;
                    break;
                }
            }
        }

        if (!removed && (n.life <= 0 || n.x < 0 || n.x > W || n.y < 0 || n.y > H)) {
            nets.splice(i, 1);
        }
    }
}

function updateFactory() {
    if (world.caught > 0) {
        factory.processTimer++;

        const needed = Math.max(35, 95 - world.upgrades.factory * 12);

        if (factory.processTimer >= needed) {
            factory.processTimer = 0;
            world.caught--;
            world.juice++;
            addParticle(factory.x + 50, factory.y + 30, "#77ff66", 22, 3);
        }
    }
}

function updateCars() {
    if (game.screen !== "base") return;

    fillCarLine();

    const queueCars = cars
        .filter(c => c.state !== "leaving")
        .sort((a, b) => a.x - b.x);

    for (let i = 0; i < queueCars.length; i++) {
        const c = queueCars[i];
        c.targetX = CAR_STOP_X + i * CAR_SPACING;

        if (Math.abs(c.x - c.targetX) > 1) {
            c.x += (c.targetX - c.x) * 0.08;
        } else {
            c.x = c.targetX;
        }

        c.y = H - 58;

        if (i === 0 && c.x === CAR_STOP_X && world.juice > 0) {
            c.state = "leaving";
            world.juice--;

            const pay = 15 + Math.floor(rand(0, 10)) + world.upgrades.factory * 2;
            world.money += pay;

            addParticle(c.x, c.y - 30, "#ffe66d", 32, 3.5);
            addParticle(factory.x + 72, factory.y + 65, "#77ff66", 20, 2.5);
        }
    }

    for (let i = cars.length - 1; i >= 0; i--) {
        const c = cars[i];

        if (c.state === "leaving") {
            c.x -= c.speed * 2.6;

            if (c.x < -220) {
                cars.splice(i, 1);
            }
        }
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.94;
        p.vy *= 0.94;
        p.life--;

        if (p.life <= 0) {
            particles.splice(i, 1);
        }
    }
}

function updateFloatingTexts() {
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const t = floatingTexts[i];

        t.y += t.vy;
        t.life--;

        if (t.life <= 0) {
            floatingTexts.splice(i, 1);
        }
    }
}

function updateFireflies() {
    if (game.screen !== "forest") return;

    for (const f of fireflies) {
        f.x += f.vx;
        f.y += f.vy;
        f.glow += 0.08;

        if (f.x < 0) f.x = W;
        if (f.x > W) f.x = 0;
        if (f.y < 45) f.y = H - 35;
        if (f.y > H - 25) f.y = 60;
    }
}

function updateBaseWind() {
    if (game.screen !== "base") return;

    for (const s of baseWindStreaks) {
        s.x += s.speed;
        s.y += s.drift;

        if (s.x > W + 120) {
            s.x = -rand(40, 220);
            s.y = rand(90, H - 165);
            s.len = rand(45, 95);
            s.speed = rand(0.5, 1.2);
            s.alpha = rand(0.04, 0.1);
        }

        if (s.y < 85) s.y = H - 170;
        if (s.y > H - 160) s.y = 95;
    }
}

function drawWorld() {
    if (game.screen === "base") {
        drawBaseWorld();
    } else {
        drawForestWorld();
    }
}

function drawBaseWorld() {
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, "#8dd66a");
    grd.addColorStop(1, "#4f9f4f");

    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    drawBaseHills();
    drawBaseGrassTexture();
    drawBaseWindStreaks();
    drawRoad();
    drawBaseDecor();
    drawPortalSign();
}

function drawBaseHills() {
    ctx.fillStyle = "#62b657";

    for (let i = 0; i < 6; i++) {
        const x = i * 260 - 80;
        const y = 110 + Math.sin(i) * 35;

        ctx.beginPath();
        ctx.ellipse(x, y, 180, 70, 0, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.fillStyle = "#3f8d43";
    ctx.fillRect(0, H - 145, W, 20);
}

function drawBaseGrassTexture() {
    for (let y = 70; y < H - 135; y += 18) {
        ctx.strokeStyle = y % 36 === 0 ? "rgba(70,120,50,0.16)" : "rgba(180,255,160,0.06)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y + 4);
        ctx.stroke();
    }

    for (const g of grassTufts) {
        ctx.save();
        ctx.translate(g.x, g.y);
        ctx.scale(g.s, g.s);

        ctx.strokeStyle = "#1a3a19";
        ctx.lineWidth = 2.4;
        ctx.lineCap = "round";

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-4 + g.tilt * 8, -10, -7, -17);
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(g.tilt * 4, -12, 0, -20);
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(4 + g.tilt * 8, -10, 7, -16);
        ctx.stroke();

        ctx.strokeStyle = g.hue;
        ctx.lineWidth = 1.5;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-4 + g.tilt * 8, -10, -7, -17);
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(g.tilt * 4, -12, 0, -20);
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(4 + g.tilt * 8, -10, 7, -16);
        ctx.stroke();

        ctx.restore();
    }
}

function drawBaseWindStreaks() {
    ctx.save();
    ctx.lineCap = "round";

    for (const s of baseWindStreaks) {
        ctx.strokeStyle = `rgba(255,255,255,${s.alpha})`;
        ctx.lineWidth = 2;

        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x + s.len, s.y - 4);
        ctx.stroke();
    }

    ctx.restore();
}

function drawRoad() {
    ctx.fillStyle = "#3f4b4f";
    ctx.fillRect(0, H - 125, W, 125);

    ctx.fillStyle = "#2e383b";
    ctx.fillRect(0, H - 125, W, 12);

    ctx.strokeStyle = "#ffd166";
    ctx.lineWidth = 5;
    ctx.setLineDash([34, 28]);

    ctx.beginPath();
    ctx.moveTo(0, H - 63);
    ctx.lineTo(W, H - 63);
    ctx.stroke();

    ctx.setLineDash([]);
}

function drawBaseDecor() {
    const sorted = [...baseTrees].sort((a, b) => a.y - b.y);

    for (const t of sorted) {
        drawTree(t, false);
    }
}

function drawPortalSign() {
    ctx.save();
    ctx.translate(W - 115, H / 2 - 145);
    ctx.scale(0.7, 0.7);

    ctx.fillStyle = "#7b4f2e";
    ctx.strokeStyle = "#2f241b";
    ctx.lineWidth = 4;

    roundedRect(-8, 20, 16, 85, 5);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#26382f";
    ctx.strokeStyle = "#ffffff";
    roundedRect(-65, -20, 130, 50, 12);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#ffffff";
    ctx.font = "900 16px Trebuchet MS";
    ctx.textAlign = "center";
    ctx.fillText("FOREST", 0, 0);
    ctx.fillText("→", 0, 20);

    ctx.restore();
}

function drawForestWorld() {
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, "#172c2d");
    grd.addColorStop(0.55, "#1f4035");
    grd.addColorStop(1, "#0d1d17");

    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    drawForestGroundTexture();
    drawForestBackTrees();
}

function drawForestGroundTexture() {
    ctx.save();

    for (let y = 55; y < H; y += 22) {
        ctx.strokeStyle = y % 44 === 0 ? "rgba(10,30,20,0.22)" : "rgba(90,140,95,0.05)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y + 7);
        ctx.stroke();
    }

    for (const p of forestDarkPatches) {
        ctx.fillStyle = `rgba(0,0,0,${p.a})`;
        ctx.beginPath();
        ctx.ellipse(p.x, p.y, p.rx, p.ry, 0, 0, Math.PI * 2);
        ctx.fill();
    }

    for (const pebble of forestPebbles) {
        ctx.save();
        ctx.translate(pebble.x, pebble.y);
        ctx.rotate(pebble.rot);
        ctx.scale(pebble.s, pebble.s);

        ctx.fillStyle = "#263d3a";
        ctx.strokeStyle = "#0d1d17";
        ctx.lineWidth = 1.5;

        ctx.beginPath();
        ctx.ellipse(0, 0, 5, 2.8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.restore();
    }

    for (const g of forestGroundTufts) {
        ctx.save();
        ctx.translate(g.x, g.y);
        ctx.scale(g.s, g.s);

        ctx.strokeStyle = "#0b1c14";
        ctx.lineWidth = 2.2;
        ctx.lineCap = "round";

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-3 + g.tilt * 6, -8, -6, -14);
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(g.tilt * 5, -10, 0, -17);
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(4 + g.tilt * 5, -8, 7, -13);
        ctx.stroke();

        ctx.strokeStyle = g.color;
        ctx.lineWidth = 1.2;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-3 + g.tilt * 6, -8, -6, -14);
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(g.tilt * 5, -10, 0, -17);
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(4 + g.tilt * 5, -8, 7, -13);
        ctx.stroke();

        ctx.restore();
    }

    ctx.restore();
}

function drawForestBackTrees() {
    ctx.fillStyle = "#0f1e1a";

    for (let i = 0; i < 6; i++) {
        const x = i * 230 - 30;
        const h = 210 + Math.sin(i * 5) * 50;

        ctx.beginPath();
        ctx.moveTo(x, H);
        ctx.lineTo(x + 35, H - h);
        ctx.lineTo(x + 70, H);
        ctx.closePath();
        ctx.fill();
    }
}

function drawForestLayeredEntities() {
    const layered = [];

    for (const b of forestBushes) {
        layered.push({
            depth: b.y + 18 * b.s,
            draw: () => drawForestBush(b)
        });
    }

    for (const r of forestRocks) {
        layered.push({
            depth: r.y + 10 * r.s,
            draw: () => drawRock(r, true)
        });
    }

    for (const t of forestTrees) {
        layered.push({
            depth: t.y + 58 * t.s,
            draw: () => drawTree(t, true)
        });
    }

    for (const z of zombies) {
        layered.push({
            depth: z.y + 35,
            draw: () => drawZombie(z)
        });
    }

    layered.sort((a, b) => a.depth - b.depth);

    for (const entry of layered) {
        entry.draw();
    }
}

function drawForestBush(b) {
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.scale(b.s, b.s);

    ctx.fillStyle = b.c;
    ctx.strokeStyle = "#102219";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.arc(-16, 5, 18, 0, Math.PI * 2);
    ctx.arc(0, -5, 22, 0, Math.PI * 2);
    ctx.arc(19, 6, 17, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "rgba(120,180,110,0.14)";
    ctx.beginPath();
    ctx.arc(-7, -10, 8, 0, Math.PI * 2);
    ctx.arc(12, -5, 6, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function drawFireflies() {
    ctx.save();

    for (const f of fireflies) {
        const alpha = 0.35 + Math.sin(f.glow) * 0.25;
        ctx.fillStyle = `rgba(220, 255, 120, ${alpha})`;

        ctx.beginPath();
        ctx.arc(f.x, f.y, 2.5, 0, Math.PI * 2);

}

function drawForestExitSign() {

function drawGlobalVignette() {
    const grd = ctx.createRadialGradient(
        W / 2,
        H / 2,
        Math.min(W, H) * 0.35,
        W / 2,
        H / 2,
        Math.max(W, H) * 0.82
    );

    grd.addColorStop(0, "rgba(0,0,0,0)");
    grd.addColorStop(1, game.screen === "forest" ? "rgba(0,0,0,0.42)" : "rgba(0,0,0,0.18)");

    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
}

function drawRock(r, forest = false) {
    ctx.save();
    ctx.translate(r.x, r.y);
    ctx.rotate(r.rot);
    ctx.scale(r.s, r.s);

    ctx.fillStyle = forest ? "#3b5450" : "#607075";
    ctx.strokeStyle = forest ? "#0c1818" : "#263238";
    ctx.lineWidth = 3.5;

    ctx.beginPath();
    ctx.moveTo(-16, 9);
    ctx.lineTo(-12, -7);
    ctx.lineTo(-2, -15);
    ctx.lineTo(11, -11);
    ctx.lineTo(19, 0);
    ctx.lineTo(13, 12);
    ctx.lineTo(-4, 15);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = forest ? "#4b6762" : "#78898e";
    ctx.beginPath();
    ctx.moveTo(-11, -4);
    ctx.lineTo(-2, -12);
    ctx.lineTo(7, -8);
    ctx.lineTo(0, -2);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = forest ? "rgba(130,180,155,0.18)" : "rgba(255,255,255,0.22)";
    ctx.beginPath();
    ctx.ellipse(-4, -6, 7, 3, -0.35, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = forest ? "#182b29" : "#3d4a4f";
    ctx.lineWidth = 2;
    ctx.lineCap = "round";

    ctx.beginPath();
    ctx.moveTo(-8, 3);
    ctx.lineTo(-2, 7);
    ctx.lineTo(4, 2);
    ctx.moveTo(7, -2);
    ctx.lineTo(13, 1);
    ctx.stroke();

    if (forest) {
        ctx.fillStyle = "rgba(75,140,82,0.35)";
        ctx.beginPath();
        ctx.arc(-9, 8, 3, 0, Math.PI * 2);
        ctx.arc(-4, 10, 2.5, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();
}

function drawTree(t, forest = false) {
    const sway = Math.sin(Date.now() * 0.002 + t.sway) * (forest ? 1.2 : 1.6);

    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.scale(t.s, t.s);

    ctx.fillStyle = forest ? "#5a3b24" : "#6d4526";
    ctx.strokeStyle = "#101820";
    ctx.lineWidth = 4;

    roundedRect(-8, 10, 16, forest ? 50 : 38, 5);
    ctx.fill();
    ctx.stroke();

    ctx.strokeStyle = "rgba(20,10,5,0.35)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-2, 16);
    ctx.lineTo(-3, forest ? 54 : 42);
    ctx.moveTo(4, 20);
    ctx.lineTo(2, forest ? 50 : 37);
    ctx.stroke();

    ctx.save();
    ctx.translate(sway, 0);

    const darkLeaf = forest ? "#18462e" : "#24643a";
    const midLeaf = forest ? "#23663f" : "#2f7c47";
    const lightLeaf = forest ? "#2c7a4d" : "#3c9357";

    ctx.fillStyle = darkLeaf;
    ctx.strokeStyle = "#101820";
    ctx.lineWidth = 4;

    ctx.beginPath();
    ctx.arc(-18, 5, 20, 0, Math.PI * 2);
    ctx.arc(0, -8, 24, 0, Math.PI * 2);
    ctx.arc(20, 4, 20, 0, Math.PI * 2);
    ctx.arc(0, 18, 21, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = midLeaf;
    for (const p of [
        [-22, 3, 10],
        [-8, -15, 12],
        [10, -14, 11],
        [23, 4, 10],
        [2, 15, 11]
    ]) {
        ctx.beginPath();
        ctx.arc(p[0], p[1], p[2], 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.fillStyle = lightLeaf;
    for (const p of [
        [-10, -16, 6],
        [7, -12, 5],
        [16, 2, 5],
        [-4, 10, 5]
    ]) {
        ctx.beginPath();
        ctx.arc(p[0], p[1], p[2], 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();
    ctx.restore();
}

function drawFactoryZone() {
    if (game.screen !== "base") return;

    ctx.save();

    ctx.fillStyle = "rgba(255, 255, 255, 0.14)";
    ctx.strokeStyle = "rgba(255, 255, 255, 0.55)";
    ctx.lineWidth = 4;
    ctx.setLineDash([12, 8]);

    roundedRect(
        factory.x - factory.w / 2 - 28,
        factory.y - factory.h / 2 - 28,
        factory.w + 56,
        factory.h + 56,
        30
    );

    ctx.fill();
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.restore();
}

function drawFactory() {
    if (game.screen !== "base") return;

    ctx.save();
    ctx.translate(factory.x, factory.y);

    ctx.strokeStyle = "#101820";
    ctx.lineWidth = 6;

    ctx.fillStyle = "#7b4f2e";
    roundedRect(-factory.w / 2, -factory.h / 2 + 18, factory.w, factory.h - 18, 18);
    ctx.fill();
    ctx.stroke();

    for (let y = -factory.h / 2 + 35; y < factory.h / 2 - 5; y += 28) {
        ctx.fillStyle = y % 56 === 0 ? "#8b5a32" : "#6f4527";
        roundedRect(-factory.w / 2 + 10, y, factory.w - 20, 18, 8);
        ctx.fill();
        ctx.stroke();
    }

    ctx.fillStyle = "#4a2d1c";
    ctx.beginPath();
    ctx.moveTo(-factory.w / 2 - 20, -factory.h / 2 + 35);
    ctx.lineTo(0, -factory.h / 2 - 55);
    ctx.lineTo(factory.w / 2 + 20, -factory.h / 2 + 35);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#9c6644";
    ctx.beginPath();
    ctx.moveTo(-factory.w / 2 - 7, -factory.h / 2 + 27);
    ctx.lineTo(0, -factory.h / 2 - 35);
    ctx.lineTo(factory.w / 2 + 7, -factory.h / 2 + 27);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#ffd166";
    roundedRect(-53, -42, 106, 42, 12);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#1b2b24";
    ctx.font = "900 22px Trebuchet MS";
    ctx.textAlign = "center";
    ctx.fillText("JUICE", 0, -15);

    ctx.fillStyle = "#88ff66";
    ctx.strokeStyle = "#101820";
    ctx.lineWidth = 5;
    roundedRect(-26, 18, 52, 72, 12);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "rgba(255,255,255,0.28)";
    roundedRect(-15, 28, 10, 50, 6);
    ctx.fill();

    drawWoodChimney();

    ctx.restore();
}

function drawWoodChimney() {
    ctx.save();
    ctx.translate(58, -108);

    ctx.fillStyle = "#5b3824";
    ctx.strokeStyle = "#101820";
    ctx.lineWidth = 5;

    roundedRect(-14, 0, 28, 65, 8);

function drawDriveThruWindow() {
    if (game.screen !== "base") return;

    const x = factory.x + 138;
    const y = H - 162;

    ctx.save();

    ctx.fillStyle = "#5f8f4c";
    ctx.strokeStyle = "#101820";
    ctx.lineWidth = 4;

    ctx.beginPath();
    ctx.moveTo(x - 45, y + 38);
    ctx.lineTo(x + 55, y + 38);
    ctx.lineTo(x + 95, H - 125);

    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.translate(x, y);

    ctx.fillStyle = "#ffd166";

    roundedRect(-55, -45, 110, 70, 15);

    ctx.stroke();

    ctx.fillStyle = "#26382f";

    ctx.fill();

function isPlayerBlinking() {
    const t = (Date.now() / 1000) % 3.6;
    return t < 0.12;
}

function drawPlayer() {
    const bob = Math.sin(player.bob) * 3;
    const facing = player.facing;

    if (game.screen === "forest") {
        drawPlayerArmAndNetGun(bob);
    } else {
        drawPlayerRelaxedArms(bob);
    }

    ctx.save();
    ctx.translate(player.x, player.y + bob);
    ctx.scale(facing, 1);

    ctx.strokeStyle = "#1b2b24";
    ctx.lineWidth = 5;

    ctx.fillStyle = "#29313a";
    roundedRect(-11, 18, 9, 22, 5);
    ctx.fill();
    ctx.stroke();

    roundedRect(4, 18, 9, 22, 5);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#ffb703";
    ctx.beginPath();
    ctx.ellipse(0, 6, 23, 27, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#fb8500";
    ctx.beginPath();
    ctx.moveTo(-18, -7);
    ctx.lineTo(20, -7);
    ctx.lineTo(12, 20);
    ctx.lineTo(-10, 24);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#88d8ff";
    ctx.strokeStyle = "#1b2b24";
    ctx.lineWidth = 4;
    roundedRect(-21, -7, 12, 27, 6);
    ctx.fill();
    ctx.stroke();

    drawPlayerHead(facing, bob);

    ctx.restore();
}

function drawPlayerHead(facing, bob) {
    const headWorldX = player.x;
    const headWorldY = player.y + bob - 22;

    const localLookX = (mouse.x - headWorldX) * facing;
    const localLookY = mouse.y - headWorldY;
    const lookAngle = Math.atan2(localLookY, localLookX);

    const pupilX = clamp(Math.cos(lookAngle) * 2.5, -2.5, 2.5);
    const pupilY = clamp(Math.sin(lookAngle) * 2.1, -2.1, 2.1);
    const headTilt = clamp(Math.sin(lookAngle) * 0.16, -0.18, 0.18);
    const blinking = isPlayerBlinking();

    ctx.save();
    ctx.translate(0, -22);
    ctx.rotate(headTilt);

    ctx.fillStyle = "#f5c49b";
    ctx.strokeStyle = "#1b2b24";
    ctx.lineWidth = 5;

    ctx.beginPath();
    ctx.arc(0, 0, 19, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#26382f";
    ctx.strokeStyle = "#101820";
    ctx.lineWidth = 4;

    ctx.beginPath();
    ctx.moveTo(-18, -6);
    ctx.quadraticCurveTo(-14, -23, -2, -21);
    ctx.quadraticCurveTo(8, -25, 18, -6);
    ctx.lineTo(11, -12);
    ctx.lineTo(4, -6);
    ctx.lineTo(-4, -12);
    ctx.lineTo(-11, -6);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    if (blinking) {
        ctx.strokeStyle = "#101820";
        ctx.lineWidth = 3;
        ctx.lineCap = "round";

        ctx.beginPath();
        ctx.moveTo(-11, -2);
        ctx.lineTo(-1, -2);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(3, -2);
        ctx.lineTo(13, -2);
        ctx.stroke();
    } else {
        drawEye(-6, -2, 5.5, pupilX, pupilY);
        drawEye(8, -2, 5.5, pupilX, pupilY);
    }

    ctx.strokeStyle = "#101820";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(1, 8, 6, 0.25, Math.PI - 0.15);
    ctx.stroke();

    ctx.restore();
}

function drawEye(x, y, r, pupilX, pupilY) {
    ctx.fillStyle = "#fff";
    ctx.strokeStyle = "#101820";
    ctx.lineWidth = 2.5;

    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#101820";
    ctx.beginPath();
    ctx.arc(x + pupilX, y + pupilY, 2.2, 0, Math.PI * 2);
    ctx.fill();
}

function drawPlayerRelaxedArms(bob) {
    const facing = player.facing;

    ctx.save();
    ctx.translate(player.x, player.y + bob);
    ctx.scale(facing, 1);

    ctx.strokeStyle = "#f5c49b";
    ctx.lineWidth = 9;
    ctx.lineCap = "round";

    ctx.beginPath();
    ctx.moveTo(-18, 2);
    ctx.lineTo(-29, 19);
    ctx.moveTo(18, 2);
    ctx.lineTo(29, 19);
    ctx.stroke();

    ctx.fillStyle = "#f5c49b";
    ctx.strokeStyle = "#1b2b24";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.arc(-30, 20, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(30, 20, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.restore();
}

function drawPlayerArmAndNetGun(bob) {
    const facing = player.facing;

    const shoulder = {
        x: player.x + facing * 17,
        y: player.y + bob + 2
    };

    const a = Math.atan2(mouse.y - shoulder.y, mouse.x - shoulder.x);

    const hand = {
        x: shoulder.x + Math.cos(a) * 27,
        y: shoulder.y + Math.sin(a) * 27
    };

    const gunTip = {
        x: hand.x + Math.cos(a) * 22,
        y: hand.y + Math.sin(a) * 22
    };

    ctx.save();

    ctx.strokeStyle = "#f5c49b";
    ctx.lineWidth = 9;
    ctx.lineCap = "round";

    ctx.beginPath();
    ctx.moveTo(shoulder.x, shoulder.y);
    ctx.lineTo(hand.x, hand.y);
    ctx.stroke();

    ctx.strokeStyle = "#26382f";
    ctx.lineWidth = 7;

    ctx.beginPath();
    ctx.moveTo(hand.x, hand.y);
    ctx.lineTo(gunTip.x, gunTip.y);
    ctx.stroke();

    ctx.fillStyle = "#d9f99d";
    ctx.strokeStyle = "#26382f";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.arc(gunTip.x, gunTip.y, 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.restore();
}

function drawZombie(z) {
    ctx.save();
    ctx.translate(z.x, z.y);

    const facing = z.facing || 1;
    const squash = Math.sin(z.squish) * 0.07;

    ctx.scale(facing * (1 + squash), 1 - squash);

    const limp = Math.sin(z.limp);

    ctx.strokeStyle = "#1f3d2b";
    ctx.lineWidth = 5;
    ctx.lineCap = "round";

    ctx.beginPath();
    ctx.moveTo(-8, 18);
    ctx.lineTo(-14 + limp * 4, 34);
    ctx.moveTo(6, 18);
    ctx.lineTo(15 - limp * 4, 34);
    ctx.stroke();

    ctx.fillStyle = z.pants;
    ctx.strokeStyle = "#171717";
    ctx.lineWidth = 4;

    roundedRect(-15, 9, 12, 22, 6);
    ctx.fill();
    ctx.stroke();

    roundedRect(2, 9, 12, 22, 6);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = z.shirt;
    roundedRect(-18, -7, 36, 27, 10);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#8bd346";
    ctx.strokeStyle = "#1f3d2b";
    ctx.lineWidth = 5;

    ctx.beginPath();
    ctx.moveTo(-16, 0);
    ctx.lineTo(-30, 12 + limp * 4);
    ctx.moveTo(16, 0);
    ctx.lineTo(30, 10 - limp * 4);
    ctx.stroke();

    ctx.fillStyle = z.color;
    ctx.beginPath();
    ctx.arc(0, -19, z.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#6abf3a";

    if (z.variant === 0) {
        ctx.beginPath();
        ctx.arc(-9, -28, 7, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(9, -28, 6, 0, Math.PI * 2);
        ctx.fill();
    } else if (z.variant === 1) {
        ctx.beginPath();
        ctx.arc(-10, -21, 6, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(11, -26, 6, 0, Math.PI * 2);
        ctx.fill();
    } else {
        ctx.beginPath();
        ctx.ellipse(0, -31, 14, 5, 0, 0, Math.PI * 2);
        ctx.fill();
    }

    drawZombieEye(-6, -20);
    drawZombieEye(6, -21);

    ctx.fillStyle = "#2d1b1b";
    ctx.beginPath();
    ctx.arc(1, -9, 6.5, 0.1, Math.PI - 0.1);
    ctx.fill();

    ctx.fillStyle = "#f8f8f8";
    ctx.fillRect(-3, -8, 2.5, 5);
    ctx.fillRect(2.5, -8, 2.5, 4.5);

    if (z.scared > 0 && !z.caught) {
        ctx.fillStyle = "#fff";
        ctx.strokeStyle = "#101820";
        ctx.lineWidth = 3;
        ctx.font = "900 22px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.strokeText("!", 0, -z.r - 28);
        ctx.fillText("!", 0, -z.r - 28);
    }

    ctx.restore();
}

function drawZombieEye(x, y) {
    ctx.fillStyle = "#fff";
    ctx.strokeStyle = "#1f3d2b";
    ctx.lineWidth = 2.5;

    ctx.beginPath();
    ctx.arc(x, y, 4.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#101820";
    ctx.beginPath();
    ctx.arc(x + 1.6, y + 0.7, 1.7, 0, Math.PI * 2);
    ctx.fill();
}

function drawNet(n) {
    ctx.save();
    ctx.translate(n.x, n.y);
    ctx.rotate(n.spin);

    ctx.strokeStyle = "#eaf4f4";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.arc(0, 0, n.r, 0, Math.PI * 2);
    ctx.stroke();

    for (let i = 0; i < 4; i++) {
        ctx.rotate(Math.PI / 4);
        ctx.beginPath();
        ctx.moveTo(-n.r, 0);
        ctx.lineTo(n.r, 0);
        ctx.stroke();
    }

    ctx.restore();
}

function drawCar(c) {
    ctx.save();
    ctx.translate(c.x, c.y);

    ctx.fillStyle = c.color;
    ctx.strokeStyle = "#101820";
    ctx.lineWidth = 5;

    roundedRect(-c.w / 2, -c.h / 2, c.w, c.h, 16);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = shadeColor(c.color, 25);
    roundedRect(-c.w / 5, -c.h / 2 - 18, c.w * 0.45, 28, 12);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#bde0fe";
    roundedRect(-c.w / 8, -c.h / 2 - 13, c.w * 0.22, 18, 6);
    ctx.fill();

    drawTire(-c.w / 3, c.h / 2 + 2, 14);
    drawTire(c.w / 3, c.h / 2 + 2, 14);

    ctx.restore();
}

function drawTire(x, y, r) {
    ctx.save();
    ctx.translate(x, y);

    ctx.fillStyle = "#0b1115";
    ctx.strokeStyle = "#101820";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#27333a";
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.62, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#eaf4f4";
    ctx.lineWidth = 2.2;

    for (let i = 0; i < 6; i++) {
        const a = i / 6 * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * 2, Math.sin(a) * 2);
        ctx.lineTo(Math.cos(a) * r * 0.52, Math.sin(a) * r * 0.52);
        ctx.stroke();
    }

    ctx.fillStyle = "#eaf4f4";
    ctx.strokeStyle = "#101820";
    ctx.lineWidth = 1.5;

    ctx.beginPath();
    ctx.arc(0, 0, r * 0.26, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.restore();
}

function drawParticles() {
    for (const p of particles) {
        const alpha = p.life / p.maxLife;

        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = 1;
    }
}

function drawFloatingTexts() {
    for (const t of floatingTexts) {
        const alpha = t.life / t.maxLife;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = `900 ${t.size}px Trebuchet MS`;
        ctx.textAlign = "center";
        ctx.lineWidth = 5;
        ctx.strokeStyle = "#101820";
        ctx.fillStyle = t.color;
        ctx.strokeText(t.text, t.x, t.y);
        ctx.fillText(t.text, t.x, t.y);
        ctx.restore();
    }
}

function drawCarryZombies() {
    for (const z of player.carry) {
        drawZombie(z);
    }
}

function drawAimLine() {
    if (game.screen !== "forest") return;

    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,0.35)";
    ctx.lineWidth = 4;
    ctx.setLineDash([10, 10]);

    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(mouse.x, mouse.y);
    ctx.stroke();

    ctx.setLineDash([]);
    ctx.restore();
}

function drawFade() {
    if (game.fade <= 0) return;

    ctx.save();
    ctx.globalAlpha = game.fade;
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
    ctx.restore();
}

function drawUI() {
    const netCost = 35 + world.upgrades.net * world.upgrades.net * 40;
    const tankCost = 35 + world.upgrades.tank * world.upgrades.tank * 40;
    const factoryCost = 35 + world.upgrades.factory * world.upgrades.factory * 40;
    const area = game.screen === "base" ? "Juice Base" : "Zombie Forest";

    if (game.screen === "forest") {
        shop.style.display = "none";
        levelsUI.innerHTML = "";

        ui.innerHTML = `
            📍 Area: ${area}<br>
            🎒 Carrying: ${player.carry.length}/${player.maxCarry}
        `;
    } else {
        shop.style.display = "flex";

        ui.innerHTML = `
            📍 Area: ${area}<br>
            💵 Money: $${world.money}<br>
            🧃 Juice: ${world.juice}<br>
            🧟 Zombies in Factory: ${world.caught}<br>
            🎒 Carrying: ${player.carry.length}/${player.maxCarry}
        `;

        levelsUI.innerHTML = `
            Net Lv.${world.upgrades.net} - $${netCost}<br>
            Tank Lv.${world.upgrades.tank} - $${tankCost}<br>
            Factory Lv.${world.upgrades.factory} - $${factoryCost}
        `;
    }
}

function update() {
    updateTransition();
    updatePlayer();
    updateZombies();
    updateNets();
    updateFactory();
    updateCars();
    updateParticles();
    updateFloatingTexts();
    updateFireflies();
    updateBaseWind();
}

function draw() {
    drawWorld();

    drawFactoryZone();
    drawFactory();
    drawDriveThruWindow();

    if (game.screen === "base") {
        for (const c of cars) drawCar(c);
    }

    if (game.screen === "forest") {
        drawForestLayeredEntities();

        for (const n of nets) {
            drawNet(n);
        }
    }

    drawCarryZombies();
    drawAimLine();
    drawPlayer();

    if (game.screen === "forest") {
        drawFireflies();
        drawForestExitSign();
    }

    drawParticles();
    drawFloatingTexts();
    drawGlobalVignette();
    drawUI();
    drawFade();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

generateDecor();
resetForestZombies();
zombies.length = 0;
rebuildCarLine();
loop();
</script>
</body>
