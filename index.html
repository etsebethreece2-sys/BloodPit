<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Gladiator Arena</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&display=swap');

    html, body {
      margin: 0;
      overflow: hidden;
      background: #120b08;
      font-family: "Cinzel", Georgia, serif;
      user-select: none;
    }

    canvas {
      display: block;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #f7e5bd;
      z-index: 10;
    }

    #topBar {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: min(920px, 92vw);
      display: flex;
      gap: 28px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border: 3px solid #8a5a24;
      border-radius: 12px;
      background:
        linear-gradient(135deg, rgba(59, 31, 14, 0.92), rgba(16, 10, 7, 0.94)),
        radial-gradient(circle at top, rgba(255, 209, 137, 0.16), transparent 55%);
      box-shadow:
        0 0 0 2px rgba(20, 10, 3, 0.9),
        0 10px 28px rgba(0,0,0,0.65),
        inset 0 0 25px rgba(255, 174, 72, 0.08);
    }

    #topBar::before,
    #topBar::after {
      content: "⚔";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 30px;
      color: #d7a54f;
      text-shadow: 0 2px 6px #000;
    }

    #topBar::before {
      left: -24px;
    }

    #topBar::after {
      right: -24px;
    }

    .healthBox {
      width: 380px;
      max-width: 42vw;
    }

    .label {
      font-size: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: #ffe7ad;
      text-shadow: 0 2px 4px #000;
      font-weight: 900;
      min-height: 19px;
    }

    .barOuter {
      height: 22px;
      border: 2px solid #b88a44;
      background: linear-gradient(#160c07, #2a170d);
      border-radius: 4px;
      overflow: hidden;
      box-shadow:
        0 0 0 2px rgba(28, 15, 7, 0.9),
        inset 0 2px 8px rgba(0,0,0,0.85),
        0 2px 12px rgba(0,0,0,0.55);
      position: relative;
    }

    .barOuter::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.11) 50%, transparent 100%);
      pointer-events: none;
    }

    .barInner {
      height: 100%;
      width: 100%;
      transition: width 0.15s ease;
    }

    #playerHealth {
      background: linear-gradient(90deg, #2f8f31, #9ccc42, #f4d35e);
    }

    #enemyHealth {
      background: linear-gradient(90deg, #7a0b0b, #c62828, #ff8a2b);
    }

    #bloodCoinsWrap {
      position: absolute;
      top: 108px;
      left: 50%;
      transform: translateX(-50%);
      padding: 9px 18px;
      border: 2px solid #b98437;
      border-radius: 999px;
      background:
        radial-gradient(circle at top, rgba(255, 215, 115, 0.2), transparent 65%),
        linear-gradient(135deg, rgba(58, 29, 12, 0.92), rgba(14, 8, 5, 0.92));
      box-shadow:
        0 0 0 2px rgba(30, 13, 4, 0.85),
        0 8px 22px rgba(0,0,0,0.55),
        inset 0 0 16px rgba(255, 190, 58, 0.12);
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #ffd86f;
      text-shadow: 0 2px 5px #000;
    }

    #messagePanel {
      position: absolute;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%) scale(0.96);
      min-width: min(520px, 86vw);
      padding: 28px 30px 26px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      background:
        radial-gradient(circle at top, rgba(255, 214, 132, 0.18), transparent 55%),
        linear-gradient(135deg, rgba(65, 34, 14, 0.96), rgba(19, 11, 6, 0.98));
      border: 4px ridge #b98437;
      border-radius: 16px;
      box-shadow:
        0 0 0 3px rgba(34, 16, 5, 0.95),
        0 18px 50px rgba(0,0,0,0.75),
        inset 0 0 26px rgba(255, 177, 63, 0.12);
      pointer-events: none;
    }

    #messagePanel.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }

    #message {
      font-size: clamp(42px, 8vw, 92px);
      font-weight: 900;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #ffe1a1;
      text-shadow:
        0 4px 0 #4a1b0a,
        0 8px 18px #000;
      margin-bottom: 10px;
    }

    #subMessage {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #f7d894;
      text-shadow: 0 2px 5px #000;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    #restartBtn {
      pointer-events: auto;
      cursor: pointer;
      border: 3px solid #d6a14a;
      border-radius: 8px;
      background: linear-gradient(#8d5520, #4d260d);
      color: #ffe7ad;
      font-family: "Cinzel", Georgia, serif;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 13px 24px;
      box-shadow:
        0 5px 0 #251006,
        0 10px 18px rgba(0,0,0,0.5),
        inset 0 2px 0 rgba(255,255,255,0.16);
    }

    #restartBtn:hover {
      filter: brightness(1.18);
      transform: translateY(-1px);
    }

    #restartBtn:active {
      transform: translateY(3px);
      box-shadow:
        0 2px 0 #251006,
        0 5px 12px rgba(0,0,0,0.5),
        inset 0 2px 0 rgba(255,255,255,0.16);
    }


    #damageFlash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(255,0,0,0.18), rgba(120,0,0,0.4));
      opacity: 0;
      transition: opacity 0.12s ease;
      pointer-events: none;
      z-index: 9;
    }


    /* Extra medieval texture pass */
    #topBar,
    #bloodCoinsWrap,
    #messagePanel {
      background-image:
        repeating-linear-gradient(45deg, rgba(255, 213, 124, 0.035) 0 2px, transparent 2px 7px),
        repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.16) 0 3px, transparent 3px 10px),
        radial-gradient(circle at 18% 0%, rgba(255, 223, 145, 0.22), transparent 42%),
        linear-gradient(135deg, rgba(67, 35, 14, 0.96), rgba(18, 9, 4, 0.98));
      border-color: #c39143;
      image-rendering: pixelated;
    }

    #topBar {
      border-style: ridge;
      border-width: 5px;
      border-radius: 10px 18px 10px 18px;
      box-shadow:
        0 0 0 3px rgba(25, 11, 3, 0.95),
        0 0 0 6px rgba(115, 70, 22, 0.42),
        0 14px 34px rgba(0, 0, 0, 0.72),
        inset 0 3px 0 rgba(255, 224, 150, 0.12),
        inset 0 -8px 18px rgba(0, 0, 0, 0.35);
    }

    .healthBox {
      position: relative;
      padding: 8px 10px 10px;
      background:
        linear-gradient(90deg, rgba(255, 218, 141, 0.045), transparent 24%, transparent 76%, rgba(0, 0, 0, 0.13)),
        rgba(18, 8, 3, 0.22);
      border: 1px solid rgba(214, 161, 74, 0.35);
      box-shadow: inset 0 0 18px rgba(0, 0, 0, 0.28);
    }

    .healthBox::before,
    .healthBox::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #f3d58d, #7c4a19 62%, #251006 100%);
      top: 7px;
      box-shadow: 0 1px 2px #000;
    }

    .healthBox::before { left: 7px; }
    .healthBox::after { right: 7px; }

    .label {
      color: #ffe6a3;
      text-shadow:
        0 2px 0 #341305,
        0 0 9px rgba(255, 183, 76, 0.28),
        0 2px 5px #000;
    }

    .barOuter {
      height: 24px;
      border: 3px ridge #c39143;
      border-radius: 2px;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.035) 0 4px, rgba(0,0,0,0.12) 4px 8px),
        linear-gradient(#0f0703, #301608);
      box-shadow:
        0 0 0 2px rgba(22, 8, 2, 0.95),
        inset 0 3px 9px rgba(0,0,0,0.95),
        inset 0 -2px 0 rgba(255, 225, 144, 0.08),
        0 3px 12px rgba(0,0,0,0.6);
    }

    .barInner {
      box-shadow:
        inset 0 5px 8px rgba(255, 255, 255, 0.18),
        inset 0 -6px 10px rgba(0, 0, 0, 0.26);
    }

    #playerHealth {
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.14) 0 5px, transparent 5px 12px),
        linear-gradient(90deg, #155b20, #719d2b, #e0bf48);
    }

    #enemyHealth {
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.11) 0 5px, transparent 5px 12px),
        linear-gradient(90deg, #510505, #a91515, #e57423);
    }

    #bloodCoinsWrap {
      border: 4px ridge #c39143;
      border-radius: 3px;
      color: #ffd86f;
      box-shadow:
        0 0 0 3px rgba(25, 11, 3, 0.92),
        0 10px 24px rgba(0,0,0,0.62),
        inset 0 2px 0 rgba(255, 238, 173, 0.13),
        inset 0 -8px 16px rgba(0,0,0,0.25);
    }

    #messagePanel {
      border: 7px ridge #bd8b37;
      border-radius: 6px 22px 6px 22px;
      box-shadow:
        0 0 0 4px rgba(27, 10, 2, 0.96),
        0 0 0 8px rgba(119, 73, 23, 0.4),
        0 22px 55px rgba(0,0,0,0.78),
        inset 0 4px 0 rgba(255, 224, 150, 0.12),
        inset 0 -14px 25px rgba(0,0,0,0.32);
    }

    #restartBtn {
      border: 4px ridge #d6a14a;
      border-radius: 3px;
      background:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0 3px, transparent 3px 8px),
        linear-gradient(#9b6328, #55270b);
      box-shadow:
        0 5px 0 #251006,
        0 10px 18px rgba(0,0,0,0.5),
        inset 0 3px 0 rgba(255,255,255,0.16),
        inset 0 -8px 12px rgba(0,0,0,0.24);
    }

    #tournamentWrap {
      position: absolute;
      top: 108px;
      right: 28px;
      min-width: 260px;
      padding: 12px 16px;
      border: 3px ridge #b98437;
      border-radius: 12px;
      background:
        radial-gradient(circle at top, rgba(255, 214, 132, 0.16), transparent 62%),
        repeating-linear-gradient(135deg, rgba(255,255,255,0.035) 0 2px, transparent 2px 7px),
        linear-gradient(135deg, rgba(61, 31, 12, 0.94), rgba(13, 8, 5, 0.96));
      box-shadow:
        0 0 0 2px rgba(30, 13, 4, 0.9),
        0 10px 26px rgba(0,0,0,0.58),
        inset 0 0 18px rgba(255, 190, 58, 0.11);
      color: #ffe2a0;
      text-shadow: 0 2px 5px #000;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      pointer-events: none;
    }

    #tournamentWrap::before {
      content: "⚜ Tournament Scroll ⚜";
      display: block;
      margin-bottom: 8px;
      color: #ffd86f;
      font-size: 12px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 216, 111, 0.38);
      padding-bottom: 6px;
    }

    .tournamentLine {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255, 220, 145, 0.08);
    }

    .tournamentLine span:last-child {
      color: #ffd86f;
      text-align: right;
    }
  </style>
</head>
<body>
  <div id="damageFlash"></div>

  <div id="ui">
    <div id="topBar">
      <div class="healthBox">
        <div class="label">Gladiator</div>
        <div class="barOuter">
          <div id="playerHealth" class="barInner"></div>
        </div>
      </div>

      <div class="healthBox">
        <div id="enemyNameLabel" class="label" style="text-align:right;">Opponent</div>
        <div class="barOuter">
          <div id="enemyHealth" class="barInner"></div>
        </div>
      </div>
    </div>

    <div id="bloodCoinsWrap">BloodCoins: <span id="bloodCoinsCount">0</span></div>

    <div id="tournamentWrap">
      <div class="tournamentLine"><span>Rank</span><span id="tournamentRankText">Sand Rookie</span></div>
      <div class="tournamentLine"><span>Round</span><span id="tournamentRoundText">1</span></div>
      <div class="tournamentLine"><span>Opponent HP</span><span id="opponentHealthText">100 / 100</span></div>
      <div class="tournamentLine"><span>Club Damage</span><span id="opponentDamageText">11 - 17</span></div>
    </div>


    <div id="messagePanel">
      <div id="message"></div>
      <div id="subMessage"></div>
      <button id="restartBtn">Fight Again</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

    let scene, camera, renderer, clock;
    let player, enemy;
    let sword, shield;
    let enemySword, enemyShield;
    let keys = {};
    let mouseLocked = false;

    let yaw = 0;
    let pitch = 0;
    let cameraRoll = 0;

    let playerMaxHP = 100;
    let playerHP = playerMaxHP;
    let enemyMaxHP = 100;
    let enemyHP = enemyMaxHP;
    let bloodCoins = 0;

    let tournamentRound = 1;
    let roundWon = false;
    let enemyDamageMultiplier = 1;
    let enemySpeedMultiplier = 1;
    let enemyCooldownMultiplier = 1;

    let playerAttackType = "sideRight";
    let previousPlayerAttackType = "";
    let timeScale = 1;
    let finisherSlowMoTimer = 0;

    let playerAttackTimer = 0;
    let playerAttackCooldown = 0;
    let enemyAttackTimer = 0;
    let enemyAttackCooldown = 1.2;
    let enemyHitDone = false;
    let playerHitDone = false;

    let isBlocking = false;
    let gameOver = false;
    let currentEnemyName = "";

    let enemyDeathTimer = 0;
    let enemyDeathDuration = 1.55;
    let enemyVictoryDelayTimer = 0;
    const VICTORY_SCREEN_DELAY = 2;
    let pendingVictoryText = "";
    let pendingVictoryDetail = "";

    const opponentNames = [
      "Marcus Bloodfang",
      "Titus Ironjaw",
      "Cassius the Cruel",
      "Brutus Stormblade",
      "Lucius Skullsplitter",
      "Gaius Redmane",
      "Drusus the Unbroken",
      "Flavius Nightwolf",
      "Octavius Bonebreaker",
      "Aurelius Ashborn",
      "Valerius Doomhand",
      "Severus the Savage",
      "Maximus Blackshield",
      "Nero Flameheart",
      "Magnus the Merciless",
      "Rufus Steelborn",
      "Corvus Sandstrider",
      "Decimus the Viper",
      "Atticus Grimblade",
      "Varrus Thunderfist"
    ];

    const particles = [];
    const floatingTexts = [];
    const bloodDecals = [];

    const ARENA_RADIUS = 28;
    const PLAYER_SPEED = 7.2;
    const ENEMY_SPEED = 3.36;
    const ENEMY_ATTACK_DURATION = 1.25;
    const PLAYER_ATTACK_DURATION = 0.7488;
    const PLAYER_ATTACK_TYPES = ["overhead", "sideRight", "sideLeft", "stab"];
    const FINISHER_SLOWMO_DURATION = 0.82;
    const FINISHER_SLOWMO_SCALE = 0.24;

    // Clubs deal 30% less damage than the old swords.
    const PLAYER_CLUB_DAMAGE_MIN = 12.6;
    const PLAYER_CLUB_DAMAGE_BONUS = 7.0;
    const ENEMY_CLUB_DAMAGE_MIN = 11.2;
    const ENEMY_CLUB_DAMAGE_BONUS = 5.6;

    const ENEMY_BASE_HP = 100;
    const ENEMY_HP_PER_ROUND = 24;
    const ENEMY_DAMAGE_GROWTH = 0.12;
    const ENEMY_SPEED_GROWTH = 0.045;
    const ENEMY_COOLDOWN_REDUCTION = 0.045;

    const uiPlayerHealth = document.getElementById("playerHealth");
    const uiEnemyHealth = document.getElementById("enemyHealth");
    const uiBloodCoins = document.getElementById("bloodCoinsCount");
    const tournamentRankText = document.getElementById("tournamentRankText");
    const tournamentRoundText = document.getElementById("tournamentRoundText");
    const opponentHealthText = document.getElementById("opponentHealthText");
    const opponentDamageText = document.getElementById("opponentDamageText");
    const enemyNameLabel = document.getElementById("enemyNameLabel");
    const msg = document.getElementById("message");
    const subMessage = document.getElementById("subMessage");
    const messagePanel = document.getElementById("messagePanel");
    const restartBtn = document.getElementById("restartBtn");
    const damageFlash = document.getElementById("damageFlash");

    init();
    animate();

    function randomOpponentName() {
      return opponentNames[Math.floor(Math.random() * opponentNames.length)];
    }

    function getTournamentRankName(round = tournamentRound) {
      if (round >= 16) return "Arena Legend";
      if (round >= 12) return "Imperial Champion";
      if (round >= 9) return "Colosseum Terror";
      if (round >= 6) return "Blood Pit Veteran";
      if (round >= 3) return "Bronze Brawler";
      return "Sand Rookie";
    }

    function getEnemyDamageMin() {
      return ENEMY_CLUB_DAMAGE_MIN * enemyDamageMultiplier;
    }

    function getEnemyDamageMax() {
      return (ENEMY_CLUB_DAMAGE_MIN + ENEMY_CLUB_DAMAGE_BONUS) * enemyDamageMultiplier;
    }

    function getEnemyClubDamage() {
      return (ENEMY_CLUB_DAMAGE_MIN + Math.random() * ENEMY_CLUB_DAMAGE_BONUS) * enemyDamageMultiplier;
    }

    function getPlayerClubDamage() {
      return PLAYER_CLUB_DAMAGE_MIN + Math.random() * PLAYER_CLUB_DAMAGE_BONUS;
    }

    function setNewOpponentName() {
      currentEnemyName = randomOpponentName();
    }

    function configureOpponentForRound() {
      setNewOpponentName();
      enemyMaxHP = ENEMY_BASE_HP + (tournamentRound - 1) * ENEMY_HP_PER_ROUND;
      enemyHP = enemyMaxHP;
      enemyDamageMultiplier = 1 + (tournamentRound - 1) * ENEMY_DAMAGE_GROWTH;
      enemySpeedMultiplier = 1 + (tournamentRound - 1) * ENEMY_SPEED_GROWTH;
      enemyCooldownMultiplier = Math.max(0.55, 1 - (tournamentRound - 1) * ENEMY_COOLDOWN_REDUCTION);
    }

    function toonMaterial(color, extra = {}) {
      return new THREE.MeshToonMaterial({
        color,
        gradientMap: createToonGradient(),
        ...extra
      });
    }

    function createToonGradient() {
      const canvas = document.createElement("canvas");
      canvas.width = 4;
      canvas.height = 1;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#222";
      ctx.fillRect(0, 0, 1, 1);

      ctx.fillStyle = "#777";
      ctx.fillRect(1, 0, 1, 1);

      ctx.fillStyle = "#bbb";
      ctx.fillRect(2, 0, 1, 1);

      ctx.fillStyle = "#fff";
      ctx.fillRect(3, 0, 1, 1);

      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.NearestFilter;
      texture.magFilter = THREE.NearestFilter;
      return texture;
    }

    function createSandyTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext("2d");

      const baseGradient = ctx.createRadialGradient(256, 256, 20, 256, 256, 390);
      baseGradient.addColorStop(0, "#b98248");
      baseGradient.addColorStop(0.45, "#9d6838");
      baseGradient.addColorStop(1, "#6f4428");

      ctx.fillStyle = baseGradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < 9000; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const r = Math.random() * 1.55 + 0.25;
        const shade = Math.floor(105 + Math.random() * 95);
        const alpha = 0.08 + Math.random() * 0.18;

        ctx.fillStyle = `rgba(${shade + 22}, ${shade + 2}, ${Math.max(25, shade - 36)}, ${alpha})`;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      for (let i = 0; i < 185; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const length = 18 + Math.random() * 55;
        const width = 1 + Math.random() * 2.5;
        const angle = Math.random() * Math.PI * 2;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.strokeStyle = Math.random() > 0.5
          ? "rgba(62, 36, 21, 0.18)"
          : "rgba(225, 170, 100, 0.14)";
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.moveTo(-length * 0.5, 0);
        ctx.quadraticCurveTo(0, Math.random() * 12 - 6, length * 0.5, 0);
        ctx.stroke();
        ctx.restore();
      }

      for (let i = 0; i < 75; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const w = 20 + Math.random() * 70;
        const h = 8 + Math.random() * 28;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(Math.random() * Math.PI * 2);
        ctx.fillStyle = "rgba(72, 43, 24, 0.12)";
        ctx.beginPath();
        ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(8, 8);
      texture.magFilter = THREE.NearestFilter;
      texture.minFilter = THREE.NearestMipmapNearestFilter;
      texture.colorSpace = THREE.SRGBColorSpace;

      return texture;
    }

    function createStoneTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext("2d");

      const gradient = ctx.createLinearGradient(0, 0, 512, 512);
      gradient.addColorStop(0, "#8f806d");
      gradient.addColorStop(0.45, "#625846");
      gradient.addColorStop(1, "#3d3329");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 512, 512);

      for (let i = 0; i < 6500; i++) {
        const x = Math.random() * 512;
        const y = Math.random() * 512;
        const shade = Math.floor(70 + Math.random() * 95);
        const alpha = 0.06 + Math.random() * 0.22;

        ctx.fillStyle = `rgba(${shade}, ${shade - 4}, ${Math.max(35, shade - 12)}, ${alpha})`;
        ctx.fillRect(x, y, 1 + Math.random() * 3, 1 + Math.random() * 3);
      }

      for (let i = 0; i < 90; i++) {
        const x = Math.random() * 512;
        const y = Math.random() * 512;
        const length = 35 + Math.random() * 140;
        const angle = Math.random() * Math.PI * 2;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.strokeStyle = Math.random() > 0.5
          ? "rgba(20, 17, 14, 0.22)"
          : "rgba(210, 198, 176, 0.13)";
        ctx.lineWidth = 1 + Math.random() * 3;
        ctx.beginPath();
        ctx.moveTo(-length / 2, 0);
        ctx.quadraticCurveTo(0, Math.random() * 18 - 9, length / 2, Math.random() * 12 - 6);
        ctx.stroke();
        ctx.restore();
      }

      for (let i = 0; i < 26; i++) {
        const x = Math.random() * 512;
        const y = Math.random() * 512;
        const radius = 18 + Math.random() * 55;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(Math.random() * Math.PI);
        ctx.fillStyle = Math.random() > 0.5
          ? "rgba(24, 21, 18, 0.14)"
          : "rgba(205, 196, 178, 0.09)";
        ctx.beginPath();
        ctx.ellipse(0, 0, radius, radius * (0.25 + Math.random() * 0.45), 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(1.4, 1.9);
      texture.magFilter = THREE.NearestFilter;
      texture.minFilter = THREE.NearestMipmapNearestFilter;
      texture.colorSpace = THREE.SRGBColorSpace;

      return texture;
    }

    function addOutline(mesh, scale = 1.045) {
      if (!mesh.geometry) return;

      const outline = new THREE.Mesh(
        mesh.geometry,
        new THREE.MeshBasicMaterial({
          color: 0x160a05,
          side: THREE.BackSide
        })
      );

      outline.position.copy(mesh.position);
      outline.rotation.copy(mesh.rotation);
      outline.scale.copy(mesh.scale).multiplyScalar(scale);
      outline.castShadow = false;
      outline.receiveShadow = false;

      mesh.add(outline);
      outline.position.set(0, 0, 0);
      outline.rotation.set(0, 0, 0);
    }

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x120b08);
      scene.fog = new THREE.Fog(0x120b08, 26, 70);

      clock = new THREE.Clock();

      camera = new THREE.PerspectiveCamera(
        70,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      configureOpponentForRound();
      addLights();
      createArena();

      player = createGladiator({
        bodyColor: 0xb87848,
        armorColor: 0xd7d7d7,
        clothColor: 0x9e1b1b,
        skinColor: 0xd49a6a,
        x: 0,
        z: 8
      });

      enemy = createGladiator({
        bodyColor: 0x6b3421,
        armorColor: 0x8e8e8e,
        clothColor: 0x273f8f,
        skinColor: 0xb9784a,
        x: 0,
        z: -8
      });

      scene.add(player.group);
      scene.add(enemy.group);

      sword = player.sword;
      shield = player.shield;

      enemySword = enemy.sword;
      enemyShield = enemy.shield;

      setupEvents();
      updateCamera(0);
      updateUI();
    }

    function addLights() {
      const hemi = new THREE.HemisphereLight(0xffddbb, 0x21110b, 2.1);
      scene.add(hemi);

      const sun = new THREE.DirectionalLight(0xffd19a, 3.4);
      sun.position.set(10, 22, 13);
      sun.castShadow = true;
      sun.shadow.mapSize.width = 2048;
      sun.shadow.mapSize.height = 2048;
      sun.shadow.camera.near = 0.5;
      sun.shadow.camera.far = 80;
      sun.shadow.camera.left = -38;
      sun.shadow.camera.right = 38;
      sun.shadow.camera.top = 38;
      sun.shadow.camera.bottom = -38;
      scene.add(sun);

      const fireLight1 = new THREE.PointLight(0xff4c1a, 3.5, 18);

      const fireLight2 = new THREE.PointLight(0xff4c1a, 3.5, 18);

    function createArena() {
      const sandyTexture = createSandyTexture();
      const stoneTextureA = createStoneTexture();
      const stoneTextureB = createStoneTexture();

      const groundMat = toonMaterial(0xc58a4c, {
        map: sandyTexture
      });

      const ground = new THREE.Mesh(
        new THREE.CircleGeometry(ARENA_RADIUS, 128),
        groundMat
      );
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      const ringMat = toonMaterial(0x3b2115);

      const wall = new THREE.Mesh(
        new THREE.TorusGeometry(ARENA_RADIUS, 0.55, 12, 128),
        ringMat
      );
      wall.rotation.x = Math.PI / 2;
      wall.position.y = 0.25;
      wall.castShadow = true;
      wall.receiveShadow = true;
      scene.add(wall);
      addOutline(wall, 1.035);

      const pillarMatA = toonMaterial(0x847661, { map: stoneTextureA });
      const pillarMatB = toonMaterial(0x6f6454, { map: stoneTextureB });

      for (let i = 0; i < 48; i++) {
        const angle = (i / 48) * Math.PI * 2;
        const x = Math.cos(angle) * ARENA_RADIUS;
        const z = Math.sin(angle) * ARENA_RADIUS;
        const h = 2.7 + Math.random() * 1.4;

        const block = new THREE.Mesh(
          new THREE.BoxGeometry(1.5, h, 1.2),
          i % 2 ? pillarMatA : pillarMatB
        );

        block.position.set(x, h / 2 - 0.15, z);
        block.rotation.y = -angle;
        block.castShadow = true;
        block.receiveShadow = true;
        scene.add(block);
        addOutline(block, 1.035);

        const cap = new THREE.Mesh(
          new THREE.BoxGeometry(1.78, 0.22, 1.45),
          i % 2 ? pillarMatB : pillarMatA
        );
        cap.position.set(x, h - 0.02, z);
        cap.rotation.y = -angle;
        cap.castShadow = true;
        cap.receiveShadow = true;
        scene.add(cap);
        addOutline(cap, 1.035);
      }

      for (let i = 0; i < 150; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.random() * ARENA_RADIUS * 0.92;

        const stone = new THREE.Mesh(
          new THREE.DodecahedronGeometry(0.055 + Math.random() * 0.16),
          toonMaterial(Math.random() > 0.5 ? 0x6b4328 : 0x8b6038)
        );

        stone.position.set(Math.cos(a) * r, 0.06, Math.sin(a) * r);
        stone.rotation.set(Math.random(), Math.random(), Math.random());
        stone.receiveShadow = true;
        stone.castShadow = true;
        scene.add(stone);
        addOutline(stone, 1.08);
      }

      createTorches();
    }

    function createTorches() {
      const positions = [
        [-20, -20],
        [20, -20],
        [-20, 20],
        [20, 20]
      ];

      for (const [x, z] of positions) {
        const pole = new THREE.Mesh(
          new THREE.CylinderGeometry(0.18, 0.25, 4.5, 12),
          toonMaterial(0x2b160d)
        );
        pole.position.set(x, 2.25, z);
        pole.castShadow = true;
        scene.add(pole);
        addOutline(pole, 1.04);

        const bowl = new THREE.Mesh(
          new THREE.CylinderGeometry(0.62, 0.4, 0.35, 12),
          toonMaterial(0x1d0d07)
        );
        bowl.position.set(x, 4.48, z);
        bowl.castShadow = true;
        scene.add(bowl);
        addOutline(bowl, 1.04);

        const flame = new THREE.Group();
        flame.position.set(x, 4.75, z);
        scene.add(flame);

        const outerFlame = new THREE.Mesh(
          new THREE.ConeGeometry(0.55, 1.35, 8),
          new THREE.MeshBasicMaterial({ color: 0xff5a14 })
        );
        outerFlame.position.y = 0.25;

          new THREE.MeshBasicMaterial({ color: 0xffe16b })
        );
        innerFlame.position.y = 0.22;
        flame.add(innerFlame);

        flame.userData.baseY = flame.position.y;
        flame.userData.flicker = Math.random() * 10;
        flame.userData.outer = outerFlame;
        flame.userData.inner = innerFlame;

        particles.push({
          mesh: flame,
          velocity: new THREE.Vector3(),
          life: Infinity,
          maxLife: Infinity,
          type: "flame"
        });
      }
    }

    function createCartoonEye() {
      const eye = new THREE.Group();

      const whitePart = new THREE.Mesh(
        new THREE.SphereGeometry(0.115, 20, 20),
        toonMaterial(0xffffff)
      );
      whitePart.scale.set(1.1, 1.35, 0.35);
      eye.add(whitePart);

      const pupil = new THREE.Mesh(
        new THREE.SphereGeometry(0.042, 12, 12),
        new THREE.MeshBasicMaterial({ color: 0x050505 })
      );
      pupil.position.set(0, -0.005, 0.085);
      pupil.scale.set(1, 1.2, 0.35);
      eye.add(pupil);

      const shine = new THREE.Mesh(
        new THREE.SphereGeometry(0.014, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
      );
      shine.position.set(-0.018, 0.03, 0.112);
      eye.add(shine);

      const xMark = new THREE.Group();
      xMark.visible = false;

      const xMat = new THREE.MeshBasicMaterial({ color: 0x090302 });
      const xBarA = new THREE.Mesh(new THREE.BoxGeometry(0.17, 0.026, 0.022), xMat);
      const xBarB = new THREE.Mesh(new THREE.BoxGeometry(0.17, 0.026, 0.022), xMat);
      xBarA.rotation.z = Math.PI / 4;
      xBarB.rotation.z = -Math.PI / 4;
      xBarA.position.z = 0.125;
      xBarB.position.z = 0.126;
      xMark.add(xBarA, xBarB);
      eye.add(xMark);

      const outline = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 20, 20),
        new THREE.MeshBasicMaterial({
          color: 0x120704,
          side: THREE.BackSide
        })
      );
      outline.scale.set(1.18, 1.43, 0.39);
      eye.add(outline);
      outline.renderOrder = -1;

      eye.userData.white = whitePart;
      eye.userData.pupil = pupil;
      eye.userData.shine = shine;
      eye.userData.xMark = xMark;
      eye.userData.originalScaleY = 1;

      return eye;
    }

    function setDeadEyes(g, dead) {
      g.isDead = dead;

      for (const eye of [g.leftEye, g.rightEye]) {
        eye.scale.y = 1;
        eye.userData.pupil.visible = !dead;
        eye.userData.shine.visible = !dead;
        eye.userData.xMark.visible = dead;
      }
    }

    function setupEvents() {
      document.addEventListener("keydown", e => {
        keys[e.code] = true;

        if (e.code === "KeyR") {
          restartGame();
        }
      });

      document.addEventListener("keyup", e => {
        keys[e.code] = false;
      });

      document.body.addEventListener("click", e => {
        if (e.target === restartBtn) return;

        if (!mouseLocked && !gameOver) {
          renderer.domElement.requestPointerLock();
        }
      });

      restartBtn.addEventListener("click", e => {
        e.stopPropagation();
        restartGame();
      });

      document.addEventListener("pointerlockchange", () => {
        mouseLocked = document.pointerLockElement === renderer.domElement;
      });

      document.addEventListener("mousemove", e => {
        if (!mouseLocked || gameOver) return;

        yaw -= e.movementX * 0.0022;
        pitch -= e.movementY * 0.0022;
        pitch = THREE.MathUtils.clamp(pitch, -0.7, 0.45);
      });

      document.addEventListener("mousedown", e => {
        if (gameOver) return;

        if (e.button === 0) {
          playerAttack();
        }

        if (e.button === 2) {
          isBlocking = true;
        }
      });

      document.addEventListener("mouseup", e => {
        if (e.button === 2) {
          isBlocking = false;
        }
      });

      document.addEventListener("contextmenu", e => e.preventDefault());

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    function playerAttack() {
      if (playerAttackCooldown > 0 || isBlocking) return;

      playerAttackType = choosePlayerAttackType();
      playerAttackTimer = PLAYER_ATTACK_DURATION;
      playerAttackCooldown = 0.984;
      playerHitDone = false;
    }

    function animate() {
      requestAnimationFrame(animate);

      const rawDt = Math.min(clock.getDelta(), 0.033);
      updateSlowMotion(rawDt);
      const dt = rawDt * timeScale;

      updatePlayer(dt);
      updateEnemy(dt);
      updateAnimations(dt);
      updateEnemyDeath(dt, rawDt);

      checkEnemySwordDamage();

      updateParticles(dt);
      updateFloatingTexts(dt);
      updateBloodDecals(dt);
      updateCamera(dt);
      updateUI();

      renderer.render(scene, camera);
    }

    function updatePlayer(dt) {
      if (gameOver) return;

      playerAttackCooldown = Math.max(0, playerAttackCooldown - dt);
      playerAttackTimer = Math.max(0, playerAttackTimer - dt);

      const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
      const right = new THREE.Vector3(-Math.cos(yaw), 0, Math.sin(yaw));

      const move = new THREE.Vector3();

      if (keys.KeyW) move.add(forward);
      if (keys.KeyS) move.sub(forward);
      if (keys.KeyD) move.add(right);
      if (keys.KeyA) move.sub(right);

      if (move.lengthSq() > 0) {
        move.normalize();

        player.moveLocalX = THREE.MathUtils.lerp(player.moveLocalX, move.dot(right), dt * 12);
        player.moveLocalZ = THREE.MathUtils.lerp(player.moveLocalZ, move.dot(forward), dt * 12);

        const speed = isBlocking ? PLAYER_SPEED * 0.45 : PLAYER_SPEED;
        player.group.position.addScaledVector(move, speed * dt);

        player.walkTime += dt * 10.5;
        player.dustTimer -= dt;

        if (player.dustTimer <= 0) {
          createDustPuff(player.group.position.clone(), move.clone().multiplyScalar(-1));
          player.dustTimer = 0.09;
        }
      } else {
        player.idleTime += dt;
        player.dustTimer = 0;
        player.moveLocalX = THREE.MathUtils.lerp(player.moveLocalX, 0, dt * 8);
        player.moveLocalZ = THREE.MathUtils.lerp(player.moveLocalZ, 0, dt * 8);
      }

      keepInsideArena(player.group.position);

      player.group.rotation.y = yaw;


      if (playerAttackTimer > 0 && !playerHitDone) {
        const dist = player.group.position.distanceTo(enemy.group.position);
        const attackProgress = 1 - playerAttackTimer / PLAYER_ATTACK_DURATION;
        const reach = playerAttackType === "stab" ? 3.55 : 3.15;

        if (dist < reach && isPlayerAttackInDamageWindow(attackProgress, playerAttackType)) {
          const toEnemy = enemy.group.position.clone().sub(player.group.position).normalize();
          const facing = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
          const dot = facing.dot(toEnemy);
          const requiredFacing = playerAttackType === "sideLeft" || playerAttackType === "sideRight" ? 0.24 : 0.35;

          if (dot > requiredFacing) {
            damageEnemy(getPlayerClubDamage());
            playerHitDone = true;
          }
        }
      }
    }

    function updateEnemy(dt) {
      if (gameOver) return;

      enemyAttackCooldown -= dt;
      enemyAttackTimer = Math.max(0, enemyAttackTimer - dt);

      const toPlayer = player.group.position.clone().sub(enemy.group.position);
      const dist = toPlayer.length();

      if (dist > 0.001) {
        toPlayer.normalize();
      }

      const targetYaw = Math.atan2(toPlayer.x, toPlayer.z);
      enemy.group.rotation.y = lerpAngle(enemy.group.rotation.y, targetYaw, dt * 8);

      const enemyStopDistance = 1.55;
      const enemyAttackStartDistance = 2.25;

      if (dist > enemyStopDistance && enemyAttackTimer <= 0) {
        enemy.group.position.addScaledVector(toPlayer, ENEMY_SPEED * enemySpeedMultiplier * dt);
        enemy.walkTime += dt * 9.2;

        const enemyForward = new THREE.Vector3(Math.sin(enemy.group.rotation.y), 0, Math.cos(enemy.group.rotation.y));
        const enemyRight = new THREE.Vector3(-Math.cos(enemy.group.rotation.y), 0, Math.sin(enemy.group.rotation.y));

        enemy.moveLocalX = THREE.MathUtils.lerp(enemy.moveLocalX, toPlayer.dot(enemyRight), dt * 8);
        enemy.moveLocalZ = THREE.MathUtils.lerp(enemy.moveLocalZ, toPlayer.dot(enemyForward), dt * 8);

        enemy.dustTimer -= dt;

        if (enemy.dustTimer <= 0) {
          createDustPuff(enemy.group.position.clone(), toPlayer.clone().multiplyScalar(-1));
          enemy.dustTimer = 0.12;
        }
      } else {
        enemy.idleTime += dt;
        enemy.walkTime += dt * 1.2;
        enemy.dustTimer = 0;
        enemy.moveLocalX = THREE.MathUtils.lerp(enemy.moveLocalX, 0, dt * 8);
        enemy.moveLocalZ = THREE.MathUtils.lerp(enemy.moveLocalZ, 0, dt * 8);

        if (enemyAttackCooldown <= 0 && enemyAttackTimer <= 0 && dist < enemyAttackStartDistance) {
          enemyAttackTimer = ENEMY_ATTACK_DURATION;
          enemyAttackCooldown = (1.25 + Math.random() * 0.75) * enemyCooldownMultiplier;
          enemyHitDone = false;
        }
      }

      keepInsideArena(enemy.group.position);
    }

    function startEnemyRagdoll(attacker = player) {
      const pushDir = enemy.group.position.clone().sub(attacker.group.position);
      pushDir.y = 0;

      if (pushDir.lengthSq() < 0.001) {
        pushDir.set(Math.sin(enemy.group.rotation.y), 0, Math.cos(enemy.group.rotation.y));
      }

      pushDir.normalize();

      const side = Math.random() > 0.5 ? 1 : -1;

      enemy.ragdoll = {
        elapsed: 0,
        startPosition: enemy.group.position.clone(),
        startRotation: enemy.group.rotation.clone(),
        pushDir,
        side,
        finalPitch: -1.42 - Math.random() * 0.22,
        finalRoll: side * (0.22 + Math.random() * 0.34),
        finalYaw: enemy.group.rotation.y + side * (0.22 + Math.random() * 0.42),
        slideDistance: 0.62 + Math.random() * 0.48,
        seed: Math.random() * Math.PI * 2,
        impactDone: false
      };

      enemy.moveLocalX = 0;
      enemy.moveLocalZ = 0;
      enemy.currentSway = 0;
      enemy.targetSway = 0;
    }

    function applyEnemyRagdollPose(t) {
      if (!enemy.ragdoll) return;

      const r = enemy.ragdoll;
      const p = easeInOut(t);
      const quick = easeOut(t);
      const loose = Math.max(0, 1 - t);
      const bounce = Math.sin(t * Math.PI * 4 + r.seed) * loose * 0.16;

      enemy.group.position.copy(r.startPosition);
      enemy.group.position.addScaledVector(r.pushDir, r.slideDistance * quick);
      enemy.group.position.y = Math.max(0, Math.sin(t * Math.PI) * 0.16 - t * 0.035);

      enemy.group.rotation.x = r.startRotation.x + r.finalPitch * p + bounce;
      enemy.group.rotation.y = lerpAngle(r.startRotation.y, r.finalYaw, p);
      enemy.group.rotation.z = r.startRotation.z + r.finalRoll * p + Math.sin(t * Math.PI * 3) * loose * 0.1;

      enemy.body.rotation.x = Math.sin(t * Math.PI * 3 + r.seed) * loose * 0.08;
      enemy.body.rotation.z = r.side * p * 0.18;

      enemy.rightArmPivot.rotation.x = THREE.MathUtils.lerp(-1.35, 1.32, p) + Math.sin(t * 18 + r.seed) * loose * 0.28;
      enemy.rightArmPivot.rotation.y = THREE.MathUtils.lerp(0.2, -0.35, p);
      enemy.rightArmPivot.rotation.z = THREE.MathUtils.lerp(0.88, -1.05, p) + Math.cos(t * 15 + r.seed) * loose * 0.24;

      enemy.leftArmPivot.rotation.x = THREE.MathUtils.lerp(-0.72, 1.12, p) + Math.cos(t * 16 + r.seed) * loose * 0.25;
      enemy.leftArmPivot.rotation.y = THREE.MathUtils.lerp(-0.12, 0.32, p);
      enemy.leftArmPivot.rotation.z = THREE.MathUtils.lerp(-0.55, 0.95, p) + Math.sin(t * 14 + r.seed) * loose * 0.2;

      enemy.rightLegPivot.rotation.x = THREE.MathUtils.lerp(0.18, -0.82, p) + Math.sin(t * 13 + r.seed) * loose * 0.15;
      enemy.rightLegPivot.rotation.z = r.side * p * 0.38;
      enemy.leftLegPivot.rotation.x = THREE.MathUtils.lerp(-0.18, 0.54, p) + Math.cos(t * 11 + r.seed) * loose * 0.15;
      enemy.leftLegPivot.rotation.z = -r.side * p * 0.32;

      enemy.swordPivot.position.set(0.04 + r.side * p * 0.08, -0.78 - p * 0.16, 0.02 + p * 0.1);
      enemy.swordPivot.rotation.x = -0.62 + p * 1.28;
      enemy.swordPivot.rotation.y = -0.1 + r.side * p * 0.42;
      enemy.swordPivot.rotation.z = -0.38 - r.side * p * 1.15;

      enemy.shieldPivot.position.z = 0.12 + p * 0.12;
      enemy.shieldPivot.rotation.x = -0.06 + p * 0.48;
      enemy.shieldPivot.rotation.y = 0.06 - r.side * p * 0.38;
      enemy.shieldPivot.rotation.z = r.side * p * 1.05;

      setHeadPose(enemy, p * 0.52, -r.side * p * 0.34, r.side * p * 0.28);

      if (!r.impactDone && t > 0.72) {
        r.impactDone = true;
        createDustPuff(enemy.group.position.clone(), r.pushDir.clone().multiplyScalar(-1));
        shakeCamera(0.08);
      }
    }

    function finishEnemyRagdollPose() {
      applyEnemyRagdollPose(1);
      enemy.group.position.y = 0;
      enemy.body.rotation.set(0, 0, enemy.ragdoll ? enemy.ragdoll.side * 0.18 : 0);
    }

    function updateEnemyDeath(dt, rawDt = dt) {
      if (enemyDeathTimer > 0) {
        enemyDeathTimer = Math.max(0, enemyDeathTimer - dt);
        const t = 1 - enemyDeathTimer / enemyDeathDuration;
        applyEnemyRagdollPose(t);

        if (enemyDeathTimer <= 0) {
          finishEnemyRagdollPose();
        }

        return;
      }

      if (enemyVictoryDelayTimer > 0) {
        enemyVictoryDelayTimer = Math.max(0, enemyVictoryDelayTimer - rawDt);

        if (enemyVictoryDelayTimer <= 0) {
          endGame(pendingVictoryText, pendingVictoryDetail);
        }
      }
    }

    function checkEnemySwordDamage() {
      if (gameOver || enemyHitDone || enemyAttackTimer <= 0) return;

      const progress = 1 - enemyAttackTimer / ENEMY_ATTACK_DURATION;

      if (progress < 0.4 || progress > 0.88) return;

      const toPlayer = player.group.position.clone().sub(enemy.group.position).normalize();
      const enemyFacing = new THREE.Vector3(
        Math.sin(enemy.group.rotation.y),
        0,
        Math.cos(enemy.group.rotation.y)
      );

      if (enemyFacing.dot(toPlayer) < 0.2) return;

      if (enemySwordTouchesPlayer()) {
        damagePlayer(getEnemyClubDamage());
        enemyHitDone = true;
      }
    }

    function enemySwordTouchesPlayer() {
      scene.updateMatrixWorld(true);

      const swordSamples = [
        new THREE.Vector3(0, -0.55, 0),
        new THREE.Vector3(0, -0.85, 0),
        new THREE.Vector3(0, -1.15, 0),
        new THREE.Vector3(0, -1.45, 0),
        new THREE.Vector3(0, -1.75, 0),
        new THREE.Vector3(0, -2.05, 0),
        new THREE.Vector3(0, -2.28, 0)
      ];

      const playerBase = player.group.position.clone();

      for (const sample of swordSamples) {
        const p = sample.clone().applyMatrix4(enemy.swordPivot.matrixWorld);

        const closestY = THREE.MathUtils.clamp(p.y, playerBase.y + 0.65, playerBase.y + 2.95);
        const closest = new THREE.Vector3(playerBase.x, closestY, playerBase.z);
        const dist = p.distanceTo(closest);

        if (dist < 1.22) {
          return true;
        }
      }

      return false;
    }

    function updateAnimations(dt) {
      animateGladiator(player, dt, true);
      animateGladiator(enemy, dt, false);
      updateBlinking(player, dt);
      updateBlinking(enemy, dt);
      updateHeadTracking(player, enemy, dt);
      updateHeadTracking(enemy, player, dt);
      updateEyeFocus(player, enemy.group.position.clone().add(new THREE.Vector3(0, 2.45, 0)));
      updateEyeFocus(enemy, player.group.position.clone().add(new THREE.Vector3(0, 2.45, 0)));

      if (player.hurtTimer > 0) player.hurtTimer -= dt;
      if (enemy.hurtTimer > 0) enemy.hurtTimer -= dt;

      if (player.body.material.emissive) {
        player.body.material.emissive.set(player.hurtTimer > 0 ? 0x550000 : 0x000000);
      }

      if (enemy.body.material.emissive) {
        enemy.body.material.emissive.set(enemy.hurtTimer > 0 ? 0x550000 : 0x000000);
      }
    }

    function updateBlinking(g, dt) {
      if (g.isDead) {
        g.leftEye.scale.y = 1;
        g.rightEye.scale.y = 1;
        return;
      }

      g.blinkTimer -= dt;

      if (g.blinkTimer <= 0 && g.blinkDuration <= 0) {
        g.blinkDuration = 0.15;
        g.blinkTimer = 1.6 + Math.random() * 2.8;
      }

      let eyeScaleY = 1;

      if (g.blinkDuration > 0) {
        g.blinkDuration -= dt;
        const t = 1 - Math.max(0, g.blinkDuration) / 0.15;
        eyeScaleY = 1 - Math.sin(t * Math.PI) * 0.9;
      }

      g.leftEye.scale.y = eyeScaleY;
      g.rightEye.scale.y = eyeScaleY;
    }

    function updateEyeFocus(g, targetPosition) {
      const localTarget = g.group.worldToLocal(targetPosition.clone());
      const xLook = THREE.MathUtils.clamp(localTarget.x * 0.035, -0.025, 0.025);
      const yLook = THREE.MathUtils.clamp((localTarget.y - 2.4) * 0.02, -0.015, 0.025);

      for (const eye of [g.leftEye, g.rightEye]) {
        eye.userData.pupil.position.x = xLook;
        eye.userData.pupil.position.y = yLook - 0.005;
        eye.userData.shine.position.x = xLook - 0.018;
        eye.userData.shine.position.y = yLook + 0.03;
      }
    }

    function setHeadPose(g, pitchAmount = 0, yawAmount = 0, rollAmount = 0) {
      if (!g.headPivot) return;

      const base = g.headPivot.userData.baseRotation || new THREE.Euler();
      g.headPivot.rotation.set(
        base.x + pitchAmount,
        base.y + yawAmount,
        base.z + rollAmount
      );
    }

    function updateHeadTracking(lookG, targetG, dt) {
      if (!lookG || !targetG || !lookG.headPivot || lookG.isDead) return;

      const target = targetG.group.position.clone().add(new THREE.Vector3(0, 2.65, 0));
      const localTarget = lookG.group.worldToLocal(target);
      const headLocal = lookG.headPivot.position.clone();
      const toTarget = localTarget.sub(headLocal);
      const horizontalDistance = Math.max(0.001, Math.hypot(toTarget.x, toTarget.z));

      let wantedYaw = Math.atan2(toTarget.x, toTarget.z);
      let wantedPitch = -Math.atan2(toTarget.y, horizontalDistance);

      // Prevent scary neck twisting when the target gets behind the fighter.
      if (toTarget.z < 0.15) {
        wantedYaw = THREE.MathUtils.clamp(toTarget.x * 0.16, -0.42, 0.42);
        wantedPitch = 0;
      } else {
        wantedYaw = THREE.MathUtils.clamp(wantedYaw, -0.78, 0.78);
        wantedPitch = THREE.MathUtils.clamp(wantedPitch, -0.26, 0.34);
      }

      lookG.headLookYaw = THREE.MathUtils.lerp(lookG.headLookYaw, wantedYaw, dt * 9);
      lookG.headLookPitch = THREE.MathUtils.lerp(lookG.headLookPitch, wantedPitch, dt * 9);

      setHeadPose(
        lookG,
        lookG.baseHeadPitch + lookG.headLookPitch,
        lookG.headLookYaw,
        lookG.baseHeadRoll
      );
    }

    function choosePlayerAttackType() {
      let next = PLAYER_ATTACK_TYPES[Math.floor(Math.random() * PLAYER_ATTACK_TYPES.length)];

      if (PLAYER_ATTACK_TYPES.length > 1) {
        let guard = 0;
        while (next === previousPlayerAttackType && guard < 8) {
          next = PLAYER_ATTACK_TYPES[Math.floor(Math.random() * PLAYER_ATTACK_TYPES.length)];
          guard++;
        }
      }

      previousPlayerAttackType = next;
      return next;
    }

    function isPlayerAttackInDamageWindow(progress, type) {
      if (type === "stab") return progress > 0.36 && progress < 0.68;
      if (type === "overhead") return progress > 0.42 && progress < 0.76;
      return progress > 0.34 && progress < 0.72;
    }

    function animatePlayerAttack(g, t, type) {
      g.swordPivot.position.set(0.04, -0.78, 0.02);

      if (type === "overhead") {
        if (t < 0.34) {
          const p = easeOut(t / 0.34);
          g.rightArmPivot.rotation.x = -0.35 - p * 1.8;
          g.rightArmPivot.rotation.z = -0.06 - p * 0.22;
          g.rightArmPivot.rotation.y = -0.1;
          g.swordPivot.rotation.x = -0.5 - p * 0.9;
          g.swordPivot.rotation.y = -0.05;
          g.swordPivot.rotation.z = -0.2 - p * 0.35;
        } else if (t < 0.74) {
          const p = easeInOut((t - 0.34) / 0.4);
          g.rightArmPivot.rotation.x = -2.15 + p * 2.75;
          g.rightArmPivot.rotation.z = -0.28 + p * 0.28;
          g.rightArmPivot.rotation.y = -0.1 + p * 0.12;
          g.swordPivot.rotation.x = -1.4 + p * 1.85;
          g.swordPivot.rotation.y = -0.05;
          g.swordPivot.rotation.z = -0.55 + p * 0.35;
        } else {
          const p = easeOut((t - 0.74) / 0.26);
          g.rightArmPivot.rotation.x = 0.6 - p * 0.82;
          g.rightArmPivot.rotation.z = 0.0 - p * 0.08;
          g.rightArmPivot.rotation.y = 0.02 - p * 0.12;
          g.swordPivot.rotation.x = 0.45 - p * 1.07;
          g.swordPivot.rotation.y = -0.05;
          g.swordPivot.rotation.z = -0.2 - p * 0.18;
        }
        return;
      }

      if (type === "sideLeft") {
        if (t < 0.28) {
          const p = easeOut(t / 0.28);
          g.rightArmPivot.rotation.x = -0.35 - p * 0.85;
          g.rightArmPivot.rotation.z = 0.18 + p * 1.08;
          g.rightArmPivot.rotation.y = 0.08 + p * 0.3;
          g.swordPivot.rotation.x = -0.55 - p * 0.45;
          g.swordPivot.rotation.y = 0.08 + p * 0.18;
          g.swordPivot.rotation.z = 0.36 + p * 1.62;
        } else if (t < 0.68) {
          const p = easeInOut((t - 0.28) / 0.4);
          g.rightArmPivot.rotation.x = -1.2 + p * 1.75;
          g.rightArmPivot.rotation.z = 1.26 - p * 2.08;
          g.rightArmPivot.rotation.y = 0.38 - p * 0.56;
          g.swordPivot.rotation.x = -1.0 + p * 1.18;
          g.swordPivot.rotation.y = 0.26 - p * 0.34;
          g.swordPivot.rotation.z = 1.98 - p * 3.25;
        } else {
          const p = easeOut((t - 0.68) / 0.32);
          g.rightArmPivot.rotation.x = 0.55 - p * 0.78;
          g.rightArmPivot.rotation.z = -0.82 + p * 0.96;
          g.rightArmPivot.rotation.y = -0.18 + p * 0.08;
          g.swordPivot.rotation.x = 0.18 - p * 0.8;
          g.swordPivot.rotation.y = -0.08 - p * 0.02;
          g.swordPivot.rotation.z = -1.27 + p * 0.89;
        }
        return;
      }

      if (type === "stab") {
        if (t < 0.32) {
          const p = easeOut(t / 0.32);
          g.rightArmPivot.rotation.x = -0.3 - p * 0.42;
          g.rightArmPivot.rotation.z = 0.12 - p * 0.22;
          g.rightArmPivot.rotation.y = -0.22 - p * 0.28;
          g.swordPivot.rotation.x = -0.74 + p * 0.35;
          g.swordPivot.rotation.y = -0.18;
          g.swordPivot.rotation.z = -0.45 + p * 0.16;
          g.swordPivot.position.z = 0.02 - p * 0.34;
        } else if (t < 0.66) {
          const p = easeInOut((t - 0.32) / 0.34);
          g.rightArmPivot.rotation.x = -0.72 + p * 0.38;
          g.rightArmPivot.rotation.z = -0.1 + p * 0.12;
          g.rightArmPivot.rotation.y = -0.5 + p * 0.18;
          g.swordPivot.rotation.x = -0.39 + p * 0.12;
          g.swordPivot.rotation.y = -0.18 + p * 0.08;
          g.swordPivot.rotation.z = -0.29;
          g.swordPivot.position.z = -0.32 + p * 1.1;
        } else {
          const p = easeOut((t - 0.66) / 0.34);
          g.rightArmPivot.rotation.x = -0.34 - p * 0.02;
          g.rightArmPivot.rotation.z = 0.02 + p * 0.12;
          g.rightArmPivot.rotation.y = -0.32 + p * 0.22;
          g.swordPivot.rotation.x = -0.27 - p * 0.35;
          g.swordPivot.rotation.y = -0.1;
          g.swordPivot.rotation.z = -0.29 - p * 0.09;
          g.swordPivot.position.z = 0.78 - p * 0.76;
        }
        return;
      }

      // sideRight default
      if (t < 0.28) {
        const p = easeOut(t / 0.28);
        g.rightArmPivot.rotation.x = -0.45 - p * 1.15;
        g.rightArmPivot.rotation.z = -0.2 - p * 0.95;
        g.rightArmPivot.rotation.y = -0.15 - p * 0.25;
        g.swordPivot.rotation.x = -0.45 - p * 0.65;
        g.swordPivot.rotation.y = -0.1;
        g.swordPivot.rotation.z = -0.35 - p * 1.45;
      } else if (t < 0.68) {
        const p = easeInOut((t - 0.28) / 0.4);
        g.rightArmPivot.rotation.x = -1.6 + p * 2.15;
        g.rightArmPivot.rotation.z = -1.15 + p * 1.95;
        g.rightArmPivot.rotation.y = -0.35 + p * 0.45;
        g.swordPivot.rotation.x = -1.1 + p * 1.25;
        g.swordPivot.rotation.y = -0.1 + p * 0.18;
        g.swordPivot.rotation.z = -1.8 + p * 3.05;
      } else {
        const p = easeOut((t - 0.68) / 0.32);
        g.rightArmPivot.rotation.x = 0.55 - p * 0.78;
        g.rightArmPivot.rotation.z = 0.8 - p * 1.0;
        g.rightArmPivot.rotation.y = 0.1 - p * 0.1;
        g.swordPivot.rotation.x = 0.15 - p * 0.8;
        g.swordPivot.rotation.y = 0.08 - p * 0.18;
        g.swordPivot.rotation.z = 1.25 - p * 1.6;
      }
    }

    function animateGladiator(g, dt, isPlayer) {
      const moving = isPlayer
        ? keys.KeyW || keys.KeyA || keys.KeyS || keys.KeyD
        : enemy.group.position.distanceTo(player.group.position) > 1.65 && enemyAttackTimer <= 0;

      const walkSwing = moving ? Math.sin(g.walkTime) * 0.48 : 0;
      const stepBob = moving ? Math.abs(Math.sin(g.walkTime * 1.05)) * 0.075 : 0;
      const forwardLean = moving ? -g.moveLocalZ * 0.04 : 0;

      /*
        Fixed: sway direction inverted and reduced.
        It now leans into the movement direction more naturally.
      */
      g.targetSway = g.moveLocalX * 0.11;
      g.currentSway = THREE.MathUtils.lerp(g.currentSway, g.targetSway, dt * 9);

      const shoulderSway = g.currentSway * 0.6;

      g.group.position.y = stepBob;

      if (enemyDeathTimer <= 0 || isPlayer) {
        g.body.rotation.z = g.currentSway;
        g.body.rotation.x = forwardLean;

        const headPitch = moving ? Math.sin(g.walkTime) * 0.035 + forwardLean * 0.4 : 0;
        const headRoll = g.currentSway * -0.35;
        g.baseHeadPitch = headPitch;
        g.baseHeadRoll = headRoll;
        setHeadPose(g, headPitch, 0, headRoll);
      }

      g.leftLegPivot.rotation.x = walkSwing;
      g.rightLegPivot.rotation.x = -walkSwing;

      g.leftArmPivot.rotation.x = -walkSwing * 0.28 - 0.08;
      g.rightArmPivot.rotation.x = walkSwing * 0.24 - 0.1;

      g.leftArmPivot.rotation.y = shoulderSway * 0.35;
      g.rightArmPivot.rotation.y = -shoulderSway * 0.35;

      if (isPlayer) {
        if (isBlocking) {
          g.leftArmPivot.rotation.x = -0.88;
          g.leftArmPivot.rotation.z = -0.38 + g.currentSway * 0.18;
          g.leftArmPivot.rotation.y = 0.18;
          g.shieldPivot.rotation.x = -0.05;
          g.shieldPivot.rotation.y = 0.18;
          g.shieldPivot.rotation.z = Math.sin(clock.elapsedTime * 5) * 0.025;
          g.shieldPivot.position.z = 0.5;
        } else {
          g.leftArmPivot.rotation.z = -0.18 + g.currentSway * 0.18;
          g.shieldPivot.position.z = 0.12;
          g.shieldPivot.rotation.set(-0.06, 0.06, g.currentSway * 0.06);
        }

        if (playerAttackTimer > 0) {
          const t = 1 - playerAttackTimer / PLAYER_ATTACK_DURATION;
          animatePlayerAttack(g, t, playerAttackType);
        } else {
          g.rightArmPivot.rotation.x += -0.18;
          g.rightArmPivot.rotation.z = 0.14 + g.currentSway * 0.08;
          g.swordPivot.position.set(0.04, -0.78, 0.02);
          g.swordPivot.rotation.set(-0.62, -0.1, -0.38 + g.currentSway * 0.06);
        }
      } else {
        if (enemyDeathTimer > 0) return;

        if (enemyAttackTimer > 0) {
          const t = 1 - enemyAttackTimer / ENEMY_ATTACK_DURATION;

          if (t < 0.38) {
            const p = easeOut(t / 0.38);
            g.rightArmPivot.rotation.x = -0.3 - p * 1.25;
            g.rightArmPivot.rotation.z = 0.18 + p * 1.18;
            g.rightArmPivot.rotation.y = 0.08 + p * 0.22;
            g.swordPivot.rotation.x = -0.48 - p * 0.72;
            g.swordPivot.rotation.y = 0.08;
            g.swordPivot.rotation.z = 0.35 + p * 1.55;
          } else if (t < 0.78) {
            const p = easeInOut((t - 0.38) / 0.4);
            g.rightArmPivot.rotation.x = -1.55 + p * 2.25;
            g.rightArmPivot.rotation.z = 1.36 - p * 2.2;
            g.rightArmPivot.rotation.y = 0.3 - p * 0.48;
            g.swordPivot.rotation.x = -1.2 + p * 1.35;
            g.swordPivot.rotation.y = 0.08 - p * 0.2;
            g.swordPivot.rotation.z = 1.9 - p * 3.25;
          } else {
            const p = easeOut((t - 0.78) / 0.22);
            g.rightArmPivot.rotation.x = 0.7 - p * 0.9;
            g.rightArmPivot.rotation.z = -0.84 + p * 1.08;
            g.rightArmPivot.rotation.y = -0.18 + p * 0.18;
            g.swordPivot.rotation.x = 0.15 - p * 0.77;
            g.swordPivot.rotation.y = -0.12 + p * 0.22;
            g.swordPivot.rotation.z = -1.35 + p * 1.73;
          }
        } else {
          g.swordPivot.rotation.set(-0.62, 0.1, 0.38 - g.currentSway * 0.06);
          g.leftArmPivot.rotation.x = -0.28;
          g.leftArmPivot.rotation.z = 0.32 + g.currentSway * 0.1;
          g.shieldPivot.rotation.set(-0.04, -0.08, g.currentSway * 0.06);
        }
      }
    }

    function easeOut(t) {
      t = THREE.MathUtils.clamp(t, 0, 1);
      return 1 - Math.pow(1 - t, 3);
    }

    function easeInOut(t) {
      t = THREE.MathUtils.clamp(t, 0, 1);
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function updateCamera(dt) {
      const target = player.group.position.clone();
      target.y += 1.8;

      const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
      const right = new THREE.Vector3(-Math.cos(yaw), 0, Math.sin(yaw));

      const shoulderSide = right.clone().multiplyScalar(1.85);
      const backOffset = forward.clone().multiplyScalar(-5.8);
      const heightOffset = new THREE.Vector3(0, 2.45 + Math.sin(pitch) * 1.3, 0);

      const desiredPosition = target
        .clone()
        .add(shoulderSide)
        .add(backOffset)
        .add(heightOffset);

      const aimTarget = target
        .clone()
        .add(forward.clone().multiplyScalar(8))
        .add(new THREE.Vector3(0, pitch * 4.2 + 0.35, 0));

      camera.position.copy(desiredPosition);
      camera.lookAt(aimTarget);

      const targetRoll = -player.moveLocalX * 0.055;
      cameraRoll = THREE.MathUtils.lerp(cameraRoll, targetRoll, dt * 8);
      camera.rotateZ(cameraRoll);
    }

    function triggerFinisherSlowMotion() {
      finisherSlowMoTimer = FINISHER_SLOWMO_DURATION;
      timeScale = FINISHER_SLOWMO_SCALE;
    }

    function updateSlowMotion(rawDt) {
      if (finisherSlowMoTimer > 0) {
        finisherSlowMoTimer = Math.max(0, finisherSlowMoTimer - rawDt);
        const remaining = finisherSlowMoTimer / FINISHER_SLOWMO_DURATION;
        timeScale = THREE.MathUtils.lerp(1, FINISHER_SLOWMO_SCALE, easeOut(remaining));
      } else if (timeScale !== 1) {
        timeScale = THREE.MathUtils.lerp(timeScale, 1, rawDt * 8);

        if (Math.abs(timeScale - 1) < 0.002) {
          timeScale = 1;
        }
      }
    }

    function damageEnemy(amount) {
      if (gameOver || enemyDeathTimer > 0) return;

      enemyHP = Math.max(0, enemyHP - amount);
      enemy.hurtTimer = 0.18;

      const hitPos = enemy.group.position.clone().add(new THREE.Vector3(0, 2.1, 0));
      createBloodBurst(hitPos, player.group.position);
      createFloatingText("-" + Math.round(amount), hitPos, 0xff3b30);
      shakeCamera(0.16);

      enemy.group.position.add(
        enemy.group.position.clone()
          .sub(player.group.position)
          .normalize()
          .multiplyScalar(0.45)
      );

      if (enemyHP <= 0) {
        triggerFinisherSlowMotion();
        setDeadEyes(enemy, true);
        roundWon = true;

        const earned = 25 + (tournamentRound - 1) * 5;
        bloodCoins += earned;
        updateUI();

        gameOver = true;
        isBlocking = false;
        enemyAttackTimer = 0;
        enemyDeathTimer = enemyDeathDuration;
        enemyVictoryDelayTimer = VICTORY_SCREEN_DELAY;
        startEnemyRagdoll(player);

        pendingVictoryText = "Round " + tournamentRound + " Cleared";
        pendingVictoryDetail = currentEnemyName + " was clubbed down. Next opponent awaits. +" + earned + " BloodCoins.";
        restartBtn.textContent = "Next Round";

        createFloatingText("+" + earned + " BloodCoins", enemy.group.position.clone().add(new THREE.Vector3(0, 3.1, 0)), 0xffd86f);

        if (document.pointerLockElement) {
          document.exitPointerLock();
        }
      }
    }

    function damagePlayer(amount) {
      if (gameOver) return;

      let finalDamage = amount;

      if (isBlocking) {
        finalDamage *= 0.25;
        createShieldBlockEffect(player.group.position.clone().add(new THREE.Vector3(0, 2.0, 0)));
        createFloatingText("BLOCK", player.group.position.clone().add(new THREE.Vector3(0, 2.8, 0)), 0x9de7ff);
      } else {
        createBloodBurst(player.group.position.clone().add(new THREE.Vector3(0, 2.1, 0)), enemy.group.position);
        flashDamage();
      }

      playerHP = Math.max(0, playerHP - finalDamage);
      player.hurtTimer = 0.18;

      player.group.position.add(
        player.group.position.clone()
          .sub(enemy.group.position)
          .normalize()
          .multiplyScalar(0.35)
      );

      shakeCamera(0.12);
      createFloatingText("-" + Math.round(finalDamage), player.group.position.clone().add(new THREE.Vector3(0, 2.4, 0)), 0xff3b30);

      if (playerHP <= 0) {
        setDeadEyes(player, true);
        roundWon = false;
        restartBtn.textContent = "Restart Tournament";
        endGame("Defeat", currentEnemyName + " ends your tournament run at Round " + tournamentRound + ".");
      }
    }

    function createBloodBurst(position, attackerPosition) {
      const dir = position.clone().sub(attackerPosition).normalize();

      for (let i = 0; i < 58; i++) {
        const dropletSize = 0.075 + Math.random() * 0.12;

        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(dropletSize, 10, 10),
          new THREE.MeshBasicMaterial({
            color: Math.random() > 0.28 ? 0xb30000 : 0xff1717,
            transparent: true,
            opacity: 1
          })
        );

        mesh.scale.set(
          1 + Math.random() * 0.9,
          0.65 + Math.random() * 0.7,
          1 + Math.random() * 0.9
        );

        mesh.position.copy(position);
        scene.add(mesh);

        const spread = new THREE.Vector3(
          (Math.random() - 0.5) * 2.15,
          Math.random() * 1.85,
          (Math.random() - 0.5) * 2.15
        );

        const velocity = dir.clone()
          .multiplyScalar(4.8 + Math.random() * 7.5)
          .add(spread);

        particles.push({
          mesh,
          velocity,
          life: 0.9 + Math.random() * 0.5,
          maxLife: 1.4,
          gravity: 9.5,
          type: "blood",
          startScale: mesh.scale.clone()
        });
      }

      createBloodDecal(position);
    }

    function createBloodDecal(position) {
      const splat = new THREE.Mesh(
        new THREE.CircleGeometry(0.25 + Math.random() * 0.45, 18),
        new THREE.MeshBasicMaterial({
          color: 0x5d0000,
          transparent: true,
          opacity: 0.75,
          depthWrite: false
        })
      );

      splat.rotation.x = -Math.PI / 2;
      splat.rotation.z = Math.random() * Math.PI * 2;
      splat.position.set(
        position.x + (Math.random() - 0.5) * 1.2,
        0.012,
        position.z + (Math.random() - 0.5) * 1.2
      );
      splat.scale.set(1, 0.55 + Math.random() * 0.8, 1);
      scene.add(splat);

      bloodDecals.push({
        mesh: splat,
        life: 13,
        maxLife: 13
      });
    }

    function createDustPuff(position, direction) {
      for (let i = 0; i < 7; i++) {
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.055 + Math.random() * 0.085, 8, 8),
          new THREE.MeshBasicMaterial({
            color: Math.random() > 0.5 ? 0xc5965a : 0x9f7143,
            transparent: true,
            opacity: 0.45,
            depthWrite: false
          })
        );

        mesh.position.set(
          position.x + (Math.random() - 0.5) * 0.55,
          0.09 + Math.random() * 0.08,
          position.z + (Math.random() - 0.5) * 0.55
        );

        scene.add(mesh);

        const side = new THREE.Vector3(-direction.z, 0, direction.x).multiplyScalar((Math.random() - 0.5) * 1.2);
        const velocity = direction.clone()
          .multiplyScalar(0.6 + Math.random() * 1.0)
          .add(side);

        velocity.y = 0.18 + Math.random() * 0.35;

        particles.push({
          mesh,
          velocity,
          life: 0.42 + Math.random() * 0.25,
          maxLife: 0.67,
          gravity: 0.55,
          type: "dust",
          startScale: mesh.scale.clone()
        });
      }
    }

    function createShieldBlockEffect(position) {
      for (let i = 0; i < 22; i++) {
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.045, 8, 8),
          new THREE.MeshBasicMaterial({ color: 0x9de7ff })
        );

        mesh.position.copy(position);
        scene.add(mesh);

        const angle = Math.random() * Math.PI * 2;

        particles.push({
          mesh,
          velocity: new THREE.Vector3(
            Math.cos(angle) * (2 + Math.random() * 3),
            (Math.random() - 0.2) * 2.5,
            Math.sin(angle) * (2 + Math.random() * 3)
          ),
          life: 0.45,
          maxLife: 0.45,
          gravity: 1,
          type: "shield"
        });
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        if (p.type === "flame") {
          p.mesh.userData.flicker += dt * 12;

          const s = 1 + Math.sin(p.mesh.userData.flicker) * 0.18 + Math.random() * 0.08;
          p.mesh.scale.set(0.85 * s, 1.05 * s, 0.85 * s);
          p.mesh.position.y = p.mesh.userData.baseY + Math.sin(p.mesh.userData.flicker * 1.7) * 0.08;
          p.mesh.rotation.y += dt * 1.4;

          p.mesh.userData.outer.rotation.z = Math.sin(p.mesh.userData.flicker * 0.7) * 0.12;
          p.mesh.userData.inner.rotation.z = -Math.sin(p.mesh.userData.flicker * 0.9) * 0.16;
          continue;
        }

        p.life -= dt;

        p.velocity.y -= (p.gravity || 0) * dt;
        p.mesh.position.addScaledVector(p.velocity, dt);

        p.mesh.rotation.x += dt * 8;
        p.mesh.rotation.y += dt * 7;

        const alpha = Math.max(0, p.life / p.maxLife);

        if ((p.type === "blood" || p.type === "dust") && p.startScale) {
          p.mesh.scale.copy(p.startScale).multiplyScalar(Math.max(0.18, alpha));
        } else {
          p.mesh.scale.setScalar(Math.max(0.05, alpha));
        }

        if (p.mesh.material.transparent !== undefined) {
          p.mesh.material.transparent = true;
          p.mesh.material.opacity = p.type === "dust" ? alpha * 0.45 : alpha;
        }

        if (p.mesh.position.y < 0.05 && p.type === "blood") {
          createBloodDecal(p.mesh.position);
          scene.remove(p.mesh);
          particles.splice(i, 1);
          continue;
        }

        if (p.life <= 0) {
          scene.remove(p.mesh);
          particles.splice(i, 1);
        }
      }
    }

    function createFloatingText(text, position, color) {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 160;

      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.font = "bold 54px Georgia";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.lineWidth = 8;
      ctx.strokeStyle = "rgba(0,0,0,0.85)";
      ctx.strokeText(text, 256, 80);
      ctx.fillStyle = "#" + color.toString(16).padStart(6, "0");
      ctx.fillText(text, 256, 80);

      const texture = new THREE.CanvasTexture(canvas);

      const sprite = new THREE.Sprite(
        new THREE.SpriteMaterial({
          map: texture,
          transparent: true,
          depthWrite: false
        })
      );

      sprite.position.copy(position);
      sprite.scale.set(3.2, 1.0, 1);
      scene.add(sprite);

      floatingTexts.push({
        sprite,
        life: 0.9,
        maxLife: 0.9
      });
    }

    function updateFloatingTexts(dt) {
      for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const t = floatingTexts[i];
        t.life -= dt;
        t.sprite.position.y += dt * 1.2;
        t.sprite.material.opacity = Math.max(0, t.life / t.maxLife);

        if (t.life <= 0) {
          scene.remove(t.sprite);
          floatingTexts.splice(i, 1);
        }
      }
    }

    function updateBloodDecals(dt) {
      for (let i = bloodDecals.length - 1; i >= 0; i--) {
        const d = bloodDecals[i];
        d.life -= dt;
        d.mesh.material.opacity = 0.75 * Math.max(0, d.life / d.maxLife);

        if (d.life <= 0) {
          scene.remove(d.mesh);
          bloodDecals.splice(i, 1);
        }
      }
    }

    function updateUI() {
      uiPlayerHealth.style.width = THREE.MathUtils.clamp((playerHP / playerMaxHP) * 100, 0, 100) + "%";
      uiEnemyHealth.style.width = THREE.MathUtils.clamp((enemyHP / enemyMaxHP) * 100, 0, 100) + "%";
      uiBloodCoins.textContent = bloodCoins;

      enemyNameLabel.textContent = currentEnemyName + "  •  HP " + Math.ceil(enemyHP) + "/" + enemyMaxHP + "  •  DMG " + Math.round(getEnemyDamageMin()) + "-" + Math.round(getEnemyDamageMax());
      tournamentRankText.textContent = getTournamentRankName();
      tournamentRoundText.textContent = tournamentRound;
      opponentHealthText.textContent = Math.ceil(enemyHP) + " / " + enemyMaxHP;
      opponentDamageText.textContent = Math.round(getEnemyDamageMin()) + " - " + Math.round(getEnemyDamageMax());
    }

    function flashDamage() {
      damageFlash.style.opacity = "1";
      setTimeout(() => {
        damageFlash.style.opacity = "0";
      }, 90);
    }

    function shakeCamera(amount) {
      camera.position.x += (Math.random() - 0.5) * amount;
      camera.position.y += (Math.random() - 0.5) * amount;
      camera.position.z += (Math.random() - 0.5) * amount;
    }

    function endGame(text, detail) {
      gameOver = true;
      isBlocking = false;
      restartBtn.textContent = roundWon ? "Next Round" : "Restart Tournament";
      msg.textContent = text;
      subMessage.textContent = detail || "";
      messagePanel.classList.add("show");

      if (document.pointerLockElement) {
        document.exitPointerLock();
      }
    }

    function restartGame() {
      if (roundWon) {
        tournamentRound += 1;
      } else {
        tournamentRound = 1;
      }

      roundWon = false;
      configureOpponentForRound();

      playerHP = playerMaxHP;
      gameOver = false;
      isBlocking = false;
      restartBtn.textContent = "Fight Again";

      player.group.position.set(0, 0, 8);
      enemy.group.position.set(0, 0, -8);
      enemy.group.rotation.set(0, 0, 0);

      playerAttackTimer = 0;
      playerAttackCooldown = 0;
      playerAttackType = "sideRight";
      previousPlayerAttackType = "";
      timeScale = 1;
      finisherSlowMoTimer = 0;
      enemyAttackTimer = 0;
      enemyAttackCooldown = 1.2;
      playerHitDone = false;
      enemyHitDone = false;

      enemyDeathTimer = 0;
      enemyVictoryDelayTimer = 0;
      enemy.ragdoll = null;
      pendingVictoryText = "";
      pendingVictoryDetail = "";

      setDeadEyes(player, false);
      setDeadEyes(enemy, false);

      player.blinkTimer = Math.random() * 2;
      enemy.blinkTimer = Math.random() * 2;
      player.blinkDuration = 0;
      enemy.blinkDuration = 0;

      player.moveLocalX = 0;
      player.moveLocalZ = 0;
      player.currentSway = 0;
      player.targetSway = 0;
      player.headLookYaw = 0;
      player.headLookPitch = 0;
      player.baseHeadPitch = 0;
      player.baseHeadRoll = 0;

      enemy.moveLocalX = 0;
      enemy.moveLocalZ = 0;
      enemy.currentSway = 0;
      enemy.targetSway = 0;
      enemy.headLookYaw = 0;
      enemy.headLookPitch = 0;
      enemy.baseHeadPitch = 0;
      enemy.baseHeadRoll = 0;

      cameraRoll = 0;

      player.body.rotation.set(0, 0, 0);
      enemy.body.rotation.set(0, 0, 0);
      setHeadPose(player, 0, 0, 0);
      setHeadPose(enemy, 0, 0, 0);
      player.rightArmPivot.rotation.set(0, 0, 0);
      enemy.rightArmPivot.rotation.set(0, 0, 0);
      player.leftArmPivot.rotation.set(0, 0, 0);
      enemy.leftArmPivot.rotation.set(0, 0, 0);
      player.leftLegPivot.rotation.set(0, 0, 0);
      enemy.leftLegPivot.rotation.set(0, 0, 0);
      player.rightLegPivot.rotation.set(0, 0, 0);
      enemy.rightLegPivot.rotation.set(0, 0, 0);
      player.swordPivot.position.set(0.04, -0.78, 0.02);
      enemy.swordPivot.position.set(0.04, -0.78, 0.02);
      player.swordPivot.rotation.set(0, 0, 0);
      enemy.swordPivot.rotation.set(0, 0, 0);
      player.shieldPivot.rotation.set(0, 0, 0);
      enemy.shieldPivot.rotation.set(0, 0, 0);
      player.shieldPivot.position.set(0, -0.84, 0.12);
      enemy.shieldPivot.position.set(0, -0.84, 0.12);

      messagePanel.classList.remove("show");

      for (const p of particles) {
        if (p.mesh && p.type !== "flame") scene.remove(p.mesh);
      }

      for (const t of floatingTexts) {
        scene.remove(t.sprite);
      }

      for (const d of bloodDecals) {
        scene.remove(d.mesh);
      }

      particles.splice(0, particles.length, ...particles.filter(p => p.type === "flame"));
      floatingTexts.length = 0;
      bloodDecals.length = 0;

      updateUI();
    }

    function keepInsideArena(pos) {
      const r = Math.sqrt(pos.x * pos.x + pos.z * pos.z);
      const max = ARENA_RADIUS - 2;

      if (r > max) {
        pos.x = (pos.x / r) * max;
        pos.z = (pos.z / r) * max;
      }
    }

    function lerpAngle(a, b, t) {
      const diff = Math.atan2(Math.sin(b - a), Math.cos(b - a));
      return a + diff * THREE.MathUtils.clamp(t, 0, 1);
    }
  </script>
