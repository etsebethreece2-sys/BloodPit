<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hungry Shark 2D Clone</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background: #06192b;
      cursor: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #0b3556;
    }

    #ui {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 5;
      color: white;
      pointer-events: none;
      text-shadow: 0 3px 0 rgba(0,0,0,0.35);
    }

    .panel {
      background: rgba(0, 20, 40, 0.55);
      border: 3px solid rgba(255, 255, 255, 0.25);
      border-radius: 18px;
      padding: 12px 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      backdrop-filter: blur(6px);
    }

    #stats {
      font-size: 20px;
      font-weight: 900;
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }

    #healthWrap {
      width: 260px;
      height: 24px;
      background: rgba(0,0,0,0.45);
      border-radius: 999px;
      border: 3px solid rgba(255,255,255,0.35);
      overflow: hidden;
      margin-top: 10px;
    }

    #healthBar {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #54ff72, #e5ff45);
      border-radius: 999px;
      transition: width 0.15s;
    }

    #minimap {
      position: fixed;
      right: 18px;
      top: 18px;
      width: 230px;
      height: 130px;
      background: rgba(0, 15, 35, 0.6);
      border: 3px solid rgba(255,255,255,0.25);
      border-radius: 18px;
      z-index: 4;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      pointer-events: none;
    }

    #message {
      position: fixed;
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
      z-index: 6;
      color: white;
      font-weight: 900;
      font-size: 26px;
      text-shadow: 0 4px 0 rgba(0,0,0,0.35);
      background: rgba(0, 30, 60, 0.5);
      padding: 12px 24px;
      border-radius: 999px;
      border: 3px solid rgba(255,255,255,0.25);
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }

    #message.show {
      opacity: 1;
      transform: translateX(-50%) translateY(4px);
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(18, 83, 135, 0.62), rgba(0,0,0,0.82));
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      color: white;
    }

    #menu {
      width: min(620px, 92vw);
      text-align: center;
      padding: 34px;
      border-radius: 30px;
      border: 4px solid rgba(255,255,255,0.28);
      background: rgba(0, 25, 50, 0.82);
      box-shadow: 0 25px 80px rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
    }

    #menu h1 {
      margin: 0;
      font-size: clamp(42px, 7vw, 76px);
      letter-spacing: -3px;
      text-shadow: 0 7px 0 rgba(0,0,0,0.32);
    }

    #menu p {
      font-size: 18px;
      line-height: 1.45;
      color: #dff6ff;
      margin: 16px auto 24px;
      max-width: 500px;
    }

    button {
      cursor: pointer;
      border: none;
      color: #073049;
      background: linear-gradient(#ffe96b, #ffb533);
      border-bottom: 7px solid #b97712;
      padding: 16px 28px;
      font-size: 22px;
      font-weight: 900;
      border-radius: 18px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.25);
      transition: transform 0.12s, border-bottom-width 0.12s;
    }

    button:hover {
      transform: translateY(-2px) scale(1.04);
    }

    button:active {
      transform: translateY(4px);
      border-bottom-width: 2px;
    }

    #cursorDot {
      position: fixed;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.85);
      box-shadow: 0 0 18px rgba(99,221,255,0.9);
      pointer-events: none;
      z-index: 20;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <canvas id="minimap"></canvas>

  <div id="ui">
    <div class="panel">
      <div id="stats">
        <span id="scoreText">Score: 0</span>
        <span id="coinsText">Coins: 0</span>
        <span id="levelText">Size: Pup</span>
      </div>
      <div id="healthWrap">
        <div id="healthBar"></div>
      </div>
    </div>
  </div>

  <div id="message">YUMMY!</div>
  <div id="cursorDot"></div>

  <div id="overlay">
    <div id="menu">
      <h1>Hungry Shark</h1>
      <p>
        Swim around the giant ocean, eat fish, turtles, jelly snacks and coins.
        Avoid bombs and dangerous jellyfish. Larger prey unlocks as your shark grows.
      </p>
      <button id="startButton">START HUNTING</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const mapCanvas = document.getElementById("minimap");
    const mapCtx = mapCanvas.getContext("2d");

    const scoreText = document.getElementById("scoreText");
    const coinsText = document.getElementById("coinsText");
    const levelText = document.getElementById("levelText");
    const healthBar = document.getElementById("healthBar");
    const message = document.getElementById("message");
    const cursorDot = document.getElementById("cursorDot");
    const overlay = document.getElementById("overlay");
    const startButton = document.getElementById("startButton");

    let W = window.innerWidth;
    let H = window.innerHeight;

    canvas.width = W;
    canvas.height = H;
    mapCanvas.width = 230;
    mapCanvas.height = 130;

    window.addEventListener("resize", () => {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
    });

    const WORLD = {
      w: 5200,
      h: 2300,
      surface: 160,
      floor: 2140
    };

    const pointer = {
      x: W / 2,
      y: H / 2,
      worldX: WORLD.w / 2,
      worldY: WORLD.h / 2
    };

    window.addEventListener("mousemove", e => {
      pointer.x = e.clientX;
      pointer.y = e.clientY;
      cursorDot.style.left = e.clientX + "px";
      cursorDot.style.top = e.clientY + "px";
    });

    let gameRunning = false;
    let score = 0;
    let coins = 0;
    let lastTime = 0;
    let camera = { x: 0, y: 0 };
    let shake = 0;
    let messageTimer = 0;

    const shark = {
      x: WORLD.w / 2,
      y: WORLD.h / 2,
      vx: 0,
      vy: 0,
      angle: 0,
      size: 52,
      baseSize: 52,
      health: 100,
      maxHealth: 100,
      tail: 0,
      mouth: 0,
      blink: 0,
      blinkTimer: 0,
      invincible: 0,
      eaten: 0
    };

    const foods = [];
    const coinsArr = [];
    const bubbles = [];
    const particles = [];
    const rocks = [];
    const coral = [];
    const plants = [];
    const decorations = [];
    const hazards = [];
    const schools = [];

    const foodTypes = [
      {
        name: "Tiny Fish",
        color: "#ffcc4d",
        accent: "#ff7b4d",
        size: 18,
        speed: 80,
        value: 10,
        health: 7,
        minEatSize: 0,
        rarity: 0.34
      },
      {
        name: "Blue Fish",
        color: "#45d5ff",
        accent: "#2b79ff",
        size: 24,
        speed: 95,
        value: 18,
        health: 10,
        minEatSize: 0,
        rarity: 0.24
      },
      {
        name: "Squid",
        color: "#c37cff",
        accent: "#733eff",
        size: 30,
        speed: 110,
        value: 28,
        health: 13,
        minEatSize: 58,
        rarity: 0.14
      },
      {
        name: "Turtle",
        color: "#77df67",
        accent: "#2b8c44",
        size: 38,
        speed: 50,
        value: 42,
        health: 17,
        minEatSize: 67,
        rarity: 0.11
      },
      {
        name: "Stingray",
        color: "#a5b4c7",
        accent: "#596579",
        size: 48,
        speed: 75,
        value: 65,
        health: 21,
        minEatSize: 78,
        rarity: 0.08
      },
      {
        name: "Big Tuna",
        color: "#9ee6ff",
        accent: "#3978a6",
        size: 58,
        speed: 115,
        value: 90,
        health: 26,
        minEatSize: 92,
        rarity: 0.055
      },
      {
        name: "Golden Fish",
        color: "#ffe65c",
        accent: "#ff961f",
        size: 34,
        speed: 135,
        value: 150,
        health: 35,
        minEatSize: 65,
        rarity: 0.035
      }
    ];

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function dist(a, b, c, d) {
      return Math.hypot(a - c, b - d);
    }

    function chooseFoodType() {
      const total = foodTypes.reduce((sum, f) => sum + f.rarity, 0);
      let r = Math.random() * total;
      for (const f of foodTypes) {
        r -= f.rarity;
        if (r <= 0) return f;
      }
      return foodTypes[0];
    }

    function showMessage(text) {
      message.textContent = text;
      message.classList.add("show");
      messageTimer = 1.3;
    }

    function spawnFood(x = rand(100, WORLD.w - 100), y = rand(WORLD.surface + 120, WORLD.floor - 140)) {
      const type = chooseFoodType();
      const direction = Math.random() < 0.5 ? -1 : 1;
      foods.push({
        type,
        x,
        y,
        vx: direction * rand(type.speed * 0.35, type.speed),
        vy: rand(-20, 20),
        dir: direction,
        wobble: rand(0, Math.PI * 2),
        life: 1,
        scared: 0
      });
    }

    function spawnCoin(x, y, amount = 1) {
      for (let i = 0; i < amount; i++) {
        coinsArr.push({
          x: x + rand(-25, 25),
          y: y + rand(-25, 25),
          vx: rand(-80, 80),
          vy: rand(-120, -30),
          spin: rand(0, Math.PI * 2),
          value: Math.random() < 0.08 ? 5 : 1,
          life: 18
        });
      }
    }

    function spawnBubble(x, y, amount = 1) {
      for (let i = 0; i < amount; i++) {
        bubbles.push({
          x: x + rand(-20, 20),
          y: y + rand(-10, 10),
          r: rand(2, 8),
          vx: rand(-12, 12),
          vy: rand(-55, -15),
          life: rand(1.4, 3.8),
          maxLife: 3.8
        });
      }
    }

    function spawnParticles(x, y, color, amount = 12, power = 1) {
      for (let i = 0; i < amount; i++) {
        const a = rand(0, Math.PI * 2);
        const s = rand(30, 210) * power;
        particles.push({
          x,
          y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          r: rand(2, 7) * power,
          color,
          life: rand(0.35, 0.9),
          maxLife: 0.9
        });
      }
    }

    function spawnHazard() {
      const isBomb = Math.random() < 0.45;
      hazards.push({
        type: isBomb ? "bomb" : "jelly",
        x: rand(150, WORLD.w - 150),
        y: rand(WORLD.surface + 200, WORLD.floor - 180),
        r: isBomb ? rand(26, 36) : rand(28, 42),
        vx: rand(-35, 35),
        vy: rand(-20, 20),
        wobble: rand(0, Math.PI * 2),
        pulse: 0
      });
    }

    function generateWorld() {
      rocks.length = 0;
      coral.length = 0;
      plants.length = 0;
      decorations.length = 0;
      hazards.length = 0;
      schools.length = 0;

      for (let i = 0; i < 70; i++) {
        rocks.push({
          x: rand(100, WORLD.w - 100),
          y: WORLD.floor + rand(-30, 65),
          w: rand(95, 300),
          h: rand(60, 230),
          points: Math.floor(rand(6, 11)),
          shade: rand(0.75, 1.1)
        });
      }

      for (let i = 0; i < 20; i++) {
        rocks.push({
          x: rand(220, WORLD.w - 220),
          y: rand(650, 1850),
          w: rand(160, 430),
          h: rand(110, 340),
          points: Math.floor(rand(6, 12)),
          shade: rand(0.6, 0.95),
          floating: true
        });
      }

      for (let i = 0; i < 90; i++) {
        coral.push({
          x: rand(60, WORLD.w - 60),
          y: WORLD.floor - rand(0, 80),
          size: rand(18, 55),
          color: ["#ff6fae", "#ff9f43", "#b36bff", "#55efc4", "#feca57"][Math.floor(rand(0, 5))]
        });
      }

      for (let i = 0; i < 160; i++) {
        plants.push({
          x: rand(20, WORLD.w - 20),
          y: WORLD.floor - rand(0, 40),
          h: rand(45, 160),
          sway: rand(0, Math.PI * 2),
          color: Math.random() < 0.5 ? "#1abc7c" : "#16a085"
        });
      }

      for (let i = 0; i < 80; i++) {
        decorations.push({
          type: Math.random() < 0.5 ? "star" : "shell",
          x: rand(80, WORLD.w - 80),
          y: WORLD.floor + rand(-20, 30),
          s: rand(8, 18),
          rot: rand(0, Math.PI * 2)
        });
      }

      for (let i = 0; i < 28; i++) spawnHazard();

      for (let i = 0; i < 11; i++) {
        schools.push({
          x: rand(200, WORLD.w - 200),
          y: rand(300, 1700),
          count: Math.floor(rand(8, 20)),
          color: ["#ffcc4d", "#45d5ff", "#ff6b6b"][Math.floor(rand(0, 3))],
          phase: rand(0, Math.PI * 2)
        });
      }
    }

    function resetGame() {
      gameRunning = true;
      overlay.style.display = "none";

      score = 0;
      coins = 0;
      lastTime = performance.now();

      shark.x = WORLD.w / 2;
      shark.y = WORLD.h / 2;
      shark.vx = 0;
      shark.vy = 0;
      shark.size = shark.baseSize;
      shark.health = shark.maxHealth;
      shark.tail = 0;
      shark.mouth = 0;
      shark.blink = 0;
      shark.blinkTimer = 0;
      shark.invincible = 0;
      shark.eaten = 0;

      foods.length = 0;
      coinsArr.length = 0;
      bubbles.length = 0;
      particles.length = 0;

      generateWorld();

      for (let i = 0; i < 95; i++) spawnFood();
      for (let i = 0; i < 80; i++) spawnCoin(rand(100, WORLD.w - 100), rand(WORLD.surface + 100, WORLD.floor - 100), 1);

      showMessage("GO HUNT!");
      requestAnimationFrame(loop);
    }

    startButton.addEventListener("click", resetGame);

    function update(dt) {
      if (!gameRunning) return;

      pointer.worldX = pointer.x + camera.x;
      pointer.worldY = pointer.y + camera.y;

      const targetX = clamp(pointer.worldX, 40, WORLD.w - 40);
      const targetY = clamp(pointer.worldY, WORLD.surface + 35, WORLD.floor - 80);

      const dx = targetX - shark.x;
      const dy = targetY - shark.y;
      const d = Math.hypot(dx, dy) || 1;

      const speed = clamp(d * 2.3, 150, 520);
      const accel = 5.5;

      shark.vx += (dx / d * speed - shark.vx) * accel * dt;
      shark.vy += (dy / d * speed - shark.vy) * accel * dt;

      shark.x += shark.vx * dt;
      shark.y += shark.vy * dt;

      shark.x = clamp(shark.x, 30, WORLD.w - 30);
      shark.y = clamp(shark.y, WORLD.surface + 25, WORLD.floor - 60);

      shark.angle = Math.atan2(shark.vy, shark.vx);
      shark.tail += dt * (7 + Math.hypot(shark.vx, shark.vy) / 45);
      shark.mouth = Math.max(0, shark.mouth - dt * 4);
      shark.invincible = Math.max(0, shark.invincible - dt);

      shark.blinkTimer -= dt;
      if (shark.blinkTimer <= 0) {
        shark.blink = 1;
        shark.blinkTimer = rand(2, 5);
      }
      shark.blink = Math.max(0, shark.blink - dt * 8);

      shark.health -= dt * 1.25;
      if (shark.health <= 0) endGame();

      const desiredCamX = clamp(shark.x - W * 0.48, 0, WORLD.w - W);
      const desiredCamY = clamp(shark.y - H * 0.52, 0, WORLD.h - H);

      camera.x += (desiredCamX - camera.x) * 4.5 * dt;
      camera.y += (desiredCamY - camera.y) * 4.5 * dt;

      if (shake > 0) {
        shake -= dt * 12;
        camera.x += rand(-shake, shake);
        camera.y += rand(-shake, shake);
      }

      updateFood(dt);
      updateCoins(dt);
      updateHazards(dt);
      updateBubbles(dt);
      updateParticles(dt);

      if (foods.length < 115) {
        for (let i = 0; i < 3; i++) spawnFood();
      }

      if (coinsArr.length < 80 && Math.random() < dt * 4) {
        spawnCoin(rand(100, WORLD.w - 100), rand(WORLD.surface + 80, WORLD.floor - 120), 1);
      }

      if (hazards.length < 30 && Math.random() < dt * 0.8) {
        spawnHazard();
      }

      if (Math.random() < dt * 3) {
        spawnBubble(shark.x - Math.cos(shark.angle) * shark.size, shark.y - Math.sin(shark.angle) * shark.size, 1);
      }

      messageTimer -= dt;
      if (messageTimer <= 0) message.classList.remove("show");

      updateUI();
    }

    function updateFood(dt) {
      for (let i = foods.length - 1; i >= 0; i--) {
        const f = foods[i];
        f.wobble += dt * 5;

        const away = dist(f.x, f.y, shark.x, shark.y);
        if (away < 260) {
          f.scared = 1;
          const a = Math.atan2(f.y - shark.y, f.x - shark.x);
          f.vx += Math.cos(a) * 180 * dt;
          f.vy += Math.sin(a) * 130 * dt;
        } else {
          f.scared = Math.max(0, f.scared - dt);
        }

        f.vx += Math.sin(f.wobble) * 18 * dt;
        f.vy += Math.cos(f.wobble * 0.8) * 15 * dt;

        const max = f.type.speed * (f.scared ? 1.8 : 1);
        const sp = Math.hypot(f.vx, f.vy);
        if (sp > max) {
          f.vx = f.vx / sp * max;
          f.vy = f.vy / sp * max;
        }

        f.x += f.vx * dt;
        f.y += f.vy * dt;

        if (f.x < 40 || f.x > WORLD.w - 40) f.vx *= -1;
        if (f.y < WORLD.surface + 45 || f.y > WORLD.floor - 95) f.vy *= -1;

        f.x = clamp(f.x, 40, WORLD.w - 40);
        f.y = clamp(f.y, WORLD.surface + 45, WORLD.floor - 95);
        f.dir = f.vx >= 0 ? 1 : -1;

        const biteDistance = shark.size * 0.85 + f.type.size * 0.55;
        if (dist(shark.x, shark.y, f.x, f.y) < biteDistance) {
          if (shark.size >= f.type.minEatSize) {
            eatFood(f, i);
          } else {
            damageShark(6, f.x, f.y);
            f.vx *= -1.4;
            f.vy += rand(-100, 100);
          }
        }
      }
    }

    function eatFood(f, index) {
      foods.splice(index, 1);
      score += f.type.value;
      shark.health = clamp(shark.health + f.type.health, 0, shark.maxHealth);
      shark.eaten++;
      shark.mouth = 1;

      const growth = 0.45 + f.type.value / 150;
      shark.size = clamp(shark.size + growth, shark.baseSize, 122);

      spawnParticles(f.x, f.y, f.type.color, 18, 1);
      spawnBubble(f.x, f.y, 8);

      if (Math.random() < 0.35 || f.type.name === "Golden Fish") {
        spawnCoin(f.x, f.y, f.type.name === "Golden Fish" ? 8 : 3);
      }

      if (shark.eaten % 10 === 0) showMessage("FEEDING FRENZY!");
      else if (f.type.name === "Golden Fish") showMessage("GOLDEN SNACK!");
    }

    function updateCoins(dt) {
      for (let i = coinsArr.length - 1; i >= 0; i--) {
        const c = coinsArr[i];
        c.life -= dt;
        c.spin += dt * 8;
        c.vy += 55 * dt;

        const d = dist(c.x, c.y, shark.x, shark.y);
        if (d < shark.size * 3.2) {
          const a = Math.atan2(shark.y - c.y, shark.x - c.x);
          c.vx += Math.cos(a) * 850 * dt;
          c.vy += Math.sin(a) * 850 * dt;
        }

        c.x += c.vx * dt;
        c.y += c.vy * dt;

        if (c.y > WORLD.floor - 30) {
          c.y = WORLD.floor - 30;
          c.vy *= -0.45;
          c.vx *= 0.96;
        }

        if (d < shark.size * 0.75) {
          coins += c.value;
          score += c.value * 4;
          spawnParticles(c.x, c.y, "#ffd84d", 10, 0.7);
          coinsArr.splice(i, 1);
        } else if (c.life <= 0) {
          coinsArr.splice(i, 1);
        }
      }
    }

    function updateHazards(dt) {
      for (let i = hazards.length - 1; i >= 0; i--) {
        const h = hazards[i];
        h.wobble += dt * 2;
        h.pulse += dt * 5;

        h.x += h.vx * dt + Math.sin(h.wobble) * 8 * dt;
        h.y += h.vy * dt + Math.cos(h.wobble * 1.3) * 10 * dt;

        if (h.x < 80 || h.x > WORLD.w - 80) h.vx *= -1;
        if (h.y < WORLD.surface + 100 || h.y > WORLD.floor - 150) h.vy *= -1;

        const d = dist(h.x, h.y, shark.x, shark.y);
        if (d < shark.size * 0.72 + h.r) {
          if (h.type === "bomb") {
            damageShark(28, h.x, h.y);
            spawnParticles(h.x, h.y, "#ff6b3d", 35, 1.4);
            spawnParticles(h.x, h.y, "#3a3a3a", 24, 1.5);
            hazards.splice(i, 1);
            shake = 18;
          } else {
            damageShark(11, h.x, h.y);
            const a = Math.atan2(shark.y - h.y, shark.x - h.x);
            shark.vx += Math.cos(a) * 270;
            shark.vy += Math.sin(a) * 270;
          }
        }
      }
    }

    function damageShark(amount, x, y) {
      if (shark.invincible > 0) return;
      shark.health -= amount;
      shark.invincible = 0.45;
      shark.mouth = 0.4;
      shake = 9;
      spawnParticles(x, y, "#ff334f", 14, 0.9);
      showMessage("OUCH!");
    }

    function updateBubbles(dt) {
      for (let i = bubbles.length - 1; i >= 0; i--) {
        const b = bubbles[i];
        b.life -= dt;
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.vx += Math.sin(b.y * 0.02) * 4 * dt;
        if (b.life <= 0 || b.y < 20) bubbles.splice(i, 1);
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.96;
        p.vy *= 0.96;
        p.r *= 0.985;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function updateUI() {
      scoreText.textContent = "Score: " + Math.floor(score);
      coinsText.textContent = "Coins: " + coins;

      let rank = "Pup";
      if (shark.size > 64) rank = "Hunter";
      if (shark.size > 80) rank = "Bruiser";
      if (shark.size > 98) rank = "Mega";
      if (shark.size > 116) rank = "Apex";

      levelText.textContent = "Size: " + rank;
      healthBar.style.width = clamp(shark.health / shark.maxHealth * 100, 0, 100) + "%";
    }

    function endGame() {
      gameRunning = false;
      overlay.style.display = "flex";

      document.querySelector("#menu h1").textContent = "Shark Down!";
      document.querySelector("#menu p").innerHTML =
        "Final score: <b>" + Math.floor(score) + "</b><br>" +
        "Coins collected: <b>" + coins + "</b><br><br>" +
        "Eat constantly to keep your health up and grow big enough for larger prey.";
      startButton.textContent = "PLAY AGAIN";
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      drawWaterBackground();
      ctx.save();
      ctx.translate(-camera.x, -camera.y);

      drawSunRays();
      drawSurface();
      drawDistantTerrain();
      drawSchools();
      drawPlants();
      drawRocks();
      drawDecorations();
      drawCoral();
      drawCoins();
      drawFood();
      drawHazards();
      drawBubbles();
      drawParticles();
      drawShark();

      ctx.restore();

      drawVignette();
      drawMiniMap();
    }

    function drawWaterBackground() {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#1da8d8");
      g.addColorStop(0.22, "#0e78b5");
      g.addColorStop(0.55, "#0c426f");
      g.addColorStop(1, "#061a32");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      ctx.globalAlpha = 0.08;
      for (let i = 0; i < 14; i++) {
        ctx.beginPath();
        const y = ((i * 130 - camera.y * 0.14) % H) + 40;
        ctx.moveTo(0, y);
        for (let x = 0; x <= W; x += 80) {
          ctx.lineTo(x, y + Math.sin(x * 0.015 + performance.now() * 0.001 + i) * 12);
        }
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    function drawSunRays() {
      ctx.save();
      ctx.globalAlpha = 0.08;
      const t = performance.now() * 0.0005;
      for (let i = 0; i < 9; i++) {
        const x = camera.x + i * 620 + Math.sin(t + i) * 80;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x + 220, WORLD.h);
        ctx.lineTo(x + 430, WORLD.h);
        ctx.lineTo(x + 80, 0);
        ctx.closePath();
        ctx.fillStyle = "white";
        ctx.fill();
      }
      ctx.restore();
    }

    function drawSurface() {
      const t = performance.now() * 0.002;

      ctx.save();
      ctx.globalAlpha = 0.75;
      ctx.fillStyle = "#8beaff";
      ctx.beginPath();
      ctx.moveTo(0, WORLD.surface);
      for (let x = 0; x <= WORLD.w; x += 40) {
        ctx.lineTo(x, WORLD.surface + Math.sin(x * 0.015 + t) * 14);
      }
      ctx.lineTo(WORLD.w, 0);
      ctx.lineTo(0, 0);
      ctx.closePath();
      ctx.fill();

      ctx.globalAlpha = 0.45;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 5;
      ctx.beginPath();
      for (let x = 0; x <= WORLD.w; x += 35) {
        const y = WORLD.surface + Math.sin(x * 0.015 + t) * 14;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.restore();
    }

    function drawDistantTerrain() {
      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = "#00182b";
      ctx.beginPath();
      ctx.moveTo(0, WORLD.floor - 250);
      for (let x = 0; x <= WORLD.w; x += 160) {
        ctx.lineTo(x, WORLD.floor - 250 + Math.sin(x * 0.006) * 110 + Math.sin(x * 0.018) * 45);
      }
      ctx.lineTo(WORLD.w, WORLD.h);
      ctx.lineTo(0, WORLD.h);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      ctx.fillStyle = "#08243c";
      ctx.fillRect(0, WORLD.floor, WORLD.w, WORLD.h - WORLD.floor);
    }

    function drawPlants() {
      const t = performance.now() * 0.002;
      for (const p of plants) {
        const sway = Math.sin(t + p.sway) * 18;
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 5;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.quadraticCurveTo(p.x + sway * 0.4, p.y - p.h * 0.5, p.x + sway, p.y - p.h);
        ctx.stroke();

        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.ellipse(p.x + sway, p.y - p.h, 8, 18, sway * 0.03, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawRocks() {
      for (const r of rocks) {
        ctx.save();
        ctx.translate(r.x, r.y);

        const grd = ctx.createLinearGradient(0, -r.h, 0, r.h);
        grd.addColorStop(0, `rgba(${70*r.shade}, ${91*r.shade}, ${105*r.shade}, 1)`);
        grd.addColorStop(1, `rgba(${28*r.shade}, ${43*r.shade}, ${55*r.shade}, 1)`);
        ctx.fillStyle = grd;

        ctx.beginPath();
        for (let i = 0; i < r.points; i++) {
          const a = -Math.PI + (i / r.points) * Math.PI * 2;
          const rr = 0.68 + Math.sin(i * 12.989 + r.x) * 0.15;
          const x = Math.cos(a) * r.w * 0.5 * rr;
          const y = Math.sin(a) * r.h * 0.5 * rr;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.13)";
        ctx.lineWidth = 4;
        ctx.stroke();

        ctx.globalAlpha = 0.25;
        ctx.fillStyle = "#000";
        ctx.beginPath();
        ctx.ellipse(0, r.h * 0.2, r.w * 0.22, r.h * 0.15, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    function drawCoral() {
      for (const c of coral) {
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.strokeStyle = c.color;
        ctx.lineWidth = 6;
        ctx.lineCap = "round";

        for (let i = 0; i < 4; i++) {
          const a = -Math.PI / 2 + (i - 1.5) * 0.35;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a) * c.size * 0.75, Math.sin(a) * c.size);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(Math.cos(a) * c.size * 0.38, Math.sin(a) * c.size * 0.5);
          ctx.lineTo(Math.cos(a - 0.65) * c.size * 0.6, Math.sin(a - 0.65) * c.size * 0.8);
          ctx.stroke();
        }

        ctx.restore();
      }
    }

    function drawDecorations() {
      for (const d of decorations) {
        ctx.save();
        ctx.translate(d.x, d.y);
        ctx.rotate(d.rot);

        if (d.type === "star") {
          ctx.fillStyle = "#ffcf63";
          ctx.beginPath();
          for (let i = 0; i < 10; i++) {
            const a = i / 10 * Math.PI * 2;
            const r = i % 2 === 0 ? d.s : d.s * 0.45;
            const x = Math.cos(a) * r;
            const y = Math.sin(a) * r;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.fill();
        } else {
          ctx.fillStyle = "#ffd6a6";
          ctx.beginPath();
          ctx.arc(0, 0, d.s, 0, Math.PI, true);
          ctx.lineTo(-d.s, d.s * 0.55);
          ctx.lineTo(d.s, d.s * 0.55);
          ctx.closePath();
          ctx.fill();

          ctx.strokeStyle = "rgba(120, 75, 45, 0.35)";
          ctx.lineWidth = 2;
          for (let i = -2; i <= 2; i++) {
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(i * d.s * 0.25, d.s * 0.5);
            ctx.stroke();
          }
        }

        ctx.restore();
      }
    }

    function drawSchools() {
      const t = performance.now() * 0.002;
      for (const s of schools) {
        for (let i = 0; i < s.count; i++) {
          const x = s.x + Math.sin(t + s.phase + i) * 95 + (i % 5) * 26;
          const y = s.y + Math.cos(t * 1.4 + i) * 38 + Math.floor(i / 5) * 20;
          drawTinyFish(x, y, 12, s.color, Math.sin(t + i) > 0 ? 1 : -1);
        }
      }
    }

    function drawFood() {
      for (const f of foods) {
        drawCreature(f);
      }
    }

    function drawCreature(f) {
      const type = f.type;
      ctx.save();
      ctx.translate(f.x, f.y);

      const angle = Math.atan2(f.vy, f.vx);
      ctx.rotate(angle);
      if (f.dir < 0) ctx.scale(1, -1);

      if (type.name === "Squid") {
        drawSquid(type.size, type.color, type.accent, f.wobble);
      } else if (type.name === "Turtle") {
        drawTurtle(type.size, type.color, type.accent, f.wobble);
      } else if (type.name === "Stingray") {
        drawStingray(type.size, type.color, type.accent, f.wobble);
      } else {
        drawFishBody(type.size, type.color, type.accent, f.wobble);
      }

      ctx.restore();
    }

    function drawFishBody(size, color, accent, wobble) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(0, 0, size, size * 0.48, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = accent;
      ctx.beginPath();
      ctx.moveTo(-size * 0.78, 0);
      ctx.lineTo(-size * 1.45, -size * 0.45 + Math.sin(wobble) * 3);
      ctx.lineTo(-size * 1.35, size * 0.45 + Math.sin(wobble) * 3);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(size * 0.45, -size * 0.12, size * 0.13, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#08111a";
      ctx.beginPath();
      ctx.arc(size * 0.49, -size * 0.12, size * 0.06, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(0,0,0,0.18)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(size * 0.62, size * 0.05, size * 0.16, 0.2, 1.4);
      ctx.stroke();
    }

    function drawTinyFish(x, y, size, color, dir) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(dir, 1);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(0, 0, size, size * 0.45, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(-size * 0.8, 0);
      ctx.lineTo(-size * 1.35, -size * 0.42);
      ctx.lineTo(-size * 1.35, size * 0.42);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(size * 0.45, -size * 0.08, size * 0.11, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#111";
      ctx.beginPath();
      ctx.arc(size * 0.48, -size * 0.08, size * 0.045, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawSquid(size, color, accent, wobble) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(0, 0, size * 0.7, size, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = accent;
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(-size * 0.3, i * size * 0.15);
        ctx.quadraticCurveTo(
          -size * 1.0,
          i * size * 0.2 + Math.sin(wobble + i) * 8,
          -size * 1.4,
          i * size * 0.15
        );
        ctx.lineWidth = 4;
        ctx.strokeStyle = accent;
        ctx.stroke();
      }

      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(size * 0.23, -size * 0.25, size * 0.13, 0, Math.PI * 2);
      ctx.arc(size * 0.23, size * 0.25, size * 0.13, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#111";
      ctx.beginPath();
      ctx.arc(size * 0.27, -size * 0.25, size * 0.06, 0, Math.PI * 2);
      ctx.arc(size * 0.27, size * 0.25, size * 0.06, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawTurtle(size, color, accent, wobble) {
      ctx.fillStyle = accent;
      for (let i = 0; i < 4; i++) {
        const a = i * Math.PI / 2 + Math.sin(wobble) * 0.15;
        ctx.beginPath();
        ctx.ellipse(Math.cos(a) * size * 0.62, Math.sin(a) * size * 0.42, size * 0.22, size * 0.12, a, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(0, 0, size * 0.85, size * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(0,0,0,0.25)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.ellipse(0, 0, size * 0.5, size * 0.32, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(size * 0.8, 0, size * 0.23, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(size * 0.9, -size * 0.08, size * 0.07, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#111";
      ctx.beginPath();
      ctx.arc(size * 0.93, -size * 0.08, size * 0.035, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawStingray(size, color, accent, wobble) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(size * 0.95, 0);
      ctx.quadraticCurveTo(0, -size * 0.85, -size * 0.9, 0);
      ctx.quadraticCurveTo(0, size * 0.85, size * 0.95, 0);
      ctx.fill();

      ctx.strokeStyle = accent;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(-size * 0.75, 0);
      ctx.quadraticCurveTo(-size * 1.4, Math.sin(wobble) * 20, -size * 2.0, 0);
      ctx.stroke();

      ctx.fillStyle = "#111";
      ctx.beginPath();
      ctx.arc(size * 0.28, -size * 0.16, size * 0.055, 0, Math.PI * 2);
      ctx.arc(size * 0.28, size * 0.16, size * 0.055, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawCoins() {
      for (const c of coinsArr) {
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.scale(Math.abs(Math.cos(c.spin)), 1);
        ctx.fillStyle = c.value > 1 ? "#fff36a" : "#ffd13d";
        ctx.beginPath();
        ctx.arc(0, 0, c.value > 1 ? 14 : 10, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "#b97912";
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.fillStyle = "#b97912";
        ctx.font = "bold 12px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("$", 0, 1);

        ctx.restore();
      }
    }

    function drawHazards() {
      for (const h of hazards) {
        ctx.save();
        ctx.translate(h.x, h.y);

        if (h.type === "bomb") {
          ctx.fillStyle = "#20242e";
          ctx.beginPath();
          ctx.arc(0, 0, h.r, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "#5a6270";
          ctx.lineWidth = 4;
          ctx.stroke();

          ctx.fillStyle = "#ff5a3d";
          ctx.beginPath();
          ctx.arc(h.r * 0.35, -h.r * 0.35, h.r * 0.18 + Math.sin(h.pulse) * 2, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "#191919";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(0, -h.r);
          ctx.quadraticCurveTo(h.r * 0.4, -h.r * 1.5, h.r * 0.9, -h.r * 1.25);
          ctx.stroke();
        } else {
          const pulse = Math.sin(h.pulse) * 4;

          ctx.fillStyle = "rgba(255, 120, 230, 0.72)";
          ctx.beginPath();
          ctx.arc(0, 0, h.r + pulse, Math.PI, 0);
          ctx.closePath();
          ctx.fill();

          ctx.strokeStyle = "rgba(255,255,255,0.45)";
          ctx.lineWidth = 3;
          ctx.stroke();

          ctx.strokeStyle = "rgba(255, 120, 230, 0.85)";
          ctx.lineWidth = 4;
          for (let i = -3; i <= 3; i++) {
            ctx.beginPath();
            ctx.moveTo(i * h.r * 0.22, 0);
            ctx.quadraticCurveTo(
              i * h.r * 0.24 + Math.sin(h.pulse + i) * 10,
              h.r * 0.9,
              i * h.r * 0.12,
              h.r * 1.55
            );
            ctx.stroke();
          }
        }

        ctx.restore();
      }
    }

    function drawBubbles() {
      for (const b of bubbles) {
        ctx.save();
        ctx.globalAlpha = clamp(b.life / b.maxLife, 0, 1) * 0.75;
        ctx.strokeStyle = "rgba(220,250,255,0.9)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = "rgba(255,255,255,0.35)";
        ctx.beginPath();
        ctx.arc(b.x - b.r * 0.25, b.y - b.r * 0.25, b.r * 0.22, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = clamp(p.life / p.maxLife, 0, 1);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawShark() {
      ctx.save();
      ctx.translate(shark.x, shark.y);
      ctx.rotate(shark.angle);

      const flip = Math.cos(shark.angle) < 0 ? -1 : 1;
      ctx.scale(1, flip);

      if (shark.invincible > 0 && Math.floor(performance.now() / 80) % 2 === 0) {
        ctx.globalAlpha = 0.5;
      }

      const s = shark.size;
      const tailSwing = Math.sin(shark.tail) * s * 0.28;
      const bodySquash = 1 + Math.sin(shark.tail * 0.5) * 0.025;

      ctx.save();
      ctx.scale(1, bodySquash);

      ctx.fillStyle = "#7089a8";
      ctx.beginPath();
      ctx.ellipse(0, 0, s * 1.25, s * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#d7f1ff";
      ctx.beginPath();
      ctx.ellipse(s * 0.12, s * 0.23, s * 0.72, s * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#4b6584";
      ctx.beginPath();
      ctx.moveTo(-s * 0.2, -s * 0.45);
      ctx.lineTo(-s * 0.52, -s * 1.05);
      ctx.lineTo(s * 0.18, -s * 0.46);
      ctx.closePath();
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(-s * 0.12, s * 0.43);
      ctx.lineTo(-s * 0.48, s * 0.88);
      ctx.lineTo(s * 0.24, s * 0.44);
      ctx.closePath();
      ctx.fill();

      ctx.save();
      ctx.translate(-s * 1.17, 0);
      ctx.rotate(Math.sin(shark.tail) * 0.4);
      ctx.fillStyle = "#4b6584";
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(-s * 0.75, -s * 0.58 + tailSwing * 0.1);
      ctx.lineTo(-s * 0.42, 0);
      ctx.lineTo(-s * 0.75, s * 0.58 + tailSwing * 0.1);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      const mouthOpen = shark.mouth * s * 0.18;

      ctx.fillStyle = "#20212a";
      ctx.beginPath();
      ctx.ellipse(s * 0.83, s * 0.18, s * 0.28, s * 0.12 + mouthOpen, 0.05, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "white";
      for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        const tx = s * 0.62 + i * s * 0.075;
        ctx.moveTo(tx, s * 0.1);
        ctx.lineTo(tx + s * 0.035, s * 0.22 + mouthOpen * 0.4);
        ctx.lineTo(tx + s * 0.07, s * 0.1);
        ctx.closePath();
        ctx.fill();
      }

      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(s * 0.62, -s * 0.18, s * 0.13, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#07121c";
      const eyeScale = shark.blink > 0 ? 0.15 : 1;
      ctx.beginPath();
      ctx.ellipse(s * 0.66, -s * 0.18, s * 0.055, s * 0.055 * eyeScale, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.75)";
      ctx.beginPath();
      ctx.arc(s * 0.68, -s * 0.2, s * 0.018, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(0,0,0,0.23)";
      ctx.lineWidth = 4;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.arc(s * 0.28 - i * s * 0.08, -s * 0.05, s * 0.18, -0.4, 0.45);
        ctx.stroke();
      }

      ctx.restore();
      ctx.restore();
    }

    function drawVignette() {
      const g = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.2, W / 2, H / 2, Math.max(W, H) * 0.72);
      g.addColorStop(0, "rgba(0,0,0,0)");
      g.addColorStop(1, "rgba(0,0,0,0.35)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    function drawMiniMap() {
      const mw = mapCanvas.width;
      const mh = mapCanvas.height;
      const sx = mw / WORLD.w;
      const sy = mh / WORLD.h;

      mapCtx.clearRect(0, 0, mw, mh);

      const g = mapCtx.createLinearGradient(0, 0, 0, mh);
      g.addColorStop(0, "#1da8d8");
      g.addColorStop(1, "#06213b");
      mapCtx.fillStyle = g;
      mapCtx.fillRect(0, 0, mw, mh);

      mapCtx.fillStyle = "rgba(0,0,0,0.35)";
      mapCtx.fillRect(0, WORLD.floor * sy, mw, mh - WORLD.floor * sy);

      mapCtx.fillStyle = "rgba(115, 130, 143, 0.8)";
      for (const r of rocks) {
        mapCtx.beginPath();
        mapCtx.arc(r.x * sx, r.y * sy, Math.max(1.5, r.w * sx * 0.18), 0, Math.PI * 2);
        mapCtx.fill();
      }

      mapCtx.fillStyle = "#ffdd4d";
      for (let i = 0; i < coinsArr.length; i += 4) {
        const c = coinsArr[i];
        mapCtx.fillRect(c.x * sx - 1, c.y * sy - 1, 2, 2);
      }

      mapCtx.fillStyle = "#ff6878";
      for (const h of hazards) {
        mapCtx.beginPath();
        mapCtx.arc(h.x * sx, h.y * sy, 2, 0, Math.PI * 2);
        mapCtx.fill();
      }

      mapCtx.fillStyle = "#ffffff";
      mapCtx.beginPath();
      mapCtx.arc(shark.x * sx, shark.y * sy, 4, 0, Math.PI * 2);
      mapCtx.fill();

      mapCtx.strokeStyle = "rgba(255,255,255,0.55)";
      mapCtx.lineWidth = 1.5;
      mapCtx.strokeRect(camera.x * sx, camera.y * sy, W * sx, H * sy);
    }

    function loop(now) {
      if (!gameRunning) return;

      const dt = Math.min(0.033, (now - lastTime) / 1000);
      lastTime = now;

      update(dt);
      draw();

      requestAnimationFrame(loop);
    }

    draw();

    setInterval(() => {
      if (gameRunning) {
        spawnBubble(rand(camera.x, camera.x + W), camera.y + H + 30, 2);
      }
    }, 450);
  </script>
</body>
