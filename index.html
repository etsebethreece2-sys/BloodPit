<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cartoon Tugboat Ocean</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #9fe7ff;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

    let scene, camera, renderer;
    let boat, boatBody, propeller;
    let water;
    let clock = new THREE.Clock();

    const keys = {};
    const wakeParticles = [];
    const splashParticles = [];
    const floatingProps = [];
    const waterVertices = [];

    const waterSize = 260;

    // PERFORMANCE CHANGE:
    // Lower grid means fewer animated water vertices.
    const waveGrid = 70;

    const boatState = {
      position: new THREE.Vector3(0, 0, 0),
      velocity: new THREE.Vector3(0, 0, 0),
      angle: 0,
      angularVelocity: 0,
      speed: 0,
      accelerating: false
    };

    const cameraState = {
      yaw: 0,
      pitch: 0.42,
      distance: 18,
      rightMouseDown: false,
      targetYaw: 0,
      targetPitch: 0.42
    };

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x9fe7ff);
      scene.fog = new THREE.Fog(0x9fe7ff, 70, 210);

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);

      // PERFORMANCE CHANGE:
      // Locks pixel ratio to 1 for smoother performance on high-res screens.
      renderer.setPixelRatio(1);

      renderer.shadowMap.enabled = false;
      document.body.appendChild(renderer.domElement);

      setupLights();
      createWater();
      createBoat();
      createSkyDecorations();

      window.addEventListener("resize", onResize);

      document.addEventListener("contextmenu", e => e.preventDefault());

      document.addEventListener("keydown", e => {
        keys[e.key.toLowerCase()] = true;
      });

      document.addEventListener("keyup", e => {
        keys[e.key.toLowerCase()] = false;
      });

      document.addEventListener("mousedown", e => {
        if (e.button === 2) {
          cameraState.rightMouseDown = true;
          document.body.style.cursor = "grabbing";
        }
      });

      document.addEventListener("mouseup", e => {
        if (e.button === 2) {
          cameraState.rightMouseDown = false;
          document.body.style.cursor = "default";
        }
      });

      document.addEventListener("mousemove", e => {
        if (!cameraState.rightMouseDown) return;

        cameraState.targetYaw -= e.movementX * 0.004;

        // Fixed up/down camera movement.
        cameraState.targetPitch += e.movementY * 0.003;

        cameraState.targetPitch = THREE.MathUtils.clamp(
          cameraState.targetPitch,
          -0.15,
          1.15
        );
      });

      document.addEventListener("wheel", e => {
        cameraState.distance += e.deltaY * 0.015;
        cameraState.distance = THREE.MathUtils.clamp(cameraState.distance, 10, 34);
      });
    }

    function setupLights() {
      const hemi = new THREE.HemisphereLight(0xffffff, 0x4bb7ff, 1.6);
      scene.add(hemi);

      const sun = new THREE.DirectionalLight(0xffffff, 2.6);
      sun.position.set(40, 80, 30);
      scene.add(sun);

      const rim = new THREE.DirectionalLight(0x7be7ff, 1.2);
      rim.position.set(-40, 30, -60);
      scene.add(rim);
    }

    function toonMaterial(color, emissive = 0x000000) {
      return new THREE.MeshToonMaterial({
        color,
        emissive,
        emissiveIntensity: 0.06
      });
    }

    function basicMaterial(color) {
      return new THREE.MeshBasicMaterial({ color });
    }

    function outlineObject(mesh, scale = 1.04) {
      if (!mesh.parent) return;

      const outlineMat = new THREE.MeshBasicMaterial({
        color: 0x1d3140,
        side: THREE.BackSide
      });

      const outline = new THREE.Mesh(mesh.geometry.clone(), outlineMat);
      outline.scale.copy(mesh.scale).multiplyScalar(scale);
      outline.position.copy(mesh.position);
      outline.rotation.copy(mesh.rotation);
      outline.renderOrder = -1;

      mesh.parent.add(outline);
      return outline;
    }

    function createWater() {
      const geometry = new THREE.PlaneGeometry(
        waterSize,
        waterSize,
        waveGrid,
        waveGrid
      );

      geometry.rotateX(-Math.PI / 2);

      const positions = geometry.attributes.position;

      for (let i = 0; i < positions.count; i++) {
        const x = positions.getX(i);
        const z = positions.getZ(i);

        waterVertices.push({
          x,
          z,
          offset: Math.random() * Math.PI * 2
        });
      }

      const material = new THREE.MeshToonMaterial({
        color: 0x1699bf,
        transparent: true,
        opacity: 0.96
      });

      water = new THREE.Mesh(geometry, material);
      scene.add(water);

      const lineMaterial = new THREE.LineBasicMaterial({
        color: 0x67d9ee,
        transparent: true,
        opacity: 0.28
      });

      // PERFORMANCE CHANGE:
      // Reduced ocean decorative streaks from 55 to 25.
      for (let i = 0; i < 25; i++) {
        const curve = new THREE.CatmullRomCurve3([
          new THREE.Vector3(-8, 0.08, 0),
          new THREE.Vector3(-4, 0.14, Math.sin(i) * 1.2),
          new THREE.Vector3(0, 0.08, 0),
          new THREE.Vector3(4, 0.14, Math.cos(i) * 1.2),
          new THREE.Vector3(8, 0.08, 0)
        ]);

        const points = curve.getPoints(20);
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        const line = new THREE.Line(geo, lineMaterial);

        line.position.set(
          randomRange(-waterSize / 2, waterSize / 2),
          0.35,
          randomRange(-waterSize / 2, waterSize / 2)
        );

        line.rotation.y = Math.random() * Math.PI;
        line.userData.floatOffset = Math.random() * 100;

        scene.add(line);
        floatingProps.push(line);
      }
    }

    function createBoat() {
      boat = new THREE.Group();
      scene.add(boat);

      boatBody = new THREE.Group();
      boat.add(boatBody);

      const hullMat = toonMaterial(0xe94b5b);
      const darkHullMat = toonMaterial(0x9e2434);
      const deckMat = toonMaterial(0xffd36e);
      const cabinMat = toonMaterial(0xffffff);
      const roofMat = toonMaterial(0x1f7bbb);
      const windowMat = toonMaterial(0x2bdfff, 0x0abfff);
      const blackMat = toonMaterial(0x233142);
      const metalMat = toonMaterial(0x8fa7b3);
      const darkMetalMat = toonMaterial(0x4a6070);
      const ropeMat = toonMaterial(0xd49d56);

      const hull = new THREE.Mesh(
        new THREE.BoxGeometry(3.8, 1.1, 7),
        hullMat
      );
      hull.position.y = 0.55;
      hull.scale.x = 1.05;
      boatBody.add(hull);
      outlineObject(hull);

      const hullFront = new THREE.Mesh(
        new THREE.ConeGeometry(1.95, 2.6, 4),
        hullMat
      );
      hullFront.rotation.y = Math.PI / 4;
      hullFront.rotation.x = Math.PI / 2;
      hullFront.position.set(0, 0.55, -4.45);
      hullFront.scale.set(1.05, 1.25, 0.85);
      boatBody.add(hullFront);
      outlineObject(hullFront);

      const lowerHull = new THREE.Mesh(
        new THREE.BoxGeometry(3.4, 0.7, 6.6),
        darkHullMat
      );
      lowerHull.position.y = 0.05;
      boatBody.add(lowerHull);
      outlineObject(lowerHull, 1.035);

      const deck = new THREE.Mesh(
        new THREE.BoxGeometry(3.4, 0.28, 5.7),
        deckMat
      );
      deck.position.y = 1.23;
      boatBody.add(deck);
      outlineObject(deck, 1.035);

      const cabin = new THREE.Mesh(
        new THREE.BoxGeometry(2.35, 1.7, 2.25),
        cabinMat
      );
      cabin.position.set(0, 2.25, 0.25);
      boatBody.add(cabin);
      outlineObject(cabin);

      const roof = new THREE.Mesh(
        new THREE.BoxGeometry(2.75, 0.35, 2.65),
        roofMat
      );
      roof.position.set(0, 3.28, 0.25);
      boatBody.add(roof);
      outlineObject(roof);

      const chimney = new THREE.Mesh(
        new THREE.CylinderGeometry(0.28, 0.36, 1.1, 12),
        blackMat
      );
      chimney.position.set(0.65, 3.95, 0.35);
      boatBody.add(chimney);
      outlineObject(chimney);

      const chimneyTop = new THREE.Mesh(
        new THREE.CylinderGeometry(0.45, 0.45, 0.22, 12),
        darkHullMat
      );
      chimneyTop.position.set(0.65, 4.58, 0.35);
      boatBody.add(chimneyTop);
      outlineObject(chimneyTop);

      createWindow(0, 2.45, -0.9, 1.35, 0.55, 0.08);
      createWindow(-1.2, 2.45, 0.4, 0.08, 0.5, 0.8);
      createWindow(1.2, 2.45, 0.4, 0.08, 0.5, 0.8);

      createRearEngine();

      const tirePositions = [
        [-2.05, 0.9, -2.3],
        [-2.05, 0.9, 0.1],
        [-2.05, 0.9, 2.2],
        [2.05, 0.9, -2.3],
        [2.05, 0.9, 0.1],
        [2.05, 0.9, 2.2]
      ];

      tirePositions.forEach(p => {
        const tire = new THREE.Mesh(
          new THREE.TorusGeometry(0.42, 0.13, 8, 18),
          blackMat
        );

        tire.position.set(p[0], p[1], p[2]);
        tire.rotation.y = Math.PI / 2;
        boatBody.add(tire);
      });

      const railMat = toonMaterial(0xffffff);

      for (let side of [-1, 1]) {
        for (let i = -2; i <= 2; i++) {
          const post = new THREE.Mesh(
            new THREE.CylinderGeometry(0.05, 0.05, 0.65, 8),
            railMat
          );
          post.position.set(side * 1.75, 1.75, i * 1.1);
          boatBody.add(post);
        }

        const rail = new THREE.Mesh(
          new THREE.BoxGeometry(0.12, 0.12, 5.1),
          railMat
        );
        rail.position.set(side * 1.75, 2.08, 0);
        boatBody.add(rail);
      }

      const frontBumper = new THREE.Mesh(
        new THREE.TorusGeometry(0.75, 0.1, 8, 20),
        ropeMat
      );
      frontBumper.position.set(0, 1.28, -4.1);
      frontBumper.rotation.x = Math.PI / 2;
      boatBody.add(frontBumper);

      // Keeps the boat visually swapped so the engine appears at the back.
      boatBody.rotation.y = Math.PI;

      function createWindow(x, y, z, sx, sy, sz) {
        const win = new THREE.Mesh(
          new THREE.BoxGeometry(sx, sy, sz),
          windowMat
        );
        win.position.set(x, y, z);
        boatBody.add(win);
        outlineObject(win, 1.08);
      }

      function createRearEngine() {
        const engineGroup = new THREE.Group();
        engineGroup.position.set(0, 0, 0);
        boatBody.add(engineGroup);

        const engineBlock = new THREE.Mesh(
          new THREE.BoxGeometry(1.65, 0.82, 1.12),
          darkMetalMat
        );
        engineBlock.position.set(0, 1.68, 3.3);
        engineGroup.add(engineBlock);
        outlineObject(engineBlock, 1.045);

        const roundedTank = new THREE.Mesh(
          new THREE.CylinderGeometry(0.42, 0.42, 1.45, 14),
          metalMat
        );
        roundedTank.position.set(0, 2.18, 3.3);
        roundedTank.rotation.z = Math.PI / 2;
        engineGroup.add(roundedTank);
        outlineObject(roundedTank, 1.045);

        const engineTopCap = new THREE.Mesh(
          new THREE.BoxGeometry(1.25, 0.24, 0.75),
          metalMat
        );
        engineTopCap.position.set(0, 2.62, 3.3);
        engineGroup.add(engineTopCap);
        outlineObject(engineTopCap, 1.045);

        for (let i = -1; i <= 1; i++) {
          const vent = new THREE.Mesh(
            new THREE.BoxGeometry(0.18, 0.42, 0.07),
            blackMat
          );
          vent.position.set(i * 0.38, 1.72, 3.9);
          engineGroup.add(vent);
        }

        const exhaustPipe = new THREE.Mesh(
          new THREE.CylinderGeometry(0.13, 0.15, 1.25, 12),
          blackMat
        );
        exhaustPipe.position.set(0.72, 2.58, 3.25);
        exhaustPipe.rotation.x = 0.2;
        engineGroup.add(exhaustPipe);
        outlineObject(exhaustPipe, 1.045);

        const exhaustLip = new THREE.Mesh(
          new THREE.CylinderGeometry(0.21, 0.21, 0.16, 12),
          blackMat
        );
        exhaustLip.position.set(0.72, 3.23, 3.39);
        exhaustLip.rotation.x = 0.2;
        engineGroup.add(exhaustLip);
        outlineObject(exhaustLip, 1.045);

        const shaft = new THREE.Mesh(
          new THREE.CylinderGeometry(0.11, 0.11, 0.95, 12),
          metalMat
        );
        shaft.position.set(0, 0.28, 4.0);
        shaft.rotation.x = Math.PI / 2;
        engineGroup.add(shaft);

        const propellerHub = new THREE.Mesh(
          new THREE.CylinderGeometry(0.2, 0.2, 0.24, 12),
          metalMat
        );
        propellerHub.position.set(0, 0.28, 4.55);
        propellerHub.rotation.x = Math.PI / 2;
        engineGroup.add(propellerHub);

        propeller = new THREE.Group();
        propeller.position.set(0, 0.28, 4.68);
        engineGroup.add(propeller);

        for (let i = 0; i < 4; i++) {
          const blade = new THREE.Mesh(
            new THREE.BoxGeometry(0.2, 0.95, 0.08),
            metalMat
          );

          blade.position.y = 0.43;
          blade.rotation.z = i * Math.PI / 2;
          propeller.add(blade);

          // PERFORMANCE CHANGE:
          // No outline on propeller blades.
        }

        const propGuard = new THREE.Mesh(
          new THREE.TorusGeometry(0.78, 0.055, 8, 24),
          blackMat
        );
        propGuard.position.set(0, 0.28, 4.66);
        propGuard.rotation.x = Math.PI / 2;
        engineGroup.add(propGuard);

        const rudder = new THREE.Mesh(
          new THREE.BoxGeometry(0.18, 0.85, 0.55),
          darkHullMat
        );
        rudder.position.set(0, -0.05, 4.55);
        engineGroup.add(rudder);
        outlineObject(rudder);
      }
    }

    function createSkyDecorations() {
      const sun = new THREE.Mesh(
        new THREE.SphereGeometry(7, 24, 24),
        new THREE.MeshBasicMaterial({ color: 0xffee7a })
      );
      sun.position.set(-60, 65, -90);
      scene.add(sun);

      for (let i = 0; i < 12; i++) {
        const cloud = new THREE.Group();

        // PERFORMANCE CHANGE:
        // Basic material is cheaper for clouds.
        const mat = basicMaterial(0xffffff);

        for (let j = 0; j < 5; j++) {
          const puff = new THREE.Mesh(
            new THREE.SphereGeometry(randomRange(1.8, 3.5), 10, 10),
            mat
          );
          puff.position.set(
            j * 2.4 + randomRange(-0.8, 0.8),
            randomRange(-0.3, 0.8),
            randomRange(-0.6, 0.6)
          );
          cloud.add(puff);
        }

        cloud.position.set(
          randomRange(-120, 120),
          randomRange(34, 55),
          randomRange(-120, 20)
        );

        cloud.scale.setScalar(randomRange(0.8, 1.6));
        scene.add(cloud);
      }

      createIslands();
    }

    function createIslands() {
      // PERFORMANCE CHANGE:
      // Reduced islands from 24 to 14.
      for (let i = 0; i < 14; i++) {
        const island = new THREE.Group();

        const islandScale = randomRange(0.55, 2.4);
        const islandWidth = randomRange(2.2, 5.8) * islandScale;
        const islandDepth = randomRange(1.4, 4.6) * islandScale;

        const sand = new THREE.Mesh(
          new THREE.CylinderGeometry(
            islandWidth,
            islandWidth * randomRange(0.85, 1.25),
            0.5 * islandScale,
            14
          ),
          toonMaterial(0xffd785)
        );

        sand.scale.z = islandDepth / islandWidth;
        island.add(sand);
        outlineObject(sand, 1.025);

        const grass = new THREE.Mesh(
          new THREE.CylinderGeometry(
            islandWidth * 0.72,
            islandWidth * 0.84,
            0.28 * islandScale,
            14
          ),
          toonMaterial(0x4bd76d)
        );

        grass.position.y = 0.32 * islandScale;
        grass.scale.z = (islandDepth / islandWidth) * randomRange(0.75, 0.95);
        island.add(grass);
        outlineObject(grass, 1.025);

        // PERFORMANCE CHANGE:
        // Fewer trees per island.
        const treeCount = Math.floor(randomRange(1, 3 + islandScale));

        for (let t = 0; t < treeCount; t++) {
          const tree = createPalmTree(randomRange(0.7, 1.4) * islandScale);

          const angle = Math.random() * Math.PI * 2;
          const radiusX = randomRange(0.1, islandWidth * 0.55);
          const radiusZ = randomRange(0.1, islandDepth * 0.45);

          tree.position.set(
            Math.cos(angle) * radiusX,
            0.35 * islandScale,
            Math.sin(angle) * radiusZ
          );

          tree.rotation.y = Math.random() * Math.PI * 2;
          island.add(tree);
        }

        for (let r = 0; r < Math.floor(randomRange(0, 3)); r++) {
          const rock = new THREE.Mesh(
            new THREE.DodecahedronGeometry(randomRange(0.25, 0.7) * islandScale, 0),
            toonMaterial(0x9aa6a8)
          );

          const angle = Math.random() * Math.PI * 2;
          rock.position.set(
            Math.cos(angle) * islandWidth * randomRange(0.25, 0.7),
            0.55 * islandScale,
            Math.sin(angle) * islandDepth * randomRange(0.2, 0.65)
          );

          rock.scale.y = randomRange(0.45, 0.9);
          island.add(rock);

          // PERFORMANCE CHANGE:
          // No outline on small rocks.
        }

        let x = randomRange(-125, 125);
        let z = randomRange(-125, 125);

        if (Math.abs(x) < 35 && Math.abs(z) < 35) {
          x += Math.sign(x || 1) * 55;
          z += Math.sign(z || 1) * 55;
        }

        island.position.set(x, 0.1, z);
        island.rotation.y = Math.random() * Math.PI;
        scene.add(island);
      }
    }

    function createPalmTree(scale) {
      const tree = new THREE.Group();

      const trunkMat = toonMaterial(0xb8753a);

      // PERFORMANCE CHANGE:
      // Basic material for leaves is cheaper and still cartoony.
      const leafMats = [
        basicMaterial(0x31bd64),
        basicMaterial(0x3edb76),
        basicMaterial(0x239d55)
      ];

      const trunkSegments = Math.floor(randomRange(2, 4));
      const trunkHeight = randomRange(2.3, 4.4) * scale;

      for (let i = 0; i < trunkSegments; i++) {
        const segment = new THREE.Mesh(
          new THREE.CylinderGeometry(
            0.16 * scale,
            0.24 * scale,
            trunkHeight / trunkSegments,
            7
          ),
          trunkMat
        );

        segment.position.y = (i + 0.5) * (trunkHeight / trunkSegments);
        segment.position.x = Math.sin(i * 0.7) * 0.08 * scale;
        segment.rotation.z = randomRange(-0.12, 0.12);
        tree.add(segment);

        // PERFORMANCE CHANGE:
        // No outline on small trunk segments.
      }

      const leafCount = Math.floor(randomRange(4, 6));
      const leafHeight = trunkHeight + 0.15 * scale;

      for (let j = 0; j < leafCount; j++) {
        const leaf = new THREE.Mesh(
          new THREE.ConeGeometry(
            randomRange(0.35, 0.55) * scale,
            randomRange(1.8, 2.8) * scale,
            7
          ),
          leafMats[j % leafMats.length]
        );

        leaf.position.y = leafHeight;
        leaf.rotation.z = Math.PI / 2 + randomRange(-0.25, 0.25);
        leaf.rotation.y = j * Math.PI * 2 / leafCount;
        tree.add(leaf);

        // PERFORMANCE CHANGE:
        // No outline on leaves.
      }

      const coconutCount = Math.floor(randomRange(0, 3));

      for (let c = 0; c < coconutCount; c++) {
        const coconut = new THREE.Mesh(
          new THREE.SphereGeometry(0.18 * scale, 7, 7),
          basicMaterial(0x6b421f)
        );

        coconut.position.set(
          Math.cos(c * 2.1) * 0.22 * scale,
          leafHeight - 0.18 * scale,
          Math.sin(c * 2.1) * 0.22 * scale
        );

        tree.add(coconut);

        // PERFORMANCE CHANGE:
        // No outline on coconuts.
      }

      return tree;
    }

    function updateBoat(delta, time) {
      const forwardInput =
        (keys["w"] || keys["arrowup"] ? 1 : 0) -
        (keys["s"] || keys["arrowdown"] ? 1 : 0);

      const turnInput =
        (keys["a"] || keys["arrowleft"] ? 1 : 0) -
        (keys["d"] || keys["arrowright"] ? 1 : 0);

      boatState.accelerating = forwardInput !== 0;

      const boost = keys["shift"] ? 1.55 : 1;

      const forward = new THREE.Vector3(
        Math.sin(boatState.angle),
        0,
        Math.cos(boatState.angle)
      );

      const acceleration = 13 * boost;
      const turnPower = 2.2;

      boatState.velocity.addScaledVector(
        forward,
        forwardInput * acceleration * delta
      );

      const speedFactor = Math.min(boatState.velocity.length() / 12, 1);

      boatState.angularVelocity +=
        turnInput * turnPower * delta * (0.25 + speedFactor);

      boatState.velocity.multiplyScalar(Math.pow(0.965, delta * 60));
      boatState.angularVelocity *= Math.pow(0.9, delta * 60);

      const maxSpeed = keys["shift"] ? 21 : 14;

      if (boatState.velocity.length() > maxSpeed) {
        boatState.velocity.setLength(maxSpeed);
      }

      boatState.angle += boatState.angularVelocity * delta;
      boatState.position.addScaledVector(boatState.velocity, delta);

      const boundary = waterSize / 2 - 10;

      boatState.position.x = THREE.MathUtils.clamp(
        boatState.position.x,
        -boundary,
        boundary
      );

      boatState.position.z = THREE.MathUtils.clamp(
        boatState.position.z,
        -boundary,
        boundary
      );

      const waveY = getWaveHeight(
        boatState.position.x,
        boatState.position.z,
        time
      );

      const waveAhead = getWaveHeight(
        boatState.position.x + forward.x * 2,
        boatState.position.z + forward.z * 2,
        time
      );

      const side = new THREE.Vector3(forward.z, 0, -forward.x);

      const waveSide = getWaveHeight(
        boatState.position.x + side.x * 2,
        boatState.position.z + side.z * 2,
        time
      );

      boat.position.copy(boatState.position);
      boat.position.y = waveY + 0.75;
      boat.rotation.y = boatState.angle;

      const pitch = THREE.MathUtils.clamp(
        (waveAhead - waveY) * 0.28,
        -0.25,
        0.25
      );

      const roll = THREE.MathUtils.clamp(
        (waveSide - waveY) * 0.35,
        -0.3,
        0.3
      );

      boatBody.rotation.x = pitch + Math.sin(time * 3.2) * 0.025;
      boatBody.rotation.z = roll - boatState.angularVelocity * 0.18;
      boatBody.rotation.y = Math.PI;

      boatState.speed = boatState.velocity.length();

      if (propeller && boatState.accelerating) {
        const propSpeed = forwardInput > 0 ? 1 : -1;
        propeller.rotation.z += delta * propSpeed * (18 + boatState.speed * 10);
      }

      // PERFORMANCE CHANGE:
      // Particles spawn less often.
      if (boatState.speed > 3.5 && Math.random() < 0.45) {
        spawnWake(time);
      }

      if (boatState.speed > 9 && Math.random() < 0.08) {
        spawnSplash();
      }

      if (boatState.accelerating && boatState.speed > 3 && Math.random() < 0.06) {
        spawnEngineSmoke();
      }
    }

    function updateWater(time) {
      const positions = water.geometry.attributes.position;

      for (let i = 0; i < positions.count; i++) {
        const v = waterVertices[i];

        const y =
          Math.sin(v.x * 0.16 + time * 1.4 + v.offset) * 0.35 +
          Math.sin(v.z * 0.19 + time * 1.15 + v.offset) * 0.28 +
          Math.sin((v.x + v.z) * 0.07 + time * 1.8) * 0.18;

        positions.setY(i, y);
      }

      positions.needsUpdate = true;

      // PERFORMANCE CHANGE:
      // Removed expensive per-frame normal recalculation.
      // water.geometry.computeVertexNormals();
    }

    function getWaveHeight(x, z, time) {
      return (
        Math.sin(x * 0.16 + time * 1.4) * 0.35 +
        Math.sin(z * 0.19 + time * 1.15) * 0.28 +
        Math.sin((x + z) * 0.07 + time * 1.8) * 0.18
      );
    }

    function spawnWake(time) {
      const back = new THREE.Vector3(
        -Math.sin(boatState.angle),
        0,
        -Math.cos(boatState.angle)
      );

      const side = new THREE.Vector3(
        Math.cos(boatState.angle),
        0,
        -Math.sin(boatState.angle)
      );

      const particle = new THREE.Mesh(
        new THREE.SphereGeometry(randomRange(0.12, 0.3), 7, 7),
        new THREE.MeshBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0.78
        })
      );

      const spread = side.clone().multiplyScalar(randomRange(-1.1, 1.1));
      const behind = back.clone().multiplyScalar(randomRange(3.3, 4.3));

      particle.position.copy(boat.position)
        .add(behind)
        .add(spread);

      particle.position.y = getWaveHeight(
        particle.position.x,
        particle.position.z,
        time
      ) + 0.22;

      particle.userData.life = 1;
      particle.userData.maxLife = randomRange(0.65, 1.05);
      particle.userData.velocity = back.clone()
        .multiplyScalar(randomRange(1, 2.6))
        .add(side.clone().multiplyScalar(randomRange(-1, 1)));

      particle.userData.grow = randomRange(1.1, 2.0);

      scene.add(particle);
      wakeParticles.push(particle);
    }

    function spawnSplash() {
      const back = new THREE.Vector3(
        -Math.sin(boatState.angle),
        0,
        -Math.cos(boatState.angle)
      );

      const side = new THREE.Vector3(
        Math.cos(boatState.angle),
        0,
        -Math.sin(boatState.angle)
      );

      const particle = new THREE.Mesh(
        new THREE.SphereGeometry(randomRange(0.08, 0.16), 7, 7),
        new THREE.MeshBasicMaterial({
          color: 0xcfffff,
          transparent: true,
          opacity: 0.85
        })
      );

      particle.position.copy(boat.position)
        .add(back.clone().multiplyScalar(randomRange(1.2, 2.8)))
        .add(side.clone().multiplyScalar(randomRange(-1.7, 1.7)));

      particle.position.y += randomRange(0.1, 0.5);

      particle.userData.life = 1;
      particle.userData.maxLife = randomRange(0.35, 0.6);
      particle.userData.velocity = new THREE.Vector3(
        randomRange(-1.2, 1.2),
        randomRange(1.2, 2.2),
        randomRange(-1.2, 1.2)
      );

      scene.add(particle);
      splashParticles.push(particle);
    }

    function spawnEngineSmoke() {
      const back = new THREE.Vector3(
        -Math.sin(boatState.angle),
        0,
        -Math.cos(boatState.angle)
      );

      const side = new THREE.Vector3(
        Math.cos(boatState.angle),
        0,
        -Math.sin(boatState.angle)
      );

      const smoke = new THREE.Mesh(
        new THREE.SphereGeometry(randomRange(0.16, 0.3), 7, 7),
        new THREE.MeshBasicMaterial({
          color: 0x53616c,
          transparent: true,
          opacity: 0.3
        })
      );

      smoke.position.copy(boat.position)
        .add(back.clone().multiplyScalar(-2.6))
        .add(side.clone().multiplyScalar(randomRange(-0.45, 0.45)));

      smoke.position.y += 3.35;

      smoke.userData.life = 1;
      smoke.userData.maxLife = randomRange(0.75, 1.15);
      smoke.userData.velocity = new THREE.Vector3(
        randomRange(-0.2, 0.2),
        randomRange(0.55, 1.0),
        randomRange(-0.2, 0.2)
      );

      smoke.userData.grow = randomRange(1.0, 1.6);
      scene.add(smoke);
      wakeParticles.push(smoke);
    }

    function updateParticles(delta) {
      for (let i = wakeParticles.length - 1; i >= 0; i--) {
        const p = wakeParticles[i];

        p.userData.life -= delta / p.userData.maxLife;
        p.position.addScaledVector(p.userData.velocity, delta);

        p.scale.multiplyScalar(1 + delta * p.userData.grow);
        p.material.opacity = Math.max(0, p.userData.life * 0.75);

        if (p.userData.life <= 0) {
          scene.remove(p);
          p.geometry.dispose();
          p.material.dispose();
          wakeParticles.splice(i, 1);
        }
      }

      for (let i = splashParticles.length - 1; i >= 0; i--) {
        const p = splashParticles[i];

        p.userData.life -= delta / p.userData.maxLife;
        p.userData.velocity.y -= 4.8 * delta;
        p.position.addScaledVector(p.userData.velocity, delta);
        p.material.opacity = Math.max(0, p.userData.life);

        if (p.userData.life <= 0 || p.position.y < 0) {
          scene.remove(p);
          p.geometry.dispose();
          p.material.dispose();
          splashParticles.splice(i, 1);
        }
      }
    }

    function updateFloatingProps(time) {
      floatingProps.forEach(obj => {
        if (obj.type === "Line") {
          obj.position.y =
            getWaveHeight(obj.position.x, obj.position.z, time) + 0.5;
          obj.rotation.z = Math.sin(time + obj.userData.floatOffset) * 0.05;
        }
      });
    }

    function updateCamera(delta) {
      if (!cameraState.rightMouseDown) {
        cameraState.targetYaw = boatState.angle;
        cameraState.targetPitch = 0.42;
      }

      cameraState.yaw = THREE.MathUtils.lerp(
        cameraState.yaw,
        cameraState.targetYaw,
        1 - Math.pow(0.03, delta)
      );

      cameraState.pitch = THREE.MathUtils.lerp(
        cameraState.pitch,
        cameraState.targetPitch,
        1 - Math.pow(0.03, delta)
      );

      const horizontalDistance = Math.cos(cameraState.pitch) * cameraState.distance;
      const height = Math.sin(cameraState.pitch) * cameraState.distance;

      const offset = new THREE.Vector3(
        Math.sin(cameraState.yaw + Math.PI) * horizontalDistance,
        height + 3,
        Math.cos(cameraState.yaw + Math.PI) * horizontalDistance
      );

      const desiredPosition = boat.position.clone().add(offset);

      camera.position.lerp(desiredPosition, 1 - Math.pow(0.02, delta));

      const lookTarget = boat.position.clone().add(new THREE.Vector3(0, 2.4, 0));
      camera.lookAt(lookTarget);
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.033);
      const time = clock.elapsedTime;

      updateWater(time);
      updateBoat(delta, time);
      updateParticles(delta);
      updateFloatingProps(time);
      updateCamera(delta);

      renderer.render(scene, camera);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }
  </script>
</body>
</html>
