<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Gladiator Arena</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&display=swap');

    html, body {
      margin: 0;
      overflow: hidden;
      background: #120b08;
      font-family: "Cinzel", Georgia, serif;
      user-select: none;
    }

    canvas {
      display: block;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #f7e5bd;
      z-index: 10;
    }

    #topBar {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: min(920px, 92vw);
      display: flex;
      gap: 28px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border: 3px solid #8a5a24;
      border-radius: 12px;
      background:
        linear-gradient(135deg, rgba(59, 31, 14, 0.92), rgba(16, 10, 7, 0.94)),
        radial-gradient(circle at top, rgba(255, 209, 137, 0.16), transparent 55%);
      box-shadow:
        0 0 0 2px rgba(20, 10, 3, 0.9),
        0 10px 28px rgba(0,0,0,0.65),
        inset 0 0 25px rgba(255, 174, 72, 0.08);
    }

    #topBar::before,
    #topBar::after {
      content: "⚔";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 30px;
      color: #d7a54f;
      text-shadow: 0 2px 6px #000;
    }

    #topBar::before {
      left: -24px;
    }

    #topBar::after {
      right: -24px;
    }

    .healthBox {
      width: 380px;
      max-width: 42vw;
    }

    .label {
      font-size: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: #ffe7ad;
      text-shadow: 0 2px 4px #000;
      font-weight: 900;
      min-height: 19px;
    }

    .barOuter {
      height: 22px;
      border: 2px solid #b88a44;
      background: linear-gradient(#160c07, #2a170d);
      border-radius: 4px;
      overflow: hidden;
      box-shadow:
        0 0 0 2px rgba(28, 15, 7, 0.9),
        inset 0 2px 8px rgba(0,0,0,0.85),
        0 2px 12px rgba(0,0,0,0.55);
      position: relative;
    }

    .barOuter::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.11) 50%, transparent 100%);
      pointer-events: none;
    }

    .barInner {
      height: 100%;
      width: 100%;
      transition: width 0.15s ease;
    }

    #playerHealth {
      background: linear-gradient(90deg, #2f8f31, #9ccc42, #f4d35e);
    }

    #enemyHealth {
      background: linear-gradient(90deg, #7a0b0b, #c62828, #ff8a2b);
    }

    #bloodCoinsWrap {
      position: absolute;
      top: 108px;
      left: 50%;
      transform: translateX(-50%);
      padding: 9px 18px;
      border: 2px solid #b98437;
      border-radius: 999px;
      background:
        radial-gradient(circle at top, rgba(255, 215, 115, 0.2), transparent 65%),
        linear-gradient(135deg, rgba(58, 29, 12, 0.92), rgba(14, 8, 5, 0.92));
      box-shadow:
        0 0 0 2px rgba(30, 13, 4, 0.85),
        0 8px 22px rgba(0,0,0,0.55),
        inset 0 0 16px rgba(255, 190, 58, 0.12);
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #ffd86f;
      text-shadow: 0 2px 5px #000;
    }

    #messagePanel {
      position: absolute;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%) scale(0.96);
      min-width: min(520px, 86vw);
      padding: 28px 30px 26px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      background:
        radial-gradient(circle at top, rgba(255, 214, 132, 0.18), transparent 55%),
        linear-gradient(135deg, rgba(65, 34, 14, 0.96), rgba(19, 11, 6, 0.98));
      border: 4px ridge #b98437;
      border-radius: 16px;
      box-shadow:
        0 0 0 3px rgba(34, 16, 5, 0.95),
        0 18px 50px rgba(0,0,0,0.75),
        inset 0 0 26px rgba(255, 177, 63, 0.12);
      pointer-events: none;
    }

    #messagePanel.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }

    #message {
      font-size: clamp(42px, 8vw, 92px);
      font-weight: 900;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #ffe1a1;
      text-shadow:
        0 4px 0 #4a1b0a,
        0 8px 18px #000;
      margin-bottom: 10px;
    }

    #subMessage {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #f7d894;
      text-shadow: 0 2px 5px #000;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    #restartBtn {
      pointer-events: auto;
      cursor: pointer;
      border: 3px solid #d6a14a;
      border-radius: 8px;
      background: linear-gradient(#8d5520, #4d260d);
      color: #ffe7ad;
      font-family: "Cinzel", Georgia, serif;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 13px 24px;
      box-shadow:
        0 5px 0 #251006,
        0 10px 18px rgba(0,0,0,0.5),
        inset 0 2px 0 rgba(255,255,255,0.16);
    }

    #restartBtn:hover {
      filter: brightness(1.18);
      transform: translateY(-1px);
    }

    #restartBtn:active {
      transform: translateY(3px);
      box-shadow:
        0 2px 0 #251006,
        0 5px 12px rgba(0,0,0,0.5),
        inset 0 2px 0 rgba(255,255,255,0.16);
    }


    #damageFlash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(255,0,0,0.18), rgba(120,0,0,0.4));
      opacity: 0;
      transition: opacity 0.12s ease;
      pointer-events: none;
      z-index: 9;
    }


    /* Extra medieval texture pass */
    #topBar,
    #bloodCoinsWrap,
    #messagePanel {
      background-image:
        repeating-linear-gradient(45deg, rgba(255, 213, 124, 0.035) 0 2px, transparent 2px 7px),
        repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.16) 0 3px, transparent 3px 10px),
        radial-gradient(circle at 18% 0%, rgba(255, 223, 145, 0.22), transparent 42%),
        linear-gradient(135deg, rgba(67, 35, 14, 0.96), rgba(18, 9, 4, 0.98));
      border-color: #c39143;
      image-rendering: pixelated;
    }

    #topBar {
      border-style: ridge;
      border-width: 5px;
      border-radius: 10px 18px 10px 18px;
      box-shadow:
        0 0 0 3px rgba(25, 11, 3, 0.95),
        0 0 0 6px rgba(115, 70, 22, 0.42),
        0 14px 34px rgba(0, 0, 0, 0.72),
        inset 0 3px 0 rgba(255, 224, 150, 0.12),
        inset 0 -8px 18px rgba(0, 0, 0, 0.35);
    }

    .healthBox {
      position: relative;
      padding: 8px 10px 10px;
      background:
        linear-gradient(90deg, rgba(255, 218, 141, 0.045), transparent 24%, transparent 76%, rgba(0, 0, 0, 0.13)),
        rgba(18, 8, 3, 0.22);
      border: 1px solid rgba(214, 161, 74, 0.35);
      box-shadow: inset 0 0 18px rgba(0, 0, 0, 0.28);
    }

    .healthBox::before,
    .healthBox::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #f3d58d, #7c4a19 62%, #251006 100%);
      top: 7px;
      box-shadow: 0 1px 2px #000;
    }

    .healthBox::before { left: 7px; }
    .healthBox::after { right: 7px; }

    .label {
      color: #ffe6a3;
      text-shadow:
        0 2px 0 #341305,
        0 0 9px rgba(255, 183, 76, 0.28),
        0 2px 5px #000;
    }

    .barOuter {
      height: 24px;
      border: 3px ridge #c39143;
      border-radius: 2px;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.035) 0 4px, rgba(0,0,0,0.12) 4px 8px),
        linear-gradient(#0f0703, #301608);
      box-shadow:
        0 0 0 2px rgba(22, 8, 2, 0.95),
        inset 0 3px 9px rgba(0,0,0,0.95),
        inset 0 -2px 0 rgba(255, 225, 144, 0.08),
        0 3px 12px rgba(0,0,0,0.6);
    }

    .barInner {
      box-shadow:
        inset 0 5px 8px rgba(255, 255, 255, 0.18),
        inset 0 -6px 10px rgba(0, 0, 0, 0.26);
    }

    #playerHealth {
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.14) 0 5px, transparent 5px 12px),
        linear-gradient(90deg, #155b20, #719d2b, #e0bf48);
    }

    #enemyHealth {
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.11) 0 5px, transparent 5px 12px),
        linear-gradient(90deg, #510505, #a91515, #e57423);
    }

    #bloodCoinsWrap {
      border: 4px ridge #c39143;
      border-radius: 3px;
      color: #ffd86f;
      box-shadow:
        0 0 0 3px rgba(25, 11, 3, 0.92),
        0 10px 24px rgba(0,0,0,0.62),
        inset 0 2px 0 rgba(255, 238, 173, 0.13),
        inset 0 -8px 16px rgba(0,0,0,0.25);
    }

    #messagePanel {
      border: 7px ridge #bd8b37;
      border-radius: 6px 22px 6px 22px;
      box-shadow:
        0 0 0 4px rgba(27, 10, 2, 0.96),
        0 0 0 8px rgba(119, 73, 23, 0.4),
        0 22px 55px rgba(0,0,0,0.78),
        inset 0 4px 0 rgba(255, 224, 150, 0.12),
        inset 0 -14px 25px rgba(0,0,0,0.32);
    }

    #restartBtn {
      border: 4px ridge #d6a14a;
      border-radius: 3px;
      background:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0 3px, transparent 3px 8px),
        linear-gradient(#9b6328, #55270b);
      box-shadow:
        0 5px 0 #251006,
        0 10px 18px rgba(0,0,0,0.5),
        inset 0 3px 0 rgba(255,255,255,0.16),
        inset 0 -8px 12px rgba(0,0,0,0.24);
    }

    #tournamentWrap {
      position: absolute;
      top: 108px;
      right: 28px;
      min-width: 260px;
      padding: 12px 16px;
      border: 3px ridge #b98437;
      border-radius: 12px;
      background:
        radial-gradient(circle at top, rgba(255, 214, 132, 0.16), transparent 62%),
        repeating-linear-gradient(135deg, rgba(255,255,255,0.035) 0 2px, transparent 2px 7px),
        linear-gradient(135deg, rgba(61, 31, 12, 0.94), rgba(13, 8, 5, 0.96));
      box-shadow:
        0 0 0 2px rgba(30, 13, 4, 0.9),
        0 10px 26px rgba(0,0,0,0.58),
        inset 0 0 18px rgba(255, 190, 58, 0.11);
      color: #ffe2a0;
      text-shadow: 0 2px 5px #000;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      pointer-events: none;
    }


    .tournamentLine {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255, 220, 145, 0.08);
    }

    .tournamentLine span:last-child {
      color: #ffd86f;
      text-align: right;
    }


    /* Full-screen tournament bracket result display */
    #messagePanel {
      position: fixed;
      inset: 0;
      left: 0;
      top: 0;
      width: auto;
      min-width: 0;
      padding: clamp(16px, 3vw, 36px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      opacity: 0;
      transform: scale(0.985);
      transition: opacity 0.32s ease, transform 0.32s ease;
      border: 0;
      border-radius: 0;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 211, 121, 0.16), transparent 28%),
        radial-gradient(circle at 50% 110%, rgba(120, 10, 5, 0.28), transparent 52%),
        linear-gradient(135deg, rgba(18, 8, 4, 0.97), rgba(43, 18, 8, 0.98) 45%, rgba(10, 5, 3, 0.98));
      box-shadow:
        inset 0 0 0 8px rgba(126, 78, 27, 0.46),
        inset 0 0 0 18px rgba(24, 10, 3, 0.72),
        inset 0 0 90px rgba(0, 0, 0, 0.9);
      pointer-events: none;
      overflow: hidden;
    }

    #messagePanel::before,
    #messagePanel::after {
      content: "";
      position: absolute;
      inset: 22px;
      border: 3px ridge rgba(216, 161, 74, 0.72);
      pointer-events: none;
    }

    #messagePanel::after {
      inset: 42px;
      border-width: 1px;
      border-color: rgba(255, 224, 145, 0.24);
    }

    #messagePanel.show {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    #bracketCard {
      position: relative;
      width: min(1180px, 94vw);
      max-height: 90vh;
      overflow: auto;
      padding: clamp(18px, 2.8vw, 34px);
      border: 7px ridge #c39143;
      border-radius: 8px 26px 8px 26px;
      background:
        repeating-linear-gradient(45deg, rgba(255, 226, 160, 0.04) 0 4px, transparent 4px 12px),
        radial-gradient(circle at top, rgba(255, 217, 133, 0.18), transparent 48%),
        linear-gradient(135deg, rgba(86, 47, 18, 0.96), rgba(20, 10, 5, 0.98));
      box-shadow:
        0 0 0 4px rgba(31, 12, 3, 0.96),
        0 0 0 10px rgba(132, 84, 29, 0.42),
        0 24px 64px rgba(0, 0, 0, 0.82),
        inset 0 6px 0 rgba(255, 231, 173, 0.11),
        inset 0 -18px 34px rgba(0, 0, 0, 0.3);
      text-align: left;
    }

    #bracketCard::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(255, 223, 147, 0.18);
      pointer-events: none;
    }

    #bracketHeader {
      text-align: center;
      margin-bottom: 18px;
    }

    .bracketTopOrnament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #ffd86f;
      text-shadow: 0 2px 6px #000;
      margin-bottom: 8px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: clamp(12px, 1.6vw, 16px);
    }

    .bracketTopOrnament::before,
    .bracketTopOrnament::after {
      content: "";
      width: min(110px, 16vw);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 216, 111, 0.75), transparent);
      box-shadow: 0 0 8px rgba(255, 216, 111, 0.2);
    }

    #message {
      font-size: clamp(28px, 5vw, 54px);
      line-height: 0.96;
      margin-bottom: 8px;
      letter-spacing: 3px;
      text-align: center;
    }

    #subMessage {
      max-width: 900px;
      margin: 0 auto;
      font-size: clamp(13px, 1.55vw, 17px);
      line-height: 1.3;
      text-align: center;
    }

    #bracketMetaRow {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 14px 0 22px;
    }

    .bracketMeta {
      min-width: 160px;
      padding: 9px 14px;
      border: 2px ridge rgba(195, 145, 67, 0.82);
      background:
        radial-gradient(circle at top, rgba(255, 222, 146, 0.12), transparent 65%),
        linear-gradient(135deg, rgba(38, 17, 7, 0.82), rgba(9, 4, 2, 0.78));
      box-shadow: inset 0 0 12px rgba(255, 190, 58, 0.06), 0 6px 14px rgba(0,0,0,0.24);
      text-align: center;
    }

    .bracketMeta span {
      display: block;
      margin-bottom: 4px;
      color: #dcb062;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1.8px;
      text-transform: uppercase;
    }

    .bracketMeta strong {
      display: block;
      color: #ffe7ad;
      font-size: clamp(12px, 1.45vw, 16px);
      text-shadow: 0 2px 5px #000;
    }

    #bracketLayout {
      display: grid;
      grid-template-columns: minmax(260px, 1.38fr) minmax(180px, 1fr) minmax(160px, 0.85fr) minmax(150px, 0.78fr);
      gap: clamp(16px, 2vw, 28px);
      align-items: stretch;
      margin-bottom: 22px;
    }

    .bracketColumn {
      position: relative;
      min-height: 380px;
    }

    .bracketColumnTitle {
      margin-bottom: 14px;
      color: #e1b567;
      font-size: clamp(11px, 1.2vw, 14px);
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 0 2px 4px #000;
    }

    #quarterfinalMatches,
    #semifinalMatches,
    #finalMatches {
      display: flex;
      flex-direction: column;
    }

    #quarterfinalMatches {
      gap: 12px;
      justify-content: space-between;
      height: calc(100% - 32px);
    }

    #semifinalMatches {
      gap: 30px;
      justify-content: space-around;
      padding-top: 30px;
      height: calc(100% - 32px);
    }

    #finalMatches {
      gap: 62px;
      justify-content: center;
      padding-top: 116px;
      height: calc(100% - 32px);
    }

    .bracketMatch {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 72px;
      padding-right: 18px;
    }

    .bracketMatch::after {
      content: "";
      position: absolute;
      top: 50%;
      right: -16px;
      width: 18px;
      border-top: 2px solid rgba(214, 161, 74, 0.7);
      transform: translateY(-50%);
      box-shadow: 0 0 8px rgba(214, 161, 74, 0.14);
    }

    .bracketAdvancer {
      position: relative;
      min-height: 52px;
      display: flex;
      align-items: center;
      padding-left: 18px;
    }

    .bracketAdvancer::before {
      content: "";
      position: absolute;
      left: -18px;
      top: 50%;
      width: 18px;
      border-top: 2px solid rgba(214, 161, 74, 0.7);
      transform: translateY(-50%);
      box-shadow: 0 0 8px rgba(214, 161, 74, 0.14);
    }

    .bracketAdvancer::after {
      content: "";
      position: absolute;
      right: -18px;
      top: 50%;
      width: 18px;
      border-top: 2px solid rgba(214, 161, 74, 0.7);
      transform: translateY(-50%);
      box-shadow: 0 0 8px rgba(214, 161, 74, 0.14);
    }

    #semifinalMatches .bracketAdvancer::before,
    #finalMatches .bracketAdvancer::before {
      height: 62px;
      border-left: 2px solid rgba(214, 161, 74, 0.55);
      top: 50%;
      transform: translateY(-50%);
    }

    #finalMatches .bracketAdvancer::before {
      height: 124px;
    }

    .bracketEntry {
      display: flex;
      align-items: center;
      min-height: 36px;
      padding: 8px 12px;
      border: 2px ridge rgba(195, 145, 67, 0.88);
      background:
        linear-gradient(135deg, rgba(39, 18, 8, 0.94), rgba(15, 7, 4, 0.96));
      color: #f8e4b2;
      font-size: clamp(12px, 1.2vw, 14px);
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 2px 4px #000;
      box-shadow:
        0 0 0 1px rgba(22, 8, 2, 0.95),
        inset 0 0 10px rgba(255, 190, 58, 0.05),
        0 4px 10px rgba(0,0,0,0.18);
    }

    .bracketEntry.pending {
      color: rgba(248, 228, 178, 0.45);
      border-color: rgba(163, 123, 58, 0.38);
      background: linear-gradient(135deg, rgba(27, 14, 8, 0.84), rgba(12, 6, 4, 0.88));
    }

    .bracketEntry.winner {
      color: #ffe39a;
      border-color: rgba(229, 181, 84, 0.95);
      box-shadow:
        0 0 0 1px rgba(22, 8, 2, 0.95),
        inset 0 0 16px rgba(255, 190, 58, 0.14),
        0 0 14px rgba(255, 184, 81, 0.14);
    }

    .bracketEntry.player {
      color: #f3ddff;
      border-color: rgba(199, 119, 255, 0.98);
      background:
        radial-gradient(circle at top, rgba(229, 183, 255, 0.22), transparent 58%),
        linear-gradient(135deg, rgba(104, 34, 155, 0.98), rgba(41, 13, 72, 0.98));
      box-shadow:
        0 0 0 1px rgba(22, 8, 38, 0.98),
        inset 0 0 18px rgba(218, 139, 255, 0.2),
        0 0 18px rgba(178, 78, 255, 0.22);
    }

    .bracketEntry.opponent {
      border-color: rgba(255, 214, 111, 0.96);
      background:
        radial-gradient(circle at top, rgba(255, 226, 160, 0.14), transparent 60%),
        linear-gradient(135deg, rgba(81, 46, 16, 0.96), rgba(22, 10, 5, 0.96));
    }

    .bracketEntry.faded {
      opacity: 0.5;
    }

    .bracketEntry.player.faded,
    .bracketEntry.opponent.faded {
      opacity: 1;
    }

    .bracketEntry.eliminated {
      color: rgba(244, 196, 159, 0.56);
      filter: saturate(0.68);
      text-decoration: line-through;
    }

    .bracketEntry .seed {
      width: 18px;
      margin-right: 10px;
      color: #d6a14a;
      font-size: 10px;
      opacity: 0.9;
      text-align: center;
      flex: 0 0 auto;
    }

    #championColumn {
      display: flex;
      flex-direction: column;
    }

    #championBox {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      min-height: 100%;
      padding-left: 18px;
    }

    #championBox::before {
      content: "";
      position: absolute;
      left: -20px;
      top: 50%;
      width: 20px;
      border-top: 2px solid rgba(214, 161, 74, 0.7);
      transform: translateY(-50%);
    }

    #championSeal {
      width: min(160px, 100%);
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border: 4px ridge rgba(214, 161, 74, 0.88);
      background:
        radial-gradient(circle at top, rgba(255, 225, 148, 0.12), transparent 58%),
        linear-gradient(135deg, rgba(34, 17, 8, 0.9), rgba(11, 5, 3, 0.96));
      box-shadow:
        0 0 0 3px rgba(25, 11, 3, 0.92),
        inset 0 0 20px rgba(255, 190, 58, 0.08),
        0 10px 24px rgba(0,0,0,0.34);
    }

    #championSealInner {
      width: 76%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      color: #f4cf79;
      font-size: clamp(36px, 5vw, 54px);
      text-shadow: 0 3px 8px #000;
      background:
        radial-gradient(circle at 50% 36%, rgba(255, 220, 132, 0.16), rgba(56, 30, 10, 0.08) 62%, transparent 63%);
    }

    #championSealInner::before,
    #championSealInner::after {
      content: "";
      position: absolute;
      width: 38px;
      height: 76px;
      border: 4px solid rgba(214, 161, 74, 0.88);
      border-color: rgba(214, 161, 74, 0.88) transparent transparent transparent;
      border-radius: 50% 50% 0 0;
      top: 22px;
      opacity: 0.85;
    }

    #championSealInner::before {
      left: 14px;
      transform: rotate(-55deg);
    }

    #championSealInner::after {
      right: 14px;
      transform: rotate(55deg);
    }

    #championNameText {
      max-width: 180px;
      text-align: center;
      color: #ffe6a7;
      font-size: clamp(12px, 1.3vw, 15px);
      font-weight: 900;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      text-shadow: 0 2px 5px #000;
    }

    #victoryButtonRow {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      align-items: center;
    }

    .victoryBtn,
    #restartBtn,
    #nextOpponentBtn {
      pointer-events: auto;
      cursor: pointer;
      min-width: 210px;
      border: 4px ridge #d6a14a;
      border-radius: 5px;
      background:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.055) 0 3px, transparent 3px 9px),
        linear-gradient(#a86f2e, #55270b);
      color: #ffe7ad;
      font-family: "Cinzel", Georgia, serif;
      font-size: clamp(14px, 1.6vw, 18px);
      font-weight: 900;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      padding: 12px 20px;
      box-shadow:
        0 5px 0 #251006,
        0 12px 18px rgba(0,0,0,0.5),
        inset 0 3px 0 rgba(255,255,255,0.16),
        inset 0 -8px 12px rgba(0,0,0,0.24);
    }

    .victoryBtn.secondary,
    #restartBtn.secondary {
      background:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.035) 0 3px, transparent 3px 9px),
        linear-gradient(#6f3b19, #2b1307);
      color: #f5c978;
    }

    .victoryBtn:hover,
    #restartBtn:hover,
    #nextOpponentBtn:hover {
      filter: brightness(1.18);
      transform: translateY(-1px);
    }

    .victoryBtn:active,
    #restartBtn:active,
    #nextOpponentBtn:active {
      transform: translateY(3px);
      box-shadow:
        0 2px 0 #251006,
        0 6px 14px rgba(0,0,0,0.5),
        inset 0 2px 0 rgba(255,255,255,0.16);
    }


    /* Image-inspired victory / next-opponent card */
    #victoryCard {
      position: relative;
      width: min(1180px, 94vw);
      max-height: 92vh;
      overflow: auto;
      padding: clamp(18px, 2.8vw, 34px);
      color: #f5e5bf;
      text-align: center;
      pointer-events: auto;
      background:
        radial-gradient(circle at 50% 0%, rgba(239, 196, 112, 0.16), transparent 34%),
        radial-gradient(circle at 16% 50%, rgba(119, 19, 8, 0.18), transparent 28%),
        repeating-linear-gradient(45deg, rgba(255, 229, 166, 0.035) 0 3px, transparent 3px 11px),
        linear-gradient(135deg, rgba(14, 9, 6, 0.98), rgba(36, 22, 12, 0.98) 48%, rgba(8, 5, 4, 0.98));
      border: 7px ridge rgba(195, 145, 67, 0.9);
      border-radius: 8px 26px 8px 26px;
      box-shadow:
        0 0 0 4px rgba(21, 9, 3, 0.96),
        0 0 0 10px rgba(132, 84, 29, 0.42),
        0 24px 70px rgba(0, 0, 0, 0.84),
        inset 0 5px 0 rgba(255, 231, 173, 0.12),
        inset 0 -22px 38px rgba(0, 0, 0, 0.4);
    }

    #victoryCard::before,
    #victoryCard::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border: 1px solid rgba(255, 222, 145, 0.18);
    }

    #victoryCard::before {
      inset: 14px;
    }

    #victoryCard::after {
      inset: 24px;
      border-color: rgba(255, 222, 145, 0.09);
    }

    #victoryHeader {
      position: relative;
      z-index: 1;
      margin-bottom: 16px;
      text-align: center;
    }

    #victoryLaurels {
      position: absolute;
      left: 50%;
      top: 6px;
      transform: translateX(-50%);
      color: rgba(255, 216, 111, 0.26);
      font-size: clamp(62px, 10vw, 116px);
      line-height: 1;
      pointer-events: none;
      text-shadow: 0 4px 18px rgba(0,0,0,0.75);
    }

    #victoryTitle {
      position: relative;
      z-index: 1;
      font-size: clamp(58px, 10vw, 116px);
      line-height: 0.86;
      font-weight: 900;
      letter-spacing: clamp(4px, 1vw, 12px);
      text-transform: uppercase;
      color: #e9c878;
      text-shadow:
        0 3px 0 #4a250b,
        0 8px 20px rgba(0,0,0,0.9),
        0 0 18px rgba(255, 216, 111, 0.18);
    }

    #victorySubtitle {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 10px;
      color: #d7d0c5;
      font-size: clamp(17px, 2.8vw, 34px);
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 3px 8px #000;
    }

    #victorySubtitle::before,
    #victorySubtitle::after {
      content: "";
      width: min(120px, 16vw);
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(226, 185, 94, 0.76), transparent);
      box-shadow: 0 0 8px rgba(226, 185, 94, 0.16);
    }

    #victoryMainFrame {
      position: relative;
      z-index: 1;
      margin: 8px auto 18px;
      padding: 48px clamp(14px, 2.2vw, 26px) 22px;
      border: 4px ridge rgba(195, 145, 67, 0.85);
      background:
        radial-gradient(circle at 24% 50%, rgba(171, 87, 28, 0.18), transparent 32%),
        linear-gradient(135deg, rgba(8, 7, 6, 0.86), rgba(27, 20, 13, 0.9));
      box-shadow:
        inset 0 0 42px rgba(0, 0, 0, 0.72),
        0 12px 26px rgba(0, 0, 0, 0.42);
    }

    #victoryRibbon {
      position: absolute;
      left: 50%;
      top: -24px;
      transform: translateX(-50%);
      min-width: min(420px, 72vw);
      padding: 12px 34px;
      border: 4px ridge rgba(195, 145, 67, 0.92);
      background:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.04) 0 3px, transparent 3px 9px),
        linear-gradient(#66190d, #2a0804);
      color: #f0d48b;
      font-size: clamp(18px, 3vw, 34px);
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 3px 8px #000;
      box-shadow:
        0 0 0 3px rgba(18, 8, 3, 0.94),
        0 9px 20px rgba(0,0,0,0.52),
        inset 0 4px 0 rgba(255,255,255,0.08);
    }

    #victoryOpponentPanel {
      display: grid;
      grid-template-columns: minmax(220px, 0.9fr) minmax(320px, 1.5fr);
      gap: clamp(18px, 3vw, 38px);
      align-items: center;
      text-align: left;
    }

    #victoryPortraitWrap {
      position: relative;
      min-height: 290px;
      display: flex;
      align-items: end;
      justify-content: center;
      overflow: hidden;
      border-right: 1px solid rgba(238, 190, 99, 0.12);
    }

    #victoryPortraitGlow {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      bottom: 18px;
      background: radial-gradient(circle, rgba(221, 155, 68, 0.22), rgba(82, 36, 13, 0.06) 62%, transparent 70%);
      filter: blur(2px);
    }

    #victoryHelmet {
      position: absolute;
      bottom: 106px;
      width: 142px;
      height: 146px;
      transform: rotate(-3deg);
      filter: drop-shadow(0 12px 16px rgba(0,0,0,0.65));
    }

    .helmetPlume {
      position: absolute;
      left: 44px;
      top: -55px;
      width: 48px;
      height: 86px;
      border-radius: 50% 50% 16px 16px;
      background:
        repeating-linear-gradient(90deg, rgba(80, 13, 5, 0.96) 0 6px, rgba(160, 60, 22, 0.9) 6px 11px),
        linear-gradient(#9e2b13, #461005);
      transform: rotate(-5deg);
      box-shadow: inset 0 -18px 16px rgba(0,0,0,0.3);
    }

    .helmetDome {
      position: absolute;
      left: 12px;
      top: 0;
      width: 118px;
      height: 84px;
      border-radius: 60px 60px 18px 18px;
      background:
        radial-gradient(circle at 38% 20%, rgba(255,255,255,0.28), transparent 20%),
        linear-gradient(135deg, #8d7e63, #3a342d 52%, #15110e);
      border: 4px ridge rgba(216, 174, 90, 0.7);
    }

    .helmetMask {
      position: absolute;
      left: 28px;
      top: 48px;
      width: 88px;
      height: 98px;
      border-radius: 16px 16px 38px 38px;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.08) 0 4px, transparent 4px 12px),
        linear-gradient(135deg, #7f735f, #29231d 58%, #100c09);
      border: 4px ridge rgba(204, 164, 82, 0.72);
      clip-path: polygon(7% 0, 93% 0, 82% 78%, 50% 100%, 18% 78%);
    }

    .helmetEye {
      position: absolute;
      top: 75px;
      width: 22px;
      height: 10px;
      border-radius: 50%;
      background: #060302;
      box-shadow: 0 0 9px rgba(255, 123, 43, 0.22);
      z-index: 2;
    }

    .helmetEye.left { left: 42px; }
    .helmetEye.right { right: 42px; }

    #victoryShoulders {
      position: absolute;
      bottom: -8px;
      width: 268px;
      height: 170px;
      border-radius: 120px 120px 18px 18px;
      background:
        radial-gradient(circle at 33% 24%, rgba(255, 216, 160, 0.22), transparent 16%),
        radial-gradient(circle at 70% 38%, rgba(92, 16, 8, 0.45), transparent 12%),
        linear-gradient(135deg, #9b673f, #5b2e17 45%, #241008 100%);
      border-top: 4px ridge rgba(194, 141, 75, 0.68);
      box-shadow:
        inset 0 0 30px rgba(0,0,0,0.45),
        0 -4px 0 rgba(31, 15, 8, 0.7);
    }

    #victoryStats {
      min-width: 0;
      padding-right: clamp(4px, 1.4vw, 24px);
    }

    #victoryOpponentName {
      margin-bottom: 4px;
      color: #f4ede1;
      font-size: clamp(32px, 5.6vw, 64px);
      line-height: 0.98;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow:
        0 3px 0 rgba(62, 34, 14, 0.92),
        0 8px 18px rgba(0,0,0,0.78);
    }

    #victoryDefeatedName {
      min-height: 20px;
      margin-bottom: 22px;
      color: rgba(246, 218, 165, 0.72);
      font-size: clamp(11px, 1.2vw, 14px);
      font-weight: 900;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      text-shadow: 0 2px 4px #000;
    }

    .victoryStatRow {
      display: grid;
      grid-template-columns: 74px minmax(170px, 1fr) 86px;
      gap: 14px;
      align-items: center;
      margin: 18px 0;
    }

    .victoryStatIcon {
      width: 58px;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: #cf321d;
      font-size: 32px;
      background:
        radial-gradient(circle at 35% 25%, rgba(255,255,255,0.16), transparent 24%),
        linear-gradient(135deg, rgba(43, 22, 10, 0.98), rgba(10, 6, 4, 0.98));
      border: 3px ridge rgba(188, 137, 66, 0.84);
      box-shadow: inset 0 0 13px rgba(0,0,0,0.62), 0 5px 13px rgba(0,0,0,0.42);
      text-shadow: 0 2px 5px #000;
    }

    .victoryStatIcon.crossed {
      color: #d6d1c6;
      font-size: 31px;
    }

    .victoryStatLabel {
      margin-bottom: 7px;
      color: #d7c3a0;
      font-size: clamp(13px, 1.5vw, 20px);
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-shadow: 0 2px 4px #000;
    }

    .victoryBarOuter {
      height: 25px;
      border: 4px ridge rgba(176, 129, 66, 0.76);
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.035) 0 5px, transparent 5px 12px),
        linear-gradient(#100b08, #2a1a10);
      box-shadow:
        inset 0 4px 10px rgba(0,0,0,0.85),
        0 0 0 2px rgba(11, 6, 3, 0.84);
      overflow: hidden;
    }

    .victoryBarInner {
      height: 100%;
      width: 50%;
      transition: width 0.25s ease;
      box-shadow:
        inset 0 5px 8px rgba(255,255,255,0.16),
        inset 0 -6px 10px rgba(0,0,0,0.28);
    }

    .victoryBarInner.health {
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.11) 0 5px, transparent 5px 12px),
        linear-gradient(90deg, #5a0808, #b01a18, #e0462c);
    }

    .victoryBarInner.damage {
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.12) 0 5px, transparent 5px 12px),
        linear-gradient(90deg, #75330d, #c7771f, #f0b35a);
    }

    .victoryStatValue {
      color: #e9e0d1;
      font-size: clamp(34px, 5vw, 58px);
      font-weight: 900;
      text-align: right;
      text-shadow:
        0 3px 0 rgba(48, 25, 11, 0.86),
        0 7px 14px rgba(0,0,0,0.72);
    }

    #victoryRewardRow {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(240px, 0.82fr) minmax(320px, 1.18fr);
      gap: 16px;
      margin-bottom: 18px;
    }

    .victoryRewardBox {
      min-height: 118px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 14px;
      border: 4px ridge rgba(195, 145, 67, 0.82);
      background:
        radial-gradient(circle at 30% 18%, rgba(255, 219, 139, 0.12), transparent 42%),
        linear-gradient(135deg, rgba(20, 14, 9, 0.92), rgba(8, 5, 4, 0.96));
      box-shadow:
        inset 0 0 26px rgba(0,0,0,0.58),
        0 8px 18px rgba(0,0,0,0.36);
    }

    .victoryRewardBox.wide {
      justify-content: flex-start;
      padding-left: clamp(18px, 3vw, 38px);
    }

    .victoryRewardLabel {
      color: #d7c3a0;
      font-size: clamp(13px, 1.5vw, 19px);
      font-weight: 900;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      text-shadow: 0 2px 4px #000;
    }

    .victoryRewardValue {
      color: #f0e2d0;
      font-size: clamp(42px, 6vw, 68px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow:
        0 3px 0 rgba(48, 25, 11, 0.86),
        0 8px 16px rgba(0,0,0,0.72);
    }

    .coinStack {
      position: relative;
      width: 124px;
      height: 78px;
      flex: 0 0 auto;
    }

    .coinStack span {
      position: absolute;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 28%, #ffe5a0, #c48b2e 54%, #60370c 100%);
      border: 3px ridge rgba(255, 216, 111, 0.82);
      box-shadow: inset 0 0 12px rgba(99, 55, 13, 0.48), 0 8px 12px rgba(0,0,0,0.42);
    }

    .coinStack span:nth-child(1) { left: 6px; bottom: 0; }
    .coinStack span:nth-child(2) { left: 38px; bottom: 14px; }
    .coinStack span:nth-child(3) { right: 5px; bottom: 1px; }

    .victoryMedallion {
      width: 82px;
      aspect-ratio: 1 / 1;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: #f0c76f;
      font-size: 42px;
      border: 4px ridge rgba(205, 158, 77, 0.88);
      background:
        radial-gradient(circle at 35% 25%, rgba(255,255,255,0.16), transparent 24%),
        linear-gradient(135deg, rgba(72, 41, 15, 0.96), rgba(13, 7, 4, 0.98));
      box-shadow:
        inset 0 0 18px rgba(255, 199, 90, 0.1),
        0 8px 15px rgba(0,0,0,0.4);
      text-shadow: 0 3px 8px #000;
    }

    .victoryProgressBlock {
      flex: 1;
      min-width: 0;
      text-align: left;
    }

    .victoryProgressText {
      margin: 6px 0 10px;
      color: #f1d59c;
      font-size: clamp(16px, 2vw, 25px);
      font-weight: 900;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      text-shadow: 0 3px 8px #000;
    }

    .victoryProgressOuter {
      height: 20px;
      max-width: 360px;
      border: 3px ridge rgba(176, 129, 66, 0.76);
      background: linear-gradient(#0f0905, #21130c);
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.8), 0 0 0 2px rgba(11,6,3,0.8);
      overflow: hidden;
    }

    .victoryProgressFill {
      height: 100%;
      width: 0%;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.12) 0 5px, transparent 5px 12px),
        linear-gradient(90deg, #a6530e, #e58d26, #ffd064);
      transition: width 0.25s ease;
      box-shadow: inset 0 5px 8px rgba(255,255,255,0.16), inset 0 -6px 10px rgba(0,0,0,0.25);
    }

    #victoryButtonRow {
      position: relative;
      z-index: 1;
    }

    #nextOpponentBtn {
      min-width: min(420px, 72vw);
      font-size: clamp(22px, 3.4vw, 39px);
      letter-spacing: 3px;
      background:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.055) 0 3px, transparent 3px 9px),
        linear-gradient(#8e2d17, #3b0d06);
    }

    @media (max-width: 860px) {
      #victoryOpponentPanel,
      #victoryRewardRow {
        grid-template-columns: 1fr;
      }

      #victoryPortraitWrap {
        min-height: 230px;
        border-right: 0;
        border-bottom: 1px solid rgba(238, 190, 99, 0.12);
      }

      .victoryStatRow {
        grid-template-columns: 58px minmax(140px, 1fr) 72px;
        gap: 10px;
      }

      .victoryStatIcon {
        width: 48px;
        font-size: 27px;
      }
    }

    @media (max-width: 1020px) {
      #bracketLayout {
        grid-template-columns: 1fr;
      }

      .bracketColumn {
        min-height: auto;
      }

      #quarterfinalMatches,
      #semifinalMatches,
      #finalMatches {
        height: auto;
        padding-top: 0;
        gap: 12px;
      }

      .bracketMatch,
      .bracketAdvancer,
      #championBox {
        padding-left: 0;
        padding-right: 0;
      }

      .bracketMatch::after,
      .bracketAdvancer::before,
      .bracketAdvancer::after,
      #championBox::before {
        display: none;
      }
    }

    @media (max-height: 680px) {
      #bracketCard {
        padding: 16px;
      }

      #bracketMetaRow {
        margin-bottom: 16px;
      }
    }


  </style>
</head>
<body>
  <div id="damageFlash"></div>

  <div id="ui">
    <div id="topBar">
      <div class="healthBox">
        <div class="label">Gladiator</div>
        <div class="barOuter">
          <div id="playerHealth" class="barInner"></div>
        </div>
      </div>

      <div class="healthBox">
        <div id="enemyNameLabel" class="label" style="text-align:right;">Opponent</div>
        <div class="barOuter">
          <div id="enemyHealth" class="barInner"></div>
        </div>
      </div>
    </div>

    <div id="bloodCoinsWrap">BloodCoins: <span id="bloodCoinsCount">0</span></div>

    <div id="tournamentWrap">
      <div class="tournamentLine"><span>Rank</span><span id="tournamentRankText">Sand Rookie</span></div>
      <div class="tournamentLine"><span>Round</span><span id="tournamentRoundText">1</span></div>
      <div class="tournamentLine"><span>Opponent HP</span><span id="opponentHealthText">100 / 100</span></div>
      <div class="tournamentLine"><span>Club Damage</span><span id="opponentDamageText">11 - 17</span></div>
    </div>


    <div id="messagePanel" aria-hidden="true">
      <div id="victoryCard">
        <div id="victoryHeader">
          <div id="victoryLaurels" aria-hidden="true">❦</div>
          <div id="victoryTitle">Victory</div>
          <div id="victorySubtitle">Opponent Defeated</div>
        </div>

        <div id="victoryMainFrame">
          <div id="victoryRibbon">
            <span id="victoryRibbonText">Next Opponent</span>
          </div>

          <div id="victoryOpponentPanel">
            <div id="victoryPortraitWrap" aria-hidden="true">
              <div id="victoryPortraitGlow"></div>
              <div id="victoryHelmet">
                <div class="helmetPlume"></div>
                <div class="helmetDome"></div>
                <div class="helmetMask"></div>
                <div class="helmetEye left"></div>
                <div class="helmetEye right"></div>

    init();
    animate();

    function randomOpponentName() {
      return opponentNames[Math.floor(Math.random() * opponentNames.length)];
    }


    function romanNumeral(value) {
      const map = [
        [1000, "M"], [900, "CM"], [500, "D"], [400, "CD"],
        [100, "C"], [90, "XC"], [50, "L"], [40, "XL"],
        [10, "X"], [9, "IX"], [5, "V"], [4, "IV"], [1, "I"]
      ];

      let out = "";
      let n = Math.max(1, Math.floor(value));

      for (const [num, sym] of map) {
        while (n >= num) {
          out += sym;
          n -= num;
        }
      }

      return out;
    }

    function getBracketCycle(round = tournamentRound) {
      return Math.floor((Math.max(1, round) - 1) / 3) + 1;
    }

    function getBracketStageIndex(round = tournamentRound) {
      return (Math.max(1, round) - 1) % 3;
    }

    function getBracketStageName(round = tournamentRound) {
      return BRACKET_STAGE_NAMES[getBracketStageIndex(round)];
    }

    function randomUniqueOpponentNames(count) {
      const chosen = [];
      const attemptsMax = 300;
      let attempts = 0;

      while (chosen.length < count && attempts < attemptsMax) {
        const candidate = randomOpponentName();
        if (!chosen.includes(candidate)) chosen.push(candidate);
        attempts += 1;
      }

      while (chosen.length < count) {
        chosen.push(randomOpponentName() + " " + (chosen.length + 1));
      }

      return chosen;
    }

    function pickMatchWinner(match) {
      return Math.random() > 0.5 ? match[0] : match[1];
    }

    function createBracketState(cycle = getBracketCycle()) {
      const opponents = randomUniqueOpponentNames(7);
      const entrants = [PLAYER_BRACKET_NAME, ...opponents];

      const qfMatches = [
        [entrants[0], entrants[1]],
        [entrants[2], entrants[3]],
        [entrants[4], entrants[5]],
        [entrants[6], entrants[7]]
      ];

      const qfWinners = [
        PLAYER_BRACKET_NAME,
        pickMatchWinner(qfMatches[1]),
        pickMatchWinner(qfMatches[2]),
        pickMatchWinner(qfMatches[3])
      ];

      const sfWinners = [
        PLAYER_BRACKET_NAME,
        Math.random() > 0.5 ? qfWinners[2] : qfWinners[3]
      ];

      return {
        cycle,
        entrants,
        qfMatches,
        qfWinners,
        sfWinners,
        champion: PLAYER_BRACKET_NAME,
        playerOpponents: [qfMatches[0][1], qfWinners[1], sfWinners[1]]
      };
    }

    function ensureBracketState(round = tournamentRound, forceNew = false) {
      const cycle = getBracketCycle(round);
      if (forceNew || !bracketState || bracketState.cycle !== cycle) {
        bracketState = createBracketState(cycle);
      }
      return bracketState;
    }

    function getStageReward(round = tournamentRound) {
      return 25 + (round - 1) * 5;
    }

    function getNextOpponentPreview(round = tournamentRound, revealWins = 0) {
      const state = ensureBracketState(round);
      const stage = getBracketStageIndex(round);

      if (revealWins > stage) {
        if (stage === 0) return state.playerOpponents[1];
        if (stage === 1) return state.playerOpponents[2];
        return "New bracket awaits";
      }

      return state.playerOpponents[Math.min(stage, state.playerOpponents.length - 1)] || "Awaiting challenger";
    }

    function isPlayerOpponentName(name, state = bracketState) {
      const label = name || "";
      return !!label && label !== "TBD" && !!state && state.playerOpponents.includes(label);
    }

    function shouldFadeBracketEntry(name, options = {}, state = bracketState) {
      const label = name || "TBD";
      if (options.pending || label === "TBD") return false;
      if (label === PLAYER_BRACKET_NAME) return false;
      if (isPlayerOpponentName(label, state)) return false;
      return true;
    }

    function createBracketEntry(name, options = {}) {
      const label = name || "TBD";
      const state = options.state || bracketState;
      const isPlayerEntry = options.player || label === PLAYER_BRACKET_NAME;
      const isOpponentEntry = options.opponent || isPlayerOpponentName(label, state);
      const classes = ["bracketEntry"];

      if (options.pending) classes.push("pending");
      if (options.winner) classes.push("winner");
      if (isPlayerEntry) classes.push("player");
      if (isOpponentEntry) classes.push("opponent");
      if (options.eliminated) classes.push("eliminated");
      if (options.faded || shouldFadeBracketEntry(label, options, state)) classes.push("faded");

      const seed = options.seed != null ? `<span class="seed">${options.seed}</span>` : "";
      return `<div class="${classes.join(" ")}">${seed}<span>${label}</span></div>`;
    }

    function renderQuarterfinalColumn(state, revealWins = 0) {
      quarterfinalMatches.innerHTML = state.qfMatches.map((match, index) => {
        const winner = revealWins >= 1 ? state.qfWinners[index] : "";

        return `
          <div class="bracketMatch">
            ${createBracketEntry(match[0], {
              seed: index * 2 + 1,
              player: match[0] === PLAYER_BRACKET_NAME,
              winner: winner === match[0],
              eliminated: !!winner && winner !== match[0]
            })}
            ${createBracketEntry(match[1], {
              seed: index * 2 + 2,
              player: match[1] === PLAYER_BRACKET_NAME,
              winner: winner === match[1],
              eliminated: !!winner && winner !== match[1]
            })}
          </div>
        `;
      }).join("");
    }

    function renderSemifinalColumn(state, revealWins = 0) {
      semifinalMatches.innerHTML = new Array(4).fill(0).map((_, index) => {
        const name = revealWins >= 1 ? state.qfWinners[index] : "TBD";
        const isPlayer = name === PLAYER_BRACKET_NAME;
        return `<div class="bracketAdvancer">${createBracketEntry(name, { pending: revealWins < 1, player: isPlayer, winner: revealWins >= 1 && !!name })}</div>`;
      }).join("");
    }

    function renderFinalColumn(state, revealWins = 0) {
      finalMatches.innerHTML = new Array(2).fill(0).map((_, index) => {
        const name = revealWins >= 2 ? state.sfWinners[index] : "TBD";
        const isPlayer = name === PLAYER_BRACKET_NAME;
        return `<div class="bracketAdvancer">${createBracketEntry(name, { pending: revealWins < 2, player: isPlayer, winner: revealWins >= 2 && !!name })}</div>`;
      }).join("");
    }

    function renderChampionColumn(state, revealWins = 0) {
      championNameText.textContent = revealWins >= 3 ? state.champion : "Undecided";
    }

    function getProjectedOpponentStats(round = tournamentRound) {
      const projectedHP = ENEMY_BASE_HP + (round - 1) * ENEMY_HP_PER_ROUND;
      const projectedDamageMultiplier = 1 + (round - 1) * ENEMY_DAMAGE_GROWTH;
      const projectedDamageMin = ENEMY_CLUB_DAMAGE_MIN * projectedDamageMultiplier;
      const projectedDamageMax = (ENEMY_CLUB_DAMAGE_MIN + ENEMY_CLUB_DAMAGE_BONUS) * projectedDamageMultiplier;

      return {
        hp: projectedHP,
        damageMin: projectedDamageMin,
        damageMax: projectedDamageMax
      };
    }

    function updateBracketMenu(hasVictory = false) {
      const defeatedStageIndex = getBracketStageIndex();
      const nextRound = hasVictory ? tournamentRound + 1 : tournamentRound;
      const previewStats = getProjectedOpponentStats(nextRound);
      const revealWins = hasVictory ? defeatedStageIndex + 1 : defeatedStageIndex;
      const state = ensureBracketState();

      let previewName = currentEnemyName || "Awaiting Challenger";

      if (hasVictory) {
        previewName = defeatedStageIndex < 2
          ? (state.playerOpponents[defeatedStageIndex + 1] || "Awaiting Challenger")
          : "New Bracket Challenger";
      }

      victoryTitle.textContent = hasVictory ? "Victory" : "Defeat";
      victorySubtitle.textContent = hasVictory ? "Opponent Defeated" : "Gladiator Defeated";
      victoryRibbonText.textContent = hasVictory ? "Next Opponent" : "Arena Outcome";
      victoryOpponentName.textContent = previewName;
      victoryDefeatedName.textContent = hasVictory
        ? currentEnemyName + " defeated"
        : "The arena demands another attempt";
      victoryGoldEarned.textContent = hasVictory ? lastVictoryReward : 0;

      victoryHealthValue.textContent = Math.round(previewStats.hp);
      victoryDamageValue.textContent = Math.round(previewStats.damageMax);

      const healthPct = THREE.MathUtils.clamp(42 + (nextRound - 1) * 6, 42, 100);
      const damagePct = THREE.MathUtils.clamp(35 + (nextRound - 1) * 5.5, 35, 100);
      victoryHealthBar.style.width = healthPct + "%";
      victoryDamageBar.style.width = damagePct + "%";

      const progressPct = THREE.MathUtils.clamp((revealWins / 3) * 100, 0, 100);
      victoryProgressFill.style.width = progressPct + "%";
      victoryProgressText.textContent = hasVictory
        ? getBracketStageName(tournamentRound) + " Cleared • Bracket " + romanNumeral(getBracketCycle())
        : "Tournament Halted";
    }

    function getTournamentRankName(round = tournamentRound) {
      if (round >= 16) return "Arena Legend";
      if (round >= 12) return "Imperial Champion";
      if (round >= 9) return "Colosseum Terror";
      if (round >= 6) return "Blood Pit Veteran";
      if (round >= 3) return "Bronze Brawler";
      return "Sand Rookie";
    }

    function getEnemyDamageMin() {
      return ENEMY_CLUB_DAMAGE_MIN * enemyDamageMultiplier;
    }

    function getEnemyDamageMax() {
      return (ENEMY_CLUB_DAMAGE_MIN + ENEMY_CLUB_DAMAGE_BONUS) * enemyDamageMultiplier;
    }

    function getEnemyClubDamage() {
      return (ENEMY_CLUB_DAMAGE_MIN + Math.random() * ENEMY_CLUB_DAMAGE_BONUS) * enemyDamageMultiplier;
    }

    function getPlayerClubDamage() {
      return PLAYER_CLUB_DAMAGE_MIN + Math.random() * PLAYER_CLUB_DAMAGE_BONUS;
    }

    function setNewOpponentName() {
      if (queuedOpponentName) {
        currentEnemyName = queuedOpponentName;
        queuedOpponentName = "";
        return;
      }

      currentEnemyName = randomOpponentName();
    }

    function configureOpponentForRound() {
      const state = ensureBracketState();
      const stageIndex = getBracketStageIndex();
      currentEnemyName = state.playerOpponents[stageIndex] || randomOpponentName();
      queuedOpponentName = stageIndex < 2 ? state.playerOpponents[stageIndex + 1] : "";
      enemyMaxHP = ENEMY_BASE_HP + (tournamentRound - 1) * ENEMY_HP_PER_ROUND;
      enemyHP = enemyMaxHP;
      enemyDamageMultiplier = 1 + (tournamentRound - 1) * ENEMY_DAMAGE_GROWTH;
      enemySpeedMultiplier = 1 + (tournamentRound - 1) * ENEMY_SPEED_GROWTH;
      enemyCooldownMultiplier = Math.max(0.55, 1 - (tournamentRound - 1) * ENEMY_COOLDOWN_REDUCTION);
    }

    function toonMaterial(color, extra = {}) {
      return new THREE.MeshToonMaterial({
        color,
        gradientMap: createToonGradient(),
        ...extra
      });
    }

    function createToonGradient() {
      const canvas = document.createElement("canvas");
      canvas.width = 4;
      canvas.height = 1;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#222";
      ctx.fillRect(0, 0, 1, 1);

      ctx.fillStyle = "#777";
      ctx.fillRect(1, 0, 1, 1);

      ctx.fillStyle = "#bbb";
      ctx.fillRect(2, 0, 1, 1);

      ctx.fillStyle = "#fff";
      ctx.fillRect(3, 0, 1, 1);

      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.NearestFilter;
      texture.magFilter = THREE.NearestFilter;
      return texture;
    }

    function createSandyTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext("2d");

      const baseGradient = ctx.createRadialGradient(256, 256, 20, 256, 256, 390);
      baseGradient.addColorStop(0, "#b98248");
      baseGradient.addColorStop(0.45, "#9d6838");
      baseGradient.addColorStop(1, "#6f4428");

      ctx.fillStyle = baseGradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < 9000; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const r = Math.random() * 1.55 + 0.25;
        const shade = Math.floor(105 + Math.random() * 95);
        const alpha = 0.08 + Math.random() * 0.18;

        ctx.fillStyle = `rgba(${shade + 22}, ${shade + 2}, ${Math.max(25, shade - 36)}, ${alpha})`;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      for (let i = 0; i < 185; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const length = 18 + Math.random() * 55;
        const width = 1 + Math.random() * 2.5;
        const angle = Math.random() * Math.PI * 2;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.strokeStyle = Math.random() > 0.5
          ? "rgba(62, 36, 21, 0.18)"
          : "rgba(225, 170, 100, 0.14)";
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.moveTo(-length * 0.5, 0);
        ctx.quadraticCurveTo(0, Math.random() * 12 - 6, length * 0.5, 0);
        ctx.stroke();
        ctx.restore();
      }

      for (let i = 0; i < 75; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const w = 20 + Math.random() * 70;
        const h = 8 + Math.random() * 28;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(Math.random() * Math.PI * 2);
        ctx.fillStyle = "rgba(72, 43, 24, 0.12)";
        ctx.beginPath();
        ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(8, 8);
      texture.magFilter = THREE.NearestFilter;
      texture.minFilter = THREE.NearestMipmapNearestFilter;
      texture.colorSpace = THREE.SRGBColorSpace;

      return texture;
    }

    function createStoneTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext("2d");

      const gradient = ctx.createLinearGradient(0, 0, 512, 512);
      gradient.addColorStop(0, "#8f806d");
      gradient.addColorStop(0.45, "#625846");
      gradient.addColorStop(1, "#3d3329");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 512, 512);

      for (let i = 0; i < 6500; i++) {
        const x = Math.random() * 512;
        const y = Math.random() * 512;
        const shade = Math.floor(70 + Math.random() * 95);
        const alpha = 0.06 + Math.random() * 0.22;

        ctx.fillStyle = `rgba(${shade}, ${shade - 4}, ${Math.max(35, shade - 12)}, ${alpha})`;
        ctx.fillRect(x, y, 1 + Math.random() * 3, 1 + Math.random() * 3);
      }

      for (let i = 0; i < 90; i++) {
        const x = Math.random() * 512;
        const y = Math.random() * 512;
        const length = 35 + Math.random() * 140;
        const angle = Math.random() * Math.PI * 2;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.strokeStyle = Math.random() > 0.5
          ? "rgba(20, 17, 14, 0.22)"
          : "rgba(210, 198, 176, 0.13)";
        ctx.lineWidth = 1 + Math.random() * 3;
        ctx.beginPath();
        ctx.moveTo(-length / 2, 0);
        ctx.quadraticCurveTo(0, Math.random() * 18 - 9, length / 2, Math.random() * 12 - 6);
        ctx.stroke();
        ctx.restore();
      }

      for (let i = 0; i < 26; i++) {
        const x = Math.random() * 512;
        const y = Math.random() * 512;
        const radius = 18 + Math.random() * 55;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(Math.random() * Math.PI);
        ctx.fillStyle = Math.random() > 0.5
          ? "rgba(24, 21, 18, 0.14)"
          : "rgba(205, 196, 178, 0.09)";
        ctx.beginPath();
        ctx.ellipse(0, 0, radius, radius * (0.25 + Math.random() * 0.45), 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(1.4, 1.9);
      texture.magFilter = THREE.NearestFilter;
      texture.minFilter = THREE.NearestMipmapNearestFilter;
      texture.colorSpace = THREE.SRGBColorSpace;

      return texture;
    }

    function createCurvedBloodTexture(kind = "torso") {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext("2d");

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      function splat(u, v, rx, ry, alpha = 0.85, drip = true) {
        rx *= 1.15;
        ry *= 1.15;

        const x = u * canvas.width;
        const y = v * canvas.height;
        const gradient = ctx.createRadialGradient(x, y, 2, x, y, Math.max(rx, ry));
        gradient.addColorStop(0, `rgba(145, 5, 5, ${alpha})`);
        gradient.addColorStop(0.5, `rgba(82, 0, 0, ${alpha * 0.82})`);
        gradient.addColorStop(1, "rgba(45, 0, 0, 0)");

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate((Math.random() - 0.5) * 0.7);
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        for (let i = 0; i < 9; i++) {
          const a = Math.random() * Math.PI * 2;
          const d = Math.random() * Math.max(rx, ry) * 0.95;
          const px = x + Math.cos(a) * d;
          const py = y + Math.sin(a) * d;
          const r = 4 + Math.random() * 17;

          ctx.fillStyle = Math.random() > 0.45
            ? `rgba(95, 0, 0, ${alpha * (0.35 + Math.random() * 0.35)})`
            : `rgba(168, 11, 8, ${alpha * (0.24 + Math.random() * 0.28)})`;
          ctx.beginPath();
          ctx.ellipse(px, py, r * (0.65 + Math.random() * 0.65), r * (0.42 + Math.random() * 0.55), Math.random() * Math.PI, 0, Math.PI * 2);
          ctx.fill();
        }

        if (drip) {
          const dripCount = kind.startsWith("arm") ? 3 : 5;
          for (let i = 0; i < dripCount; i++) {
            const dx = x + (Math.random() - 0.5) * rx * 1.15;
            const dy = y + ry * (0.15 + Math.random() * 0.5);
            const length = (kind.startsWith("arm") ? 10 : 18) + Math.random() * (kind.startsWith("arm") ? 28 : 68);
            const width = 2 + Math.random() * (kind.startsWith("arm") ? 4 : 6);

            ctx.strokeStyle = `rgba(75, 0, 0, ${alpha * 0.56})`;
            ctx.lineWidth = width;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(dx, dy);
            ctx.bezierCurveTo(
              dx + (Math.random() - 0.5) * 14,
              dy + length * 0.35,
              dx + (Math.random() - 0.5) * 16,
              dy + length * 0.72,
              dx + (Math.random() - 0.5) * 10,
              dy + length
            );
            ctx.stroke();
          }
        }
      }

      function splatRange(count, uMin, uMax, vMin, vMax, rxMin, rxMax, ryMin, ryMax, alphaMin, alphaMax, drip = true) {
        for (let i = 0; i < count; i++) {
          splat(
            uMin + Math.random() * (uMax - uMin),
            vMin + Math.random() * (vMax - vMin),
            rxMin + Math.random() * (rxMax - rxMin),
            ryMin + Math.random() * (ryMax - ryMin),
            alphaMin + Math.random() * (alphaMax - alphaMin),
            drip
          );
        }
      }

      if (kind === "face") {
        splatRange(2, 0.34, 0.66, 0.26, 0.56, 26, 52, 18, 34, 0.58, 0.84, false);
        splat(0.52, 0.44, 64, 44, 0.86, false);
      } else if (kind === "faceHeavy") {
        splatRange(3, 0.28, 0.72, 0.24, 0.62, 28, 62, 20, 46, 0.56, 0.84, true);
        splat(0.51, 0.46, 88, 62, 0.82, true);
      } else if (kind === "arm") {
        splatRange(3, 0.34, 0.66, 0.18, 0.8, 18, 30, 20, 42, 0.5, 0.78, true);
      } else if (kind === "armHeavy") {
        splatRange(4, 0.3, 0.7, 0.14, 0.84, 22, 34, 24, 50, 0.56, 0.82, true);
        splat(0.5, 0.46, 42, 76, 0.68, true);
      } else if (kind === "torsoHeavy") {
        splatRange(5, 0.24, 0.76, 0.16, 0.74, 34, 72, 28, 64, 0.54, 0.82, true);
        splat(0.5, 0.28, 110, 82, 0.8, true);
        splat(0.52, 0.52, 120, 92, 0.74, true);
      } else {
        splatRange(4, 0.26, 0.74, 0.14, 0.72, 28, 62, 22, 54, 0.48, 0.78, true);
        splat(0.47, 0.26, 86, 62, 0.78, true);
        splat(0.58, 0.46, 78, 56, 0.68, true);
      }

      for (let i = 0; i < 45; i++) {
        ctx.fillStyle = `rgba(40, 0, 0, ${0.1 + Math.random() * 0.22})`;
        ctx.beginPath();
        ctx.ellipse(
          Math.random() * canvas.width,
          Math.random() * canvas.height,
          1 + Math.random() * 4,
          1 + Math.random() * 5,
          Math.random() * Math.PI,
          0,
          Math.PI * 2
        );
        ctx.fill();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.magFilter = THREE.LinearFilter;
      texture.minFilter = THREE.LinearMipmapLinearFilter;
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.needsUpdate = true;
      return texture;
    }

    function createCurvedBloodMaterial(kind) {
      return new THREE.MeshBasicMaterial({
        map: createCurvedBloodTexture(kind),
        transparent: true,
        opacity: 0,
        depthWrite: false,
        polygonOffset: true,
        polygonOffsetFactor: -2,
        polygonOffsetUnits: -2,
        side: THREE.FrontSide
      });
    }

    function createFrontBloodPatchGeometry(kind) {
      if (kind === "face" || kind === "faceHeavy") {
        const arc = (kind === "faceHeavy" ? 1.78 : 1.48) * 1.2;
        const verticalStart = kind === "faceHeavy" ? 0.24 : 0.32;
        const verticalLength = (kind === "faceHeavy" ? 1.58 : 1.32) * 1.2;

        return new THREE.SphereGeometry(
          0.432,
          32,
          14,
          Math.PI * 0.5 - arc * 0.5,
          arc,
          verticalStart,
          verticalLength
        );
      }

      if (kind === "arm" || kind === "armHeavy") {
        const arc = kind === "armHeavy" ? 2.38 : 2.02;
        const height = kind === "armHeavy" ? 1.18 : 1.02;

        return new THREE.CylinderGeometry(
          0.188,
          0.188,
          height,
          24,
          6,
          true,
          -arc * 0.5,
          arc
        );
      }

      const arc = (kind === "torsoHeavy" ? 1.72 : 1.46) * 1.2;
      const height = (kind === "torsoHeavy" ? 1.42 : 1.28) * 1.2;

      return new THREE.CylinderGeometry(
        0.718,
        0.718,
        height,
        34,
        8,
        true,
        -arc * 0.5,
        arc
      );
    }

    function addCurvedBloodShell(targetMesh, bloodShells, kind, threshold, maxOpacity = 0.82) {
      const shell = new THREE.Mesh(
        createFrontBloodPatchGeometry(kind),
        createCurvedBloodMaterial(kind)
      );

      shell.position.set(0, 0, 0);
      shell.rotation.set(0, 0, 0);

      if (kind === "face" || kind === "faceHeavy") {
        shell.scale.set(1.018, 1.018, 1.018);
        shell.userData.baseScale = 1.018;
      } else if (kind === "arm" || kind === "armHeavy") {
        shell.scale.set(1.032, 1.032, 1.032);
        shell.userData.baseScale = 1.032;
      } else {
        shell.position.y = 0.08;
        shell.scale.set(1.014, 1.014, 1.014);
        shell.userData.baseScale = 1.014;
      }

      shell.renderOrder = 12;
      shell.visible = false;
      shell.castShadow = false;
      shell.receiveShadow = false;
      shell.userData.threshold = threshold;
      shell.userData.maxOpacity = maxOpacity;
      targetMesh.add(shell);
      bloodShells.push(shell);
      return shell;
    }

    function updateGladiatorBlood(g, healthRatio = 1) {
      if (!g || !g.bloodShells) return;

      const damageAmount = 1 - THREE.MathUtils.clamp(healthRatio, 0, 1);

      for (const shell of g.bloodShells) {
        const threshold = shell.userData.threshold || 0;
        const maxOpacity = shell.userData.maxOpacity || 0.82;
        const strength = THREE.MathUtils.clamp((damageAmount - threshold) / 0.24, 0, 1);

        if (strength <= 0.01) {
          shell.visible = false;
          shell.material.opacity = 0;
          continue;
        }

        shell.visible = true;
        shell.material.opacity = 0.12 + strength * maxOpacity;
        const baseScale = shell.userData.baseScale || 1.012;
        const pulse = baseScale + strength * 0.006;
        shell.scale.set(pulse, pulse, pulse);
      }
    }

    function updateOpponentBloodTexture() {
      if (!enemy || !enemy.bloodShells) return;
      updateGladiatorBlood(enemy, enemyMaxHP > 0 ? enemyHP / enemyMaxHP : 1);
    }

    function addOutline(mesh, scale = 1.045) {
      if (!mesh.geometry) return;

      const outline = new THREE.Mesh(
        mesh.geometry,
        new THREE.MeshBasicMaterial({
          color: 0x160a05,
          side: THREE.BackSide
        })
      );

      outline.position.copy(mesh.position);
      outline.rotation.copy(mesh.rotation);
      outline.scale.copy(mesh.scale).multiplyScalar(scale);
      outline.castShadow = false;
      outline.receiveShadow = false;

      mesh.add(outline);
      outline.position.set(0, 0, 0);
      outline.rotation.set(0, 0, 0);
    }

    function createArena() {
      const sandyTexture = createSandyTexture();
      const stoneTextureA = createStoneTexture();
      const stoneTextureB = createStoneTexture();

      const groundMat = toonMaterial(0xc58a4c, {
        map: sandyTexture
      });

      const ground = new THREE.Mesh(
        new THREE.CircleGeometry(ARENA_RADIUS, 128),
        groundMat
      );
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      const ringMat = toonMaterial(0x3b2115);

      const wall = new THREE.Mesh(
        new THREE.TorusGeometry(ARENA_RADIUS, 0.55, 12, 128),
        ringMat
      );
      wall.rotation.x = Math.PI / 2;
      wall.position.y = 0.25;
      wall.castShadow = true;
      wall.receiveShadow = true;
      scene.add(wall);
      addOutline(wall, 1.035);

      const pillarMatA = toonMaterial(0x847661, { map: stoneTextureA });
      const pillarMatB = toonMaterial(0x6f6454, { map: stoneTextureB });

      for (let i = 0; i < 48; i++) {
        const angle = (i / 48) * Math.PI * 2;
        const x = Math.cos(angle) * ARENA_RADIUS;
        const z = Math.sin(angle) * ARENA_RADIUS;
        const h = 2.7 + Math.random() * 1.4;

        const block = new THREE.Mesh(
          new THREE.BoxGeometry(1.5, h, 1.2),
          i % 2 ? pillarMatA : pillarMatB
        );

        block.position.set(x, h / 2 - 0.15, z);
        block.rotation.y = -angle;
        block.castShadow = false;
        block.receiveShadow = true;
        scene.add(block);
        addOutline(block, 1.035);

        const cap = new THREE.Mesh(
          new THREE.BoxGeometry(1.78, 0.22, 1.45),
          i % 2 ? pillarMatB : pillarMatA
        );
        cap.position.set(x, h - 0.02, z);
        cap.rotation.y = -angle;
        cap.castShadow = false;
        cap.receiveShadow = true;
        scene.add(cap);
        addOutline(cap, 1.035);
      }

      for (let i = 0; i < 150; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.random() * ARENA_RADIUS * 0.92;

        const stone = new THREE.Mesh(
          new THREE.DodecahedronGeometry(0.055 + Math.random() * 0.16),
          toonMaterial(Math.random() > 0.5 ? 0x6b4328 : 0x8b6038)
        );

        stone.position.set(Math.cos(a) * r, 0.06, Math.sin(a) * r);
        stone.rotation.set(Math.random(), Math.random(), Math.random());
        stone.receiveShadow = true;
        stone.castShadow = true;
        scene.add(stone);
        addOutline(stone, 1.08);
      }

      createCrowdSilhouette();
      createTorches();
    }


    function createCrowdSilhouette() {
      const crowdGroup = new THREE.Group();
      crowdGroup.name = "Crowd Silhouette Ring";

      const crowdMat = new THREE.MeshBasicMaterial({
        color: 0x090403,
        transparent: true,
        opacity: 0.82
      });

      const bodyGeo = new THREE.BoxGeometry(0.42, 0.92, 0.08);
      const headGeo = new THREE.SphereGeometry(0.18, 8, 8);
      const armGeo = new THREE.BoxGeometry(0.7, 0.08, 0.07);

      const crowdTiers = 3;
      const silhouettesPerTier = 96;
      const count = crowdTiers * silhouettesPerTier;
      const bodies = new THREE.InstancedMesh(bodyGeo, crowdMat, count);
      const heads = new THREE.InstancedMesh(headGeo, crowdMat, count);
      const arms = new THREE.InstancedMesh(armGeo, crowdMat, count);
      const dummy = new THREE.Object3D();

      for (let i = 0; i < count; i++) {
        const tier = Math.floor(i / silhouettesPerTier);
        const slot = i % silhouettesPerTier;
        // Equal angular spacing per tier, with each row offset half a slot so the crowd feels denser.
        const angle = ((slot + tier * 0.5) / silhouettesPerTier) * Math.PI * 2;
        const radius = ARENA_RADIUS + 2.35 + tier * 0.92;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const baseY = 2.18 + tier * 0.34 + Math.sin(slot * 1.37 + tier) * 0.16 + 0.21;
        const scale = 0.72 + ((slot * 19 + tier * 11) % 37) / 37 * 0.55;

        dummy.position.set(x, baseY, z);
        dummy.rotation.set(0, -angle + Math.PI / 2, 0);
        dummy.scale.set(scale * (0.82 + Math.random() * 0.4), scale, scale);
        dummy.updateMatrix();
        bodies.setMatrixAt(i, dummy.matrix);

        dummy.position.set(x, baseY + 0.6 * scale, z);
        dummy.rotation.set(0, -angle + Math.PI / 2, 0);
        dummy.scale.setScalar(scale * (0.82 + Math.random() * 0.3));
        dummy.updateMatrix();
        heads.setMatrixAt(i, dummy.matrix);

        dummy.position.set(x, baseY + 0.22 * scale + Math.sin(i * 1.7) * 0.05, z);
        dummy.rotation.set(0, -angle + Math.PI / 2, Math.sin(i * 0.73) * 0.28);
        dummy.scale.set(scale * (0.82 + Math.random() * 0.36), scale, scale);
        dummy.updateMatrix();
        arms.setMatrixAt(i, dummy.matrix);
      }

      for (const mesh of [bodies, heads, arms]) {
        mesh.castShadow = false;
        mesh.receiveShadow = false;
        mesh.frustumCulled = false;
        mesh.instanceMatrix.needsUpdate = true;
        crowdGroup.add(mesh);
      }

      scene.add(crowdGroup);
    }

    function createTorches() {
      const positions = [
        [-20, -20],
        [20, -20],
        [-20, 20],
        [20, 20]
      ];

      for (const [x, z] of positions) {
        const pole = new THREE.Mesh(
          new THREE.CylinderGeometry(0.18, 0.25, 4.5, 12),
          toonMaterial(0x2b160d)
        );
        pole.position.set(x, 2.25, z);
        pole.castShadow = true;
        scene.add(pole);
        addOutline(pole, 1.04);

        const bowl = new THREE.Mesh(
          new THREE.CylinderGeometry(0.62, 0.4, 0.35, 12),
          toonMaterial(0x1d0d07)
        );
        bowl.position.set(x, 4.48, z);
        bowl.castShadow = true;
        scene.add(bowl);
        addOutline(bowl, 1.04);

        const flame = new THREE.Group();
        flame.position.set(x, 4.75, z);
        scene.add(flame);

        const outerFlame = new THREE.Mesh(
          new THREE.ConeGeometry(0.55, 1.35, 8),
          new THREE.MeshBasicMaterial({ color: 0xff5a14 })
        );
        outerFlame.position.y = 0.25;
        flame.add(outerFlame);

        const innerFlame = new THREE.Mesh(
          new THREE.ConeGeometry(0.32, 0.95, 8),
          new THREE.MeshBasicMaterial({ color: 0xffe16b })
        );
        innerFlame.position.y = 0.22;
        flame.add(innerFlame);

        flame.userData.baseY = flame.position.y;
        flame.userData.flicker = Math.random() * 10;
        flame.userData.outer = outerFlame;
        flame.userData.inner = innerFlame;

        particles.push({
          mesh: flame,
          velocity: new THREE.Vector3(),
          life: Infinity,
          maxLife: Infinity,
          type: "flame"
        });
      }
    }

    function createGladiator(opts) {
      const group = new THREE.Group();
      group.position.set(opts.x, 0, opts.z);

      const skin = toonMaterial(opts.skinColor);
      const armor = toonMaterial(opts.armorColor);
      const cloth = toonMaterial(opts.clothColor);
      const leather = toonMaterial(opts.bodyColor);

      const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.7, 1.15, 8, 16), skin);
      body.position.y = 1.75;
      body.castShadow = true;
      group.add(body);
      addOutline(body, 1.045);

      const chest = new THREE.Mesh(
        new THREE.BoxGeometry(1.25, 1.1, 0.5),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, visible: false })
      );
      chest.position.y = 2.08;
      chest.visible = false;
      group.add(chest);

      const belt = new THREE.Mesh(
        new THREE.CylinderGeometry(0.78, 0.82, 0.22, 18),
        armor
      );
      belt.position.y = 1.43;
      belt.castShadow = true;
      group.add(belt);
      addOutline(belt, 1.035);

      const skirt = new THREE.Mesh(new THREE.CylinderGeometry(0.78, 1.02, 0.65, 12), cloth);
      skirt.position.y = 1.18;
      skirt.castShadow = true;
      group.add(skirt);
      addOutline(skirt, 1.04);

      const headPivot = new THREE.Group();
      headPivot.position.set(0, 3.05, 0);
      group.add(headPivot);

      const head = new THREE.Mesh(new THREE.SphereGeometry(0.42, 24, 24), skin);
      head.position.set(0, 0, 0);
      head.castShadow = true;
      headPivot.add(head);
      addOutline(head, 1.045);

      const helmet = new THREE.Mesh(
        new THREE.SphereGeometry(0.45, 24, 12, 0, Math.PI * 2, 0, Math.PI / 2),
        armor
      );
      helmet.position.set(0, 0.08, 0);
      helmet.castShadow = true;
      headPivot.add(helmet);
      addOutline(helmet, 1.035);

      const crestBase = new THREE.Mesh(
        new THREE.BoxGeometry(0.13, 0.16, 0.82),
        armor
      );
      crestBase.position.set(0, 0.44, 0);
      crestBase.castShadow = true;
      headPivot.add(crestBase);
      addOutline(crestBase, 1.04);

      const plumes = [];

      for (let i = 0; i < 7; i++) {
        const plume = new THREE.Mesh(
          new THREE.BoxGeometry(0.08, 0.5 + i * 0.012, 0.08),
          cloth
        );

        plume.position.set(0, 0.67, -0.36 + i * 0.12);
        plume.rotation.x = -0.32 + i * 0.085;
        plume.castShadow = true;
        headPivot.add(plume);
        addOutline(plume, 1.08);
        plumes.push(plume);
      }

      const eyeGroup = new THREE.Group();
      eyeGroup.position.set(0, 0.03, 0.37);
      headPivot.add(eyeGroup);

      const leftEye = createCartoonEye();
      const rightEye = createCartoonEye();

      leftEye.position.set(-0.17, 0.02, 0);
      rightEye.position.set(0.17, 0.02, 0);

      eyeGroup.add(leftEye);
      eyeGroup.add(rightEye);

      headPivot.userData.baseRotation = headPivot.rotation.clone();

      const leftArmPivot = new THREE.Group();
      const rightArmPivot = new THREE.Group();

      // Match the movement/camera convention used by this game: local right is negative X.
      // Sword/club stays on rightArmPivot; shield stays on leftArmPivot.
      // Arms are nudged forward on local Z so weapons/shield sit in front of the chest.
      leftArmPivot.position.set(0.84, 2.48, 0.16);
      rightArmPivot.position.set(-0.84, 2.48, 0.16);

      group.add(leftArmPivot, rightArmPivot);

      const armGeo = new THREE.CapsuleGeometry(0.17, 0.82, 6, 12);

      const leftArm = new THREE.Mesh(armGeo, skin);
      leftArm.position.y = -0.48;
      leftArm.castShadow = true;
      leftArmPivot.add(leftArm);
      addOutline(leftArm, 1.05);

      const rightArm = new THREE.Mesh(armGeo, skin);
      rightArm.position.y = -0.48;
      rightArm.castShadow = true;
      rightArmPivot.add(rightArm);

    function createCartoonEye() {
